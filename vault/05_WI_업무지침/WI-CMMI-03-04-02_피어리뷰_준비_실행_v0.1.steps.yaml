wi_id:           "WI-CMMI-03-04-02"
title:           "피어리뷰 준비·실행 (SG2: SP2.1~2.2)"
version:         "0.1"
parent_pro:      "PRO-CMMI-03-04"
parent_pol:      "POL-CMMI-03"
related_tmp:
  - "TMP-CMMI-03-04-02-01_피어리뷰_체크리스트_기록부"
scope_code:      "CMMI"
standards:       ["CMMI-DEV-ML3-V1.3"]

extracted_at:    "2026-05-11T11:10:00+09:00"
extractor:       "wi-tmp-writer"
extractor_model: "claude-opus-4-7"
manual_override: false

steps:
  - id: "step-01"
    name: "리뷰 준비 (SP2.1)"
    section_ref: "§5.2.1"
    inputs:
      - field: "review_subject_id"
        type: "text"
        question: "리뷰 대상 산출물 ID는?"
        required: true
      - field: "checklist_id"
        type: "text"
        question: "사용할 체크리스트(조직 표준) ID는?"
        required: true
      - field: "review_format"
        type: "enum"
        question: "리뷰 형식은?"
        options: ["Inspection", "Walkthrough", "Pair", "Tool-assisted"]
        required: true
      - field: "reviewer_count"
        type: "number"
        question: "리뷰어 수(저자 제외)는?"
        required: true
        validation: ">= 2"
      - field: "entry_criteria_met"
        type: "boolean"
        question: "진입 기준 충족?"
        required: true
    outputs:
      - tmp_field: "기록부.준비"
        from: "checklist_id"
    hitl: false

  - id: "step-02"
    name: "리뷰 실행 (SP2.2)"
    section_ref: "§5.2.2"
    inputs:
      - field: "review_session"
        type: "table"
        question: "세션 기본 정보를 작성하라"
        columns: ["세션ID", "일자", "장소/방식", "모더레이터", "서기", "리뷰어 명단", "소요 시간(분)"]
        required: true
      - field: "findings_table"
        type: "table"
        question: "발견사항을 표로 작성하라"
        columns: ["FindingID", "유형(결함/의견)", "등급(Major/Minor/Suggestion)", "위치", "설명", "권고"]
        required: true
    outputs:
      - tmp_field: "기록부.세션"
        from: "review_session"
      - tmp_field: "기록부.발견사항"
        from: "findings_table"
    hitl: false

  - id: "step-03"
    name: "결함 등록·할당"
    section_ref: "§5.2.3"
    inputs:
      - field: "issue_tracker_ids"
        type: "text"
        question: "등록된 이슈 트래커 ID 목록(쉼표구분)은?"
        required: true
      - field: "owners"
        type: "text"
        question: "결함별 할당자 매핑(JSON 또는 표)?"
        required: true
    outputs:
      - tmp_field: "기록부.이슈매핑"
        from: "issue_tracker_ids"
    hitl: false

  - id: "step-04"
    name: "종료 판정"
    section_ref: "§5.2.4"
    inputs:
      - field: "exit_criteria_met"
        type: "boolean"
        question: "종료 기준 충족?"
        required: true
      - field: "re_review_date"
        type: "date"
        question: "(미충족 시) 재리뷰 일자는?"
        required_if: "not exit_criteria_met"
    outputs:
      - tmp_field: "기록부.종료판정"
        from: "exit_criteria_met"
    hitl: false

  - id: "step-05"
    name: "측정 데이터 저장 (WI-03 입력)"
    section_ref: "§5.3"
    inputs:
      - field: "metrics"
        type: "table"
        question: "리뷰 측정 데이터를 표로 작성하라"
        columns: ["메트릭(시간/페이지/결함밀도/Major 비율)", "값"]
        required: true
    outputs:
      - tmp_field: "기록부.측정"
        from: "metrics"
    hitl: false

dod_checklist:
  - "유형별 체크리스트 사용"
  - "리뷰어 2명 이상 (저자 제외)"
  - "진입·종료 기준 사전 합의·기록"
  - "결함 vs 의견 구분"
  - "이슈 트래커 등록·할당"
  - "종료 판정 결재"
  - "측정 데이터 기록 (WI-03 입력)"

exception_hooks:
  - section: "§7.1"
    name: "진입 기준 미달"
    rule: "리뷰 보류 + 저자 보완"
  - section: "§7.2"
    name: "리뷰어 부족"
    rule: "외부 SME 초빙(NDA) 또는 비동기 회람"
  - section: "§7.3"
    name: "결함 vs 의견 분쟁"
    rule: "모더레이터 1차 결정 → 미합의시 PM 격상 + 회의록"

triggers: ["피어리뷰", "Peer Review", "코드 리뷰", "Inspection"]
aliases: ["Code Review", "Design Review", "Document Review"]
event_triggers: ["산출물 베이스라인 직전", "주요 변경 시"]
domains: ["일반", "SW"]
