wi_id:           "WI-CMMI-02-02-02"
title:           "이해관계자·진행·마일스톤 검토 (SP1.5~1.7)"
version:         "0.1"
parent_pro:      "PRO-CMMI-02-02"
parent_pol:      "POL-CMMI-02"
related_tmp:
  - "TMP-CMMI-02-02-02-01_진행_검토_결과보고"
  - "TMP-CMMI-02-02-02-02_마일스톤_검토_결과보고"
scope_code:      "CMMI"
scope_type:      "project"
standards:       ["CMMI-DEV-ML3-V1.3"]

extracted_at:    "2026-05-11T08:58:00+09:00"
extractor:       "wi-tmp-writer"
extractor_model: "claude-opus-4-7"
manual_override: false

steps:
  - id: "step-01"
    name: "이해관계자 참여 모니터링 (SP1.5)"
    section_ref: "§5.2.1"
    inputs:
      - field: "participation_table"
        type: "table"
        question: "월간 이해관계자 참여 (이름·계획 빈도·실제 빈도)"
        columns: ["이해관계자", "계획빈도", "실제빈도", "참여율"]
        required: true
    derivations:
      - id: "low_participation_count"
        expr: "count where 참여율 < 70"
        description: "참여 저조 이해관계자 수"
    outputs:
      - tmp_field: "진행검토.이해관계자참여"
        from: "participation_table"
    hitl: false

  - id: "step-02"
    name: "진행 검토 (SP1.6)"
    section_ref: "§5.2.2"
    inputs:
      - field: "month"
        type: "text"
        question: "검토 대상 월 (YYYY-MM)은?"
        required: true
      - field: "summary_table"
        type: "table"
        question: "베이스라인 대비 진척·예산·리스크·약정 status 종합"
        columns: ["항목", "계획", "실적", "편차", "상태"]
        required: true
    outputs:
      - tmp_field: "진행검토.월"
        from: "month"
      - tmp_field: "진행검토.종합표"
        from: "summary_table"
    hitl: false

  - id: "step-03"
    name: "마일스톤 통과 조건 audit (SP1.7)"
    section_ref: "§5.2.3"
    inputs:
      - field: "milestone_id"
        type: "text"
        question: "마일스톤 ID (M1~M5)는?"
        required: true
      - field: "audit_table"
        type: "table"
        question: "통과조건 audit (조건·평가·결과)"
        columns: ["통과조건", "측정/평가", "결과(Pass/Fail/N/A)"]
        required: true
      - field: "ppqa_audit_pass"
        type: "boolean"
        question: "PPQA audit 통과?"
        required: true
      - field: "cm_baseline_id"
        type: "text"
        question: "CM 마일스톤 베이스라인 ID는?"
        required: false
    derivations:
      - id: "milestone_decision"
        expr: |
          fail_count = count where 결과 == "Fail"
          if fail_count == 0 and ppqa_audit_pass: "Pass"
          elif fail_count <= 2 and ppqa_audit_pass: "Conditional Pass"
          else: "Fail"
        description: "마일스톤 통과 결정"
    outputs:
      - tmp_field: "마일스톤검토.ID"
        from: "milestone_id"
      - tmp_field: "마일스톤검토.audit표"
        from: "audit_table"
      - tmp_field: "마일스톤검토.결정"
        from: "milestone_decision"
    hitl: false

  - id: "step-04"
    name: "Senior Mgmt 승인 및 게이트 결정"
    section_ref: "§5.2.4"
    inputs:
      - field: "approver_name"
        type: "person"
        question: "Senior Mgmt 승인자 이름은?"
        required: true
      - field: "remediation_deadline"
        type: "date"
        question: "Conditional 시 시정 마감일은?"
        required: false
      - field: "fail_action"
        type: "enum"
        question: "Fail 시 분기 (Fail 인 경우만)"
        options: ["pmc_sp2_remediation", "sponsor_escalation", "baseline_change"]
        required: false
    outputs:
      - tmp_field: "마일스톤검토.승인자"
        from: "approver_name"
      - tmp_field: "마일스톤검토.시정마감"
        from: "remediation_deadline"
    hitl: required
    approver_role: "Senior Management"
    rationale: "PRO §3 RACI 의 A — 마일스톤 통과 = 게이트 권한"

dod_checklist:
  - "이해관계자 참여 기록 (월별)"
  - "월간 진행 검토 결과보고 — Senior Mgmt 결재"
  - "마일스톤 통과 조건 audit + 결정"
  - "결정 사항 MAT-001 등록 + CM 베이스라인"
  - "Fail 시 PMC SP2 시정조치 분기 진입"

exception_hooks:
  - section: "§7.1"
    name: "이해관계자 참여 저조"
    rule: "참여율 <70% 시 1:1 outreach; 3개월 연속 저조 시 참여 계획 재수립"
  - section: "§7.2"
    name: "마일스톤 통과 조건 일부 미충족"
    rule: "Conditional Pass + 시정 마감 ≤2주; 미준수 시 Fail 재평가"
  - section: "§7.3"
    name: "마일스톤 Fail"
    rule: "시정 후 재검토; 재 Fail 시 Sponsor escalation + 베이스라인 변경"

triggers: ["마일스톤 검토", "진행 검토", "게이트 결정", "이해관계자 참여"]
aliases: ["milestone review", "gate review", "PMC SP1.6", "PMC SP1.7"]
event_triggers: ["월 1회 (진행검토)", "마일스톤 시점", "PMC SP1.5 신규 식별"]
domains: ["일반", "SW", "엔지니어링"]
