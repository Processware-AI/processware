wi_id:           "WI-CMMI-03-01-03"
title:           "운영 개념·기능·품질 정의 (SG3: SP3.1~3.3)"
version:         "0.1"
parent_pro:      "PRO-CMMI-03-01"
parent_pol:      "POL-CMMI-03"
related_tmp:
  - "TMP-CMMI-03-01-03-01_운영_개념_시나리오_정의서"
  - "TMP-CMMI-03-01-03-02_기능_품질속성_정의서"
scope_code:      "CMMI"
standards:       ["CMMI-DEV-ML3-V1.3"]

extracted_at:    "2026-05-11T09:20:00+09:00"
extractor:       "wi-tmp-writer"
extractor_model: "claude-opus-4-7"
manual_override: false

steps:
  - id: "step-01"
    name: "운영 환경 조사"
    section_ref: "§5.1.2"
    inputs:
      - field: "field_visit_done"
        type: "boolean"
        question: "현장 방문·관찰을 완료했는가?"
        required: true
      - field: "field_visit_alt"
        type: "text"
        question: "(현장 방문 불가 시) 대체 수단은?"
        required_if: "not field_visit_done"
    outputs:
      - tmp_field: "운영개념정의서.환경조사"
        from: "field_visit_done"
    hitl: false

  - id: "step-02"
    name: "운영 개념 수립 (SP3.1)"
    section_ref: "§5.2.1"
    inputs:
      - field: "op_concept_phases"
        type: "multiselect"
        question: "운영 개념을 작성한 라이프사이클 단계는?"
        options: ["설치", "운영", "유지보수", "폐기"]
        required: true
        validation: "len(op_concept_phases) == 4"
      - field: "op_modes"
        type: "multiselect"
        question: "운영 모드(정상/예외/실패) 모두 정의했는가?"
        options: ["정상", "예외", "실패"]
        required: true
    outputs:
      - tmp_field: "운영개념정의서.단계별운영개념"
        from: "op_concept_phases"
    hitl: false

  - id: "step-03"
    name: "시나리오·use case 작성"
    section_ref: "§5.2.2"
    inputs:
      - field: "scenario_table"
        type: "table"
        question: "시나리오 묶음을 표로 작성하라"
        columns: ["UC-ID", "이름", "Actor", "전제", "트리거", "기본흐름", "대안흐름", "예외흐름", "종료조건"]
        required: true
    outputs:
      - tmp_field: "운영개념정의서.UC표"
        from: "scenario_table"
    hitl: false

  - id: "step-04"
    name: "기능 정의 (SP3.2 - 기능)"
    section_ref: "§5.2.3"
    inputs:
      - field: "function_ipo_table"
        type: "table"
        question: "기능을 IPO 단위로 분해하라"
        columns: ["기능ID", "이름", "Input", "Process", "Output", "관련 UC-ID"]
        required: true
    outputs:
      - tmp_field: "기능품질속성정의서.기능IPO"
        from: "function_ipo_table"
    hitl: false

  - id: "step-05"
    name: "품질 속성 정의 (SP3.2 - 품질)"
    section_ref: "§5.2.4"
    inputs:
      - field: "quality_attributes"
        type: "table"
        question: "품질 속성 8축 평가·정량 목표를 작성하라"
        columns: ["축(성능/신뢰성/가용성/보안/유지보수성/이식성/확장성/접근성)", "적용 여부", "정량 목표", "측정 방법"]
        required: true
    outputs:
      - tmp_field: "기능품질속성정의서.품질8축"
        from: "quality_attributes"
    hitl: false

  - id: "step-06"
    name: "요구사항 분석 (SP3.3)"
    section_ref: "§5.2.5"
    inputs:
      - field: "analysis_axes"
        type: "multiselect"
        question: "분석 5축 점검 결과(통과 축)는?"
        options: ["완전성", "일관성", "검증가능성", "실현가능성", "추적성"]
        required: true
      - field: "defect_count"
        type: "number"
        question: "식별된 결함 수는?"
        required: true
        validation: ">= 0"
      - field: "requirement_count"
        type: "number"
        question: "분석 대상 요구사항 총수는?"
        required: true
        validation: ">= 1"
    derivations:
      - id: "defect_density"
        expr: |
          density = defect_count / requirement_count * 100
          if density > 20: "재실시 권고"
          else: "정상"
        description: "결함 비율 20% 초과 시 §7.3 분기"
    outputs:
      - tmp_field: "기능품질속성정의서.분석결함보고"
        from: "defect_count"
    hitl: false

  - id: "step-07"
    name: "결함 처리"
    section_ref: "§5.2.6"
    inputs:
      - field: "defect_resolution"
        type: "table"
        question: "결함별 처리 결과를 표로 작성하라"
        columns: ["결함ID", "분류(해결/이관-WI-04/Drop)", "처리 일자", "처리자"]
        required: true
    outputs:
      - tmp_field: "기능품질속성정의서.결함처리"
        from: "defect_resolution"
    hitl: false

  - id: "step-08"
    name: "검토·승인"
    section_ref: "§5.2.7"
    inputs:
      - field: "joint_review_date"
        type: "date"
        question: "Chief Eng + Test Eng + VAL Lead 합동 검토 일자는?"
        required: true
      - field: "pm_approver"
        type: "person"
        question: "승인 PM 은?"
        required: true
    outputs:
      - tmp_field: "기능품질속성정의서.결재"
        from: "pm_approver"
    hitl: required
    approver_role: "Project Manager"
    rationale: "WI §2 승인자"

dod_checklist:
  - "운영 개념 4단계(설치/운영/유지보수/폐기) 모두 기술"
  - "시나리오 묶음(정상/대안/예외) 핵심 기능 전체 작성"
  - "기능 IPO 분해 완료"
  - "품질 속성 8축 평가 + 적용 항목 정량 목표"
  - "분석 5축 점검 완료, 결함 보고서 발행"
  - "Open 결함 처리 상태 기록"
  - "PM 승인 결재"

exception_hooks:
  - section: "§7.1"
    name: "운영 환경 접근 불가"
    rule: "영상·사진·매뉴얼 대체 + 신뢰도 등급 + PM 결재 분기"
  - section: "§7.2"
    name: "품질 속성 측정 불가"
    rule: "정성 → 정량 마일스톤 일정 부여, 책임자 명시"
  - section: "§7.3"
    name: "결함 다발 (>20%)"
    rule: "WI-01 elicit 재실시 또는 WI-02 재정렬 권고, PM 의사결정"

triggers: ["운영 개념", "시나리오", "use case", "품질 속성", "요구사항 분석"]
aliases: ["OpCon", "Operational Concept", "Quality Attributes"]
event_triggers: ["요구사항 분석 시점", "운영 환경 변경", "신규 도메인 진입"]
domains: ["일반", "SW"]
