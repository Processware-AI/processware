wi_id:           "WI-CMMI-04-04-02"
title:           "평가 방법 선정·대안 평가 (SP1.4~1.5)"
version:         "0.1"
parent_pro:      "PRO-CMMI-04-04"
parent_pol:      "POL-CMMI-04"
related_tmp:
  - "TMP-CMMI-04-04-02-01_평가방법_선정서"
  - "TMP-CMMI-04-04-02-02_대안_평가_결과서"
scope_code:      "CMMI"
scope_type:      "organization_project"
standards:       ["CMMI-DEV-ML3-V1.3"]

extracted_at:    "2026-05-11T09:30:00+09:00"
extractor:       "wi-tmp-writer"
extractor_model: "claude-opus-4-7"
manual_override: false

steps:
  - id: "step-01"
    name: "평가 방법 후보 도출 (SP1.4-전반)"
    section_ref: "§5.2.1"
    inputs:
      - field: "method_candidates"
        type: "multiselect"
        question: "평가 방법 후보?"
        options: ["가중합산","AHP","PoC/실험","시뮬레이션","시나리오 분석","비용편익(NPV)","기타"]
        required: true
    outputs:
      - tmp_field: "평가방법선정서.후보"
        from: "method_candidates"
    hitl: false

  - id: "step-02"
    name: "평가 방법 선정 (SP1.4-후반)"
    section_ref: "§5.2.2"
    inputs:
      - field: "selected_method"
        type: "text"
        question: "선정된 평가 방법(또는 조합)?"
        required: true
      - field: "selection_rationale"
        type: "text"
        question: "선정 근거(객관성·재현성·비용)?"
        required: true
    outputs:
      - tmp_field: "평가방법선정서.선정방법"
        from: "selected_method"
      - tmp_field: "평가방법선정서.근거"
        from: "selection_rationale"
    hitl: false

  - id: "step-03"
    name: "평가 수행 (SP1.5-전반)"
    section_ref: "§5.2.3"
    inputs:
      - field: "evaluation_matrix"
        type: "table"
        question: "대안 x 기준 점수 매트릭스?"
        columns: ["대안", "기준1 점수", "기준2 점수", "기준N 점수", "가중치 적용 합계"]
        required: true
      - field: "evidence_links"
        type: "text"
        question: "각 점수의 근거·증적 위치?"
        required: true
    outputs:
      - tmp_field: "평가결과서.평가매트릭스"
        from: "evaluation_matrix"
      - tmp_field: "평가결과서.증적"
        from: "evidence_links"
    hitl: false

  - id: "step-04"
    name: "민감도 분석"
    section_ref: "§5.2.4"
    inputs:
      - field: "sensitivity_result"
        type: "text"
        question: "민감도 분석 결과 (±10% 가중치 변동 시 순위 변동)?"
        required: true
      - field: "stability"
        type: "enum"
        question: "순위 안정성?"
        options: ["안정","부분 안정","불안정"]
        required: true
    outputs:
      - tmp_field: "평가결과서.민감도분석"
        from: "sensitivity_result"
      - tmp_field: "평가결과서.안정성"
        from: "stability"
    hitl: false

  - id: "step-05"
    name: "평가 결과 정리 (SP1.5-후반)"
    section_ref: "§5.2.5"
    inputs:
      - field: "ranking_table"
        type: "table"
        question: "대안별 종합 순위·강약점?"
        columns: ["대안", "종합 점수", "순위", "강점", "약점"]
        required: true
    outputs:
      - tmp_field: "평가결과서.순위"
        from: "ranking_table"
    hitl: false

  - id: "step-06"
    name: "Decision Owner 결재"
    section_ref: "§5.2.6"
    inputs:
      - field: "owner_name"
        type: "person"
        question: "Decision Owner 이름?"
        required: true
      - field: "owner_review_comment"
        type: "text"
        question: "Decision Owner 검토 의견?"
        required: true
    outputs:
      - tmp_field: "평가결과서.Owner결재"
        from: "owner_name"
      - tmp_field: "평가결과서.Owner의견"
        from: "owner_review_comment"
    hitl: required
    approver_role: "Decision Owner"
    rationale: "WI §2 — 평가 결과는 Decision Owner 결재 후 SP1.6 으로 전달"

dod_checklist:
  - "평가 방법 선정 근거 명기"
  - "모든 대안이 모든 기준에 대해 평가"
  - "가중치 적용 시 계산 검증"
  - "민감도 분석 수행"
  - "점수 근거·증적 보존"
  - "Decision Owner 결재"

exception_hooks:
  - section: "§7.1"
    name: "평가 점수 편향 의심"
    rule: "±2σ 일탈자 사유 확인. 합의 실패 시 일탈치 제외 또는 패널 재구성"
  - section: "§7.2"
    name: "AHP 일관성 비율>0.1"
    rule: "행렬 재수정. 재수정해도 미달 시 가중합산으로 전환"
  - section: "§7.3"
    name: "새 정보 등장"
    rule: "WI-CMMI-04-04-01 으로 환류 → 기준 재정의 후 재평가"

triggers: ["DAR 평가", "가중합산", "AHP", "민감도 분석"]
aliases: ["Evaluation Method", "AHP", "Sensitivity Analysis"]
event_triggers: ["평가 기준 확정 후", "평가 패널 소집"]
domains: ["일반", "SW"]
