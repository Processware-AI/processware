wi_id:           "WI-CMMI-04-04-01"
title:           "DAR 적용 지침·평가기준·대안 (SP1.1~1.3)"
version:         "0.1"
parent_pro:      "PRO-CMMI-04-04"
parent_pol:      "POL-CMMI-04"
related_tmp:
  - "TMP-CMMI-04-04-01-01_DAR_적용지침_적용결과서"
  - "TMP-CMMI-04-04-01-02_평가기준_정의서"
  - "TMP-CMMI-04-04-01-03_대안_목록"
scope_code:      "CMMI"
scope_type:      "organization_project"
standards:       ["CMMI-DEV-ML3-V1.3"]

extracted_at:    "2026-05-11T09:25:00+09:00"
extractor:       "wi-tmp-writer"
extractor_model: "claude-opus-4-7"
manual_override: false

steps:
  - id: "step-01"
    name: "사안 식별·트리거 확인"
    section_ref: "§5.1"
    inputs:
      - field: "decision_subject"
        type: "text"
        question: "의사결정 사안 명·요약?"
        required: true
      - field: "trigger_source"
        type: "enum"
        question: "트리거 PA·SP?"
        options: ["TS SP1.1","TS SP2.4","SAM SP1.2","OPF SP1.3","IPM","조직 의무 사안","기타"]
        required: true
    outputs:
      - tmp_field: "적용결과서.사안"
        from: "decision_subject"
      - tmp_field: "적용결과서.트리거"
        from: "trigger_source"
    hitl: false

  - id: "step-02"
    name: "DAR 적용 지침 적용 (SP1.1)"
    section_ref: "§5.2.1"
    inputs:
      - field: "impact_factors"
        type: "table"
        question: "영향도 평가 (비용·가역성·이해관계자·리스크)?"
        columns: ["요인", "수준(L/M/H)", "사유"]
        required: true
      - field: "dar_decision"
        type: "enum"
        question: "DAR 적용 결정?"
        options: ["적용","미적용","의무 적용(지침)"]
        required: true
      - field: "decision_rationale"
        type: "text"
        question: "결정 근거?"
        required: true
    outputs:
      - tmp_field: "적용결과서.영향도"
        from: "impact_factors"
      - tmp_field: "적용결과서.DAR적용결정"
        from: "dar_decision"
      - tmp_field: "적용결과서.근거"
        from: "decision_rationale"
    hitl: false

  - id: "step-03"
    name: "평가 기준 수립 (SP1.2)"
    section_ref: "§5.2.2"
    inputs:
      - field: "criteria_table"
        type: "table"
        question: "평가 기준·가중치·측정방법·임계값?"
        columns: ["기준명", "가중치(%)", "측정 방법", "임계값"]
        required: true
    derivations:
      - id: "weight_sum_check"
        expr: "sum(criteria_table.가중치(%)) == 100"
        description: "가중치 합 100% 검증"
    outputs:
      - tmp_field: "평가기준정의서.기준표"
        from: "criteria_table"
      - tmp_field: "평가기준정의서.가중치검증"
        from: "weight_sum_check"
    hitl: false

  - id: "step-04"
    name: "이해관계자 검토·합의"
    section_ref: "§5.2.3"
    inputs:
      - field: "review_panel"
        type: "text"
        question: "검토 패널 명단?"
        required: true
      - field: "agreement_status"
        type: "enum"
        question: "합의 상태?"
        options: ["합의","조건부 합의","미합의"]
        required: true
    outputs:
      - tmp_field: "평가기준정의서.검토패널"
        from: "review_panel"
      - tmp_field: "평가기준정의서.합의상태"
        from: "agreement_status"
    hitl: false

  - id: "step-05"
    name: "대안 식별 (SP1.3)"
    section_ref: "§5.2.4"
    inputs:
      - field: "alternatives"
        type: "table"
        question: "대안 목록(최종 후보 2~5개)?"
        columns: ["대안 ID", "이름", "요약", "도출 출처"]
        required: true
      - field: "early_excluded"
        type: "table"
        question: "조기 탈락 대안·사유(있을 시)?"
        columns: ["대안명", "탈락 사유"]
        required: false
    derivations:
      - id: "alternatives_count_check"
        expr: "alternatives.length >= 2 and alternatives.length <= 5"
        description: "대안 수 2~5 검증"
    outputs:
      - tmp_field: "대안목록.대안"
        from: "alternatives"
      - tmp_field: "대안목록.조기탈락"
        from: "early_excluded"
    hitl: false

  - id: "step-06"
    name: "결재"
    section_ref: "§5.2.5"
    inputs:
      - field: "approver_name"
        type: "person"
        question: "Approver(사안별 위임권자) 이름?"
        required: true
    outputs:
      - tmp_field: "적용결과서.승인자"
        from: "approver_name"
    hitl: required
    approver_role: "Decision Approver"
    rationale: "PRO §3 RACI: SP1.2 Approver = A"

dod_checklist:
  - "DAR 적용 여부 판정 근거 명기"
  - "평가 기준 가중치 합 = 100%"
  - "각 기준의 측정 방법·임계값 명시"
  - "이해관계자 검토 합의"
  - "대안 2~5개 식별(조기 탈락 사유 포함)"
  - "결재 완료"

exception_hooks:
  - section: "§7.1"
    name: "DAR 의무 적용 사안"
    rule: "적용 여부 판정 생략, 직접 SP1.2 진입"
  - section: "§7.2"
    name: "기준 합의 실패"
    rule: "Approver 중재 → 불가 시 Senior Mgmt 에스컬레이션"
  - section: "§7.3"
    name: "대안 부족(1개 이하)"
    rule: "도출 재시도 → 그래도 1개면 일반 결정 절차로 전환"

triggers: ["의사결정 분석", "DAR 적용", "평가 기준", "대안 식별"]
aliases: ["Decision Analysis", "Formal Evaluation", "Alternatives"]
event_triggers: ["TS 솔루션 선정", "Make/Buy 결정", "공급자 선정", "OPF 개선 선정"]
domains: ["일반", "SW"]
