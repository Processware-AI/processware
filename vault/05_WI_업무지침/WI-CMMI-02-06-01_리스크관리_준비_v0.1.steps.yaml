wi_id:           "WI-CMMI-02-06-01"
title:           "리스크 관리 준비 (SG1: SP1.1~1.3)"
version:         "0.1"
parent_pro:      "PRO-CMMI-02-06"
parent_pol:      "POL-CMMI-02"
related_tmp:
  - "TMP-CMMI-02-06-01-01_리스크_출처_카테고리"
  - "TMP-CMMI-02-06-01-02_리스크_파라미터_정의서"
  - "TMP-CMMI-02-06-01-03_리스크_관리_전략서"
scope_code:      "CMMI"
scope_type:      "project"
standards:       ["CMMI-DEV-ML3-V1.3"]

extracted_at:    "2026-05-11T09:30:00+09:00"
extractor:       "wi-tmp-writer"
extractor_model: "claude-opus-4-7"
manual_override: false

steps:
  - id: "step-01"
    name: "출처·카테고리 결정 (SP1.1)"
    section_ref: "§5.2.1"
    inputs:
      - field: "categories"
        type: "multiselect"
        question: "리스크 카테고리 (최소 5)"
        options: ["요구사항", "기술", "일정", "외주/공급자", "환경", "인적자원", "재무", "법규/규제", "보안", "기타"]
        required: true
        validation: "count >= 5"
    outputs:
      - tmp_field: "리스크출처카테고리.목록"
        from: "categories"
    hitl: false

  - id: "step-02"
    name: "파라미터 정의 (SP1.2)"
    section_ref: "§5.2.2"
    inputs:
      - field: "probability_scale"
        type: "enum"
        question: "확률 스케일은?"
        options: ["H/M/L", "0~1", "1~5"]
        required: true
      - field: "impact_scale"
        type: "enum"
        question: "영향 스케일은?"
        options: ["H/M/L", "비용수치", "일정수치", "조합"]
        required: true
      - field: "thresholds"
        type: "object"
        question: "임계치 (high 분류 기준)"
        required: true
    outputs:
      - tmp_field: "리스크파라미터정의서.확률스케일"
        from: "probability_scale"
      - tmp_field: "리스크파라미터정의서.영향스케일"
        from: "impact_scale"
    hitl: false

  - id: "step-03"
    name: "전략 수립 (SP1.3)"
    section_ref: "§5.2.3"
    inputs:
      - field: "review_frequency"
        type: "enum"
        question: "리스크 검토 주기는?"
        options: ["weekly", "biweekly", "monthly", "milestone"]
        required: true
      - field: "tools"
        type: "multitext"
        question: "리스크 관리 도구"
        required: true
      - field: "raci_table"
        type: "table"
        question: "리스크 관리 RACI"
        columns: ["활동", "Risk Mgr", "PM", "Engineer", "Senior Mgmt"]
        required: true
    outputs:
      - tmp_field: "리스크관리전략서.주기"
        from: "review_frequency"
      - tmp_field: "리스크관리전략서.도구"
        from: "tools"
    hitl: false

  - id: "step-04"
    name: "Senior Mgmt 승인"
    section_ref: "§5.2.4"
    inputs:
      - field: "approver_name"
        type: "person"
        question: "Senior Mgmt 승인자 이름은?"
        required: true
      - field: "cm_baseline_id"
        type: "text"
        question: "CM 베이스라인 ID는?"
        required: true
    outputs:
      - tmp_field: "리스크관리전략서.승인자"
        from: "approver_name"
    hitl: required
    approver_role: "Senior Management"
    rationale: "PRO §3 RACI 의 A — 전략은 Senior Mgmt 결재"

dod_checklist:
  - "출처·카테고리 목록 (≥5)"
  - "파라미터 정의서"
  - "전략서 작성·승인"
  - "Senior Mgmt 결재"
  - "CM 등록"

exception_hooks:
  - section: "§7.1"
    name: "도메인 특수 출처"
    rule: "헬스/금융/방산은 법규·규제 카테고리 추가"
  - section: "§7.2"
    name: "파라미터 정량화 어려움"
    rule: "정성 H/M/L 시작 → 6개월 후 정량 전환 시도"
  - section: "§7.3"
    name: "전략 갱신 빈번"
    rule: "월 ≥1회 갱신 시 자동화 도구 검토"

triggers: ["리스크 관리 준비", "리스크 카테고리", "리스크 파라미터", "RSKM SG1"]
aliases: ["risk management strategy", "risk categories"]
event_triggers: ["프로젝트 헌장 직후", "전략 분기 review"]
domains: ["일반", "SW", "리스크"]
