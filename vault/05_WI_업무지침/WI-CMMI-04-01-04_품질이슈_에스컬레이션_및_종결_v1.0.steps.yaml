# 표준 스키마: vault/99_템플릿/T16_WI_steps_yaml.yaml
# =============================================================

wi_id:        "WI-CMMI-04-01-04"
title:        "품질이슈 에스컬레이션 및 종결"
version:      "1.0"
parent_pro:   "PRO-CMMI-04-01"
parent_pol:   "POL-CMMI-04"
related_tmp:
  - "TMP-CMMI-04-01-04-01"
scope_code:   "CMMI"
standards:    ["CMMI-DEV-ML3", "ISO 9001"]

extracted_at:    "2026-05-02T00:00:00+09:00"
extractor:       "wi-tmp-writer (Phase 4 cache promotion)"
extractor_model: "claude-opus-4-7"
manual_override: false

# ---- 단계 정의 ----
steps:
  - id: step-01
    name: 임계 기간 정의
    section_ref: "§5.1.1"
    inputs:
      - field: sla_thresholds
        type: text
        question: "이슈 등급별 SLA(임계 기간)를 알려주세요. (예: Critical 14일 / Major 30일)"
        required: true
    outputs: []
    hitl: false

  - id: step-02
    name: 채널 정의
    section_ref: "§5.1.2"
    inputs:
      - field: escalation_chain
        type: text
        question: "에스컬레이션 채널(보고 라인)을 알려주세요."
        required: true
    outputs: []
    hitl: false

  - id: step-03
    name: 임계 위반 식별
    section_ref: "§5.2.1"
    inputs:
      - field: violations
        type: table
        columns: ["issue_id", "severity", "owner", "days_open", "breach_type"]
        question: "임계 기간을 초과한 이슈를 등록해주세요."
        required: true
    outputs:
      - tmp_field: "이슈[]"
        from: violations
    hitl: false

  - id: step-04
    name: 에스컬레이션
    section_ref: "§5.2.2"
    inputs:
      - field: escalation_log
        type: text
        question: "에스컬레이션 진행 경과(시각·수신자)를 작성해주세요."
        required: true
    outputs:
      - tmp_field: "이슈[].에스컬레이션"
        from: escalation_log
    hitl: false

  - id: step-05
    name: 결정 회의
    section_ref: "§5.2.3"
    inputs:
      - field: decision_summary
        type: text
        question: "결정 회의 요약(참석자·합의 내용)을 작성해주세요."
        required: true
    outputs: []
    hitl: false

  - id: step-06
    name: 자원 추가
    section_ref: "§5.2.4"
    inputs:
      - field: resources_added
        type: text
        question: "추가 배정된 자원(인력·예산·외부 지원)을 기재해주세요."
        required: true
    outputs: []
    hitl: false

  - id: step-07
    name: 재추적
    section_ref: "§5.2.5"
    inputs:
      - field: next_check_date
        type: date
        question: "다음 재점검 일자를 입력해주세요. (YYYY-MM-DD)"
        required: true
    outputs: []
    hitl: false

  - id: step-08
    name: "종결 (Sponsor 승인)"
    section_ref: "§5.2.6"
    inputs: []
    derivations:
      - id: "결재.작성"
        expr: "executor + ' (' + today + ')'"
      - id: "결재.검토"
        expr: "WI.reviewer + ' (' + today + ')'"
        description: "WI §2 reviewer = 'PM'"
      - id: "결재.승인"
        expr: "WI.approver + ' (' + hitl.approved_at + ')'"
        description: "WI §2 approver = 'Sponsor'"
    outputs:
      - tmp_field: "결재.작성"
        from: "결재.작성"
      - tmp_field: "결재.검토"
        from: "결재.검토"
      - tmp_field: "결재.승인"
        from: "결재.승인"
    hitl: required
    approver_role: "Sponsor"
    rationale: "WI §2 의 '승인자: Sponsor' 명시 — 책임자 서명 게이트"

# ---- 완료 조건 ----
dod_checklist:
  - "보고서"
  - "종결 합의"
  - "데이터 적재"

# ---- 예외 처리 분기 ----
exception_hooks:
  - section: "§7.1"
    name: "결정 지연"
    rule: "결정 회의 합의 미달 시 Sponsor 직접 개입 분기"
  - section: "§7.2"
    name: "자원 부족"
    rule: "자원 추가 거절 시 PCB 자원 재배정 요청 분기"
  - section: "§7.3"
    name: "책임 회피"
    rule: "1차 책임자 무응답 시 Sponsor 통보 분기"

# ---- 자연어 라우팅용 메타 (MAT-007 동기화) ----
triggers:
  - "에스컬레이션"
  - "품질 이슈 보고"
  - "임계 위반"
  - "SLA 초과"
  - "이슈 상신"
aliases:
  - "품질 이슈 종결"
  - "에스컬레이션 보고서"
event_triggers:
  - "임계 기간 초과 시"
  - "Critical 이슈 미해결"
  - "Sponsor 결재 필요 시점"
domains: ["일반", "SW"]
