name: vault → Redmine Library Push

on:
  push:
    branches:
      - "feat/*-output"   # 프로세스 자산 브랜치 (실제 POL/PRO/WI/REC)
      - main
    paths:
      - "vault/**/*.md"   # vault 문서 변경 시만 실행

jobs:
  vault-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # --changed (HEAD~1 diff) 를 위해 2개 커밋 필요

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: publish/redmine/requirements.txt

      - name: Install dependencies
        run: pip install -r publish/redmine/requirements.txt

      - name: Check Redmine connectivity
        working-directory: publish/redmine
        env:
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          REDMINE_URL: ${{ secrets.REDMINE_URL }}
        run: |
          python3 - <<'EOF'
          import os, sys, requests
          url  = os.environ.get("REDMINE_URL", "")
          key  = os.environ.get("REDMINE_API_KEY", "")
          if not url or not key:
              print("⏭  REDMINE_URL / REDMINE_API_KEY 미설정 — push 건너뜀")
              sys.exit(0)
          r = requests.get(f"{url.rstrip('/')}/users/current.json",
                           headers={"X-Redmine-API-Key": key}, timeout=5)
          if r.status_code != 200:
              print(f"❌ Redmine 접속 실패 (HTTP {r.status_code})")
              sys.exit(1)
          print("✅ Redmine 접속 확인")
          EOF

      - name: Patch config URL from secret
        working-directory: publish/redmine
        env:
          REDMINE_URL: ${{ secrets.REDMINE_URL }}
        run: |
          python3 - <<'EOF'
          import os, yaml
          url = os.environ.get("REDMINE_URL", "")
          if not url:
              import sys; sys.exit(0)
          with open("config.yaml") as f:
              cfg = yaml.safe_load(f)
          cfg["redmine"]["url"] = url
          with open("config.yaml", "w") as f:
              yaml.dump(cfg, f, allow_unicode=True, sort_keys=False)
          print(f"config.yaml URL → {url}")
          EOF

      - name: vault-push --changed
        working-directory: publish/redmine
        env:
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
        run: python3 sync.py --changed

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redmine-sync-log-${{ github.run_id }}
          path: .claude/states/redmine_sync.db
          if-no-files-found: ignore
          retention-days: 30
