standard_id: VWAY_Motors
base_standard: Automotive SPICE 4.0
generated_at: "2026-05-06"
confirmed_at: "2026-05-06"
organization: VWAY Motors
domain: Automotive Software/Hardware Development
description: >
  VWAY Motors (Tier 1/2 자동차 부품·소프트웨어 공급업체) 전형 업무 흐름.
  ASPICE 4.0의 32개 프로세스를 모두 포괄하는 21개 업무 시나리오로 구성한다.
  Primary(공학·검증)·Supporting(품질/형상/문제/변경/ML데이터)·Organizational(관리/개선/재사용)
  3계층을 모두 반영하여, 양산 ECU·ADAS/AI 모델·HW 개발 라이프사이클을 포괄한다.

# ---------------------------------------------------------------------------
# Scenario Groups (Level 1 / Level 2 분류)
# ---------------------------------------------------------------------------
scenario_groups:
  - id: SG-1
    name: 제품 개발 프로세스
    description: 시스템·소프트웨어·하드웨어·ML 모델의 요구사항 정의부터 검증/통합까지의 핵심 V-모델 흐름
    sub_groups:
      - id: SG-1-1
        name: 시스템 엔지니어링
        scenarios: [SCN-001, SCN-002, SCN-003, SCN-004]
      - id: SG-1-2
        name: 소프트웨어 개발
        scenarios: [SCN-005, SCN-006, SCN-007, SCN-008]
      - id: SG-1-3
        name: 하드웨어 개발
        scenarios: [SCN-009, SCN-010]
      - id: SG-1-4
        name: 머신러닝 모델 개발
        scenarios: [SCN-011, SCN-012]
      - id: SG-1-5
        name: 검증·인도
        scenarios: [SCN-013, SCN-014]

  - id: SG-2
    name: 프로젝트 및 공급망 관리
    description: 프로젝트 운영, 공급자 모니터링, 리스크/측정 등 프로젝트 거버넌스 영역
    sub_groups:
      - id: SG-2-1
        name: 프로젝트 운영
        scenarios: [SCN-015, SCN-016, SCN-017]
      - id: SG-2-2
        name: 공급망 관리
        scenarios: [SCN-018]

  - id: SG-3
    name: 지원 및 변경/문제 처리
    description: 형상관리, 품질보증, 변경요청, 문제해결, ML 데이터 관리 등 지원 프로세스
    sub_groups:
      - id: SG-3-1
        name: 품질·형상·문제 관리
        scenarios: [SCN-019, SCN-020]

  - id: SG-4
    name: 조직 차원 개선·재사용
    description: 조직 단위 프로세스 개선과 재사용 자산 운영
    sub_groups:
      - id: SG-4-1
        name: 프로세스 개선·재사용
        scenarios: [SCN-021]

# ---------------------------------------------------------------------------
# Scenarios (총 21건, ASPICE 4.0 32개 프로세스 전부 포괄)
# ---------------------------------------------------------------------------
scenarios:
  # ===== SG-1-1 시스템 엔지니어링 =====
  - id: SCN-001
    level1: 제품 개발
    level2: 시스템 엔지니어링
    level3: 고객 요구사항 도출
    name: 고객 요구사항 도출 및 합의
    type: main
    scope_type: project
    description: >
      OEM(고객)으로부터 RFQ/사양서/표준(ISO 26262 ASIL, ISO 21434 CAL 등)을 수집·해석하여
      stakeholder requirements baseline을 수립한다. 변경사항은 합의·추적된다.
    related_processes: [SYS.1]
    standard_clauses: ["ASPICE 4.0 SYS.1"]
    typical_artifacts:
      - Stakeholder Requirements Specification
      - Customer RFQ / Statement of Work
      - Requirements Elicitation Minutes
      - Traceability matrix (customer ↔ stakeholder req)
    nodes:
      - {id: receive_rfq, label: OEM RFQ/사양 수령, type: core, standard_clause: "SYS.1.BP1"}
      - {id: stakeholder_workshop, label: 이해관계자 워크숍, type: core, standard_clause: "SYS.1.BP2"}
      - {id: elicit_requirements, label: 요구사항 도출·문서화, type: core, standard_clause: "SYS.1.BP3"}
      - {id: agree_baseline, label: 요구사항 합의·베이스라인, type: core, standard_clause: "SYS.1.BP5"}
      - {id: cm_baseline_lock, label: 형상관리 베이스라인 등록, type: support, standard_clause: "SUP.8"}
    edges:
      - {from: receive_rfq, to: stakeholder_workshop}
      - {from: stakeholder_workshop, to: elicit_requirements}
      - {from: elicit_requirements, to: agree_baseline}
      - {from: agree_baseline, to: cm_baseline_lock}
    mermaid: |
      flowchart LR
        A[OEM RFQ 수령] --> B[이해관계자 워크숍]
        B --> C[요구사항 도출]
        C --> D[합의·베이스라인]
        D --> E[(SUP.8 베이스라인 등록)]

  - id: SCN-002
    level1: 제품 개발
    level2: 시스템 엔지니어링
    level3: 시스템 요구사항 분석
    name: 시스템 요구사항 분석 및 추적성 확립
    type: main
    scope_type: project
    description: >
      Stakeholder 요구사항을 기능/비기능 시스템 요구사항으로 분해하고
      ASIL 분배·시험 가능성·일관성을 검증한다.
    related_processes: [SYS.2]
    standard_clauses: ["ASPICE 4.0 SYS.2"]
    typical_artifacts:
      - System Requirements Specification (SyRS)
      - Bidirectional traceability matrix
      - System requirement review record
    nodes:
      - {id: refine_sys_req, label: 시스템 요구사항 정제, type: core, standard_clause: "SYS.2.BP1"}
      - {id: classify_asil, label: ASIL/CAL 분류 및 속성 부여, type: core, standard_clause: "SYS.2.BP2"}
      - {id: analyze_impact, label: 영향분석·일관성 분석, type: core, standard_clause: "SYS.2.BP3"}
      - {id: trace_to_stakeholder, label: 이해관계자 요구 추적성 수립, type: core, standard_clause: "SYS.2.BP5"}
      - {id: review_syrs, label: SyRS 검토(QA), type: support, standard_clause: "SUP.1"}
    edges:
      - {from: refine_sys_req, to: classify_asil}
      - {from: classify_asil, to: analyze_impact}
      - {from: analyze_impact, to: trace_to_stakeholder}
      - {from: trace_to_stakeholder, to: review_syrs}
    mermaid: |
      flowchart LR
        A[시스템 요구 정제] --> B[ASIL 분류]
        B --> C[영향/일관성 분석]
        C --> D[추적성 수립]
        D --> E[(SUP.1 검토)]

  - id: SCN-003
    level1: 제품 개발
    level2: 시스템 엔지니어링
    level3: 시스템 아키텍처 설계
    name: 시스템 아키텍처 설계 및 분배
    type: main
    scope_type: project
    description: >
      ECU/도메인 컨트롤러의 시스템 요소를 정의하고 SW/HW/ML 요소로 요구사항을 분배한다.
      인터페이스(CAN/Ethernet/SOME-IP)와 동적 행위를 명세한다.
    related_processes: [SYS.3]
    standard_clauses: ["ASPICE 4.0 SYS.3"]
    typical_artifacts:
      - System Architecture Description
      - Interface specification (ICD)
      - Allocation matrix (요구 ↔ 시스템 요소)
    nodes:
      - {id: define_arch, label: 시스템 아키텍처 정의, type: core, standard_clause: "SYS.3.BP1"}
      - {id: define_interface, label: 인터페이스 명세, type: core, standard_clause: "SYS.3.BP2"}
      - {id: dynamic_behavior, label: 동적 행위 정의, type: core, standard_clause: "SYS.3.BP3"}
      - {id: allocate_to_swhwml, label: SW/HW/ML 요소 분배, type: core, standard_clause: "SYS.3.BP4"}
      - {id: arch_review, label: 아키텍처 검토, type: support, standard_clause: "SUP.1"}
    edges:
      - {from: define_arch, to: define_interface}
      - {from: define_interface, to: dynamic_behavior}
      - {from: dynamic_behavior, to: allocate_to_swhwml}
      - {from: allocate_to_swhwml, to: arch_review}
    mermaid: |
      flowchart LR
        A[아키텍처 정의] --> B[인터페이스 명세]
        B --> C[동적 행위]
        C --> D[SW/HW/ML 분배]
        D --> E[(SUP.1 검토)]

  - id: SCN-004
    level1: 제품 개발
    level2: 시스템 엔지니어링
    level3: 시스템 통합·검증
    name: 시스템 통합 및 시스템 검증
    type: main
    scope_type: project
    description: >
      통합된 SW/HW/ML 요소를 단계적으로 결합하여 시스템 통합 테스트와
      시스템 요구사항 대비 검증(HIL/벤치/차량)을 수행한다.
    related_processes: [SYS.4, SYS.5]
    standard_clauses: ["ASPICE 4.0 SYS.4", "ASPICE 4.0 SYS.5"]
    typical_artifacts:
      - Integration test plan/spec/report
      - System verification plan/spec/report
      - HIL/Bench/차량 시험 결과
    nodes:
      - {id: integration_strategy, label: 통합 전략 수립, type: core, standard_clause: "SYS.4.BP1"}
      - {id: integration_test_design, label: 통합 시험 설계, type: core, standard_clause: "SYS.4.BP2"}
      - {id: integrate_elements, label: SW/HW/ML 요소 통합, type: core, standard_clause: "SYS.4.BP3"}
      - {id: integration_test_exec, label: 통합 시험 실행, type: core, standard_clause: "SYS.4.BP4"}
      - {id: sys_verification_design, label: 시스템 검증 설계, type: core, standard_clause: "SYS.5.BP2"}
      - {id: sys_verification_exec, label: 시스템 검증 실행 (HIL/차량), type: core, standard_clause: "SYS.5.BP3"}
      - {id: verification_report, label: 검증 결과 보고·이슈 등록, type: support, standard_clause: "SUP.9"}
    edges:
      - {from: integration_strategy, to: integration_test_design}
      - {from: integration_test_design, to: integrate_elements}
      - {from: integrate_elements, to: integration_test_exec}
      - {from: integration_test_exec, to: sys_verification_design}
      - {from: sys_verification_design, to: sys_verification_exec}
      - {from: sys_verification_exec, to: verification_report}
    mermaid: |
      flowchart LR
        A[통합 전략] --> B[통합 시험 설계]
        B --> C[SW/HW/ML 통합]
        C --> D[통합 시험 실행]
        D --> E[시스템 검증 설계]
        E --> F[시스템 검증 실행]
        F --> G[(SUP.9 이슈 등록)]

  # ===== SG-1-2 소프트웨어 개발 =====
  - id: SCN-005
    level1: 제품 개발
    level2: 소프트웨어 개발
    level3: SW 요구사항 분석
    name: 소프트웨어 요구사항 분석
    type: main
    scope_type: project
    description: >
      시스템 요구사항/아키텍처에서 SW 요구사항을 도출하고 분석한다.
      ASIL 상속·시험 가능성·인터페이스 일관성을 보장한다.
    related_processes: [SWE.1]
    standard_clauses: ["ASPICE 4.0 SWE.1"]
    typical_artifacts:
      - Software Requirements Specification (SwRS)
      - SW 요구사항 검토 결과
      - 추적성 매트릭스 (SyRS ↔ SwRS)
    nodes:
      - {id: derive_sw_req, label: SW 요구사항 도출, type: core, standard_clause: "SWE.1.BP1"}
      - {id: classify_sw_req, label: SW 요구사항 분류·속성 부여, type: core, standard_clause: "SWE.1.BP2"}
      - {id: analyze_consistency, label: 일관성·영향 분석, type: core, standard_clause: "SWE.1.BP3"}
      - {id: trace_sw_to_sys, label: 시스템 요구 추적성, type: core, standard_clause: "SWE.1.BP5"}
      - {id: sw_req_review, label: SwRS 검토, type: support, standard_clause: "SUP.1"}
    edges:
      - {from: derive_sw_req, to: classify_sw_req}
      - {from: classify_sw_req, to: analyze_consistency}
      - {from: analyze_consistency, to: trace_sw_to_sys}
      - {from: trace_sw_to_sys, to: sw_req_review}
    mermaid: |
      flowchart LR
        A[SW 요구 도출] --> B[분류·속성]
        B --> C[일관성 분석]
        C --> D[추적성]
        D --> E[(SUP.1 검토)]

  - id: SCN-006
    level1: 제품 개발
    level2: 소프트웨어 개발
    level3: SW 아키텍처 설계
    name: 소프트웨어 아키텍처 설계
    type: main
    scope_type: project
    description: >
      AUTOSAR 기반 SW 컴포넌트와 인터페이스, 동적 행위, 자원 소비 분석을 정의한다.
    related_processes: [SWE.2]
    standard_clauses: ["ASPICE 4.0 SWE.2"]
    typical_artifacts:
      - Software Architecture Description
      - SW Interface specification
      - Resource consumption analysis
    nodes:
      - {id: define_sw_arch, label: SW 아키텍처 정의, type: core, standard_clause: "SWE.2.BP1"}
      - {id: define_sw_interface, label: SW 인터페이스 명세, type: core, standard_clause: "SWE.2.BP2"}
      - {id: dynamic_sw_behavior, label: SW 동적 행위 분석, type: core, standard_clause: "SWE.2.BP3"}
      - {id: allocate_sw_req, label: SW 컴포넌트 요구 분배, type: core, standard_clause: "SWE.2.BP4"}
      - {id: sw_arch_review, label: SW 아키텍처 검토, type: support, standard_clause: "SUP.1"}
    edges:
      - {from: define_sw_arch, to: define_sw_interface}
      - {from: define_sw_interface, to: dynamic_sw_behavior}
      - {from: dynamic_sw_behavior, to: allocate_sw_req}
      - {from: allocate_sw_req, to: sw_arch_review}
    mermaid: |
      flowchart LR
        A[SW 아키텍처] --> B[인터페이스 명세]
        B --> C[동적 행위]
        C --> D[요구 분배]
        D --> E[(SUP.1 검토)]

  - id: SCN-007
    level1: 제품 개발
    level2: 소프트웨어 개발
    level3: 상세설계·구현
    name: SW 상세설계 및 유닛 구현
    type: main
    scope_type: project
    description: >
      SW 유닛 상세설계, 코딩 표준(MISRA-C 등) 준수 코드 작성, 정적 분석을 수행한다.
    related_processes: [SWE.3]
    standard_clauses: ["ASPICE 4.0 SWE.3"]
    typical_artifacts:
      - Software Detailed Design
      - Source code (MISRA 준수)
      - 정적 분석 리포트
      - 유닛 코드 리뷰 기록
    nodes:
      - {id: detailed_design, label: 유닛 상세설계, type: core, standard_clause: "SWE.3.BP1"}
      - {id: define_unit_interface, label: 유닛 인터페이스 명세, type: core, standard_clause: "SWE.3.BP2"}
      - {id: implement_units, label: 유닛 코딩, type: core, standard_clause: "SWE.3.BP4"}
      - {id: static_analysis, label: 정적분석/코드리뷰, type: support, standard_clause: "SUP.1"}
      - {id: cm_commit, label: 형상관리 커밋, type: support, standard_clause: "SUP.8"}
    edges:
      - {from: detailed_design, to: define_unit_interface}
      - {from: define_unit_interface, to: implement_units}
      - {from: implement_units, to: static_analysis}
      - {from: static_analysis, to: cm_commit}
    mermaid: |
      flowchart LR
        A[상세설계] --> B[인터페이스]
        B --> C[코딩]
        C --> D[(정적분석)]
        D --> E[(SUP.8 커밋)]

  - id: SCN-008
    level1: 제품 개발
    level2: 소프트웨어 개발
    level3: SW 검증·통합
    name: SW 유닛/컴포넌트/통합/SW 검증
    type: main
    scope_type: project
    description: >
      유닛 테스트, 컴포넌트/통합 테스트, SW 요구사항 대비 SW 검증까지
      ASPICE V-모델 우측 SW 사이드 흐름을 일괄 수행한다.
    related_processes: [SWE.4, SWE.5, SWE.6]
    standard_clauses: ["ASPICE 4.0 SWE.4", "ASPICE 4.0 SWE.5", "ASPICE 4.0 SWE.6"]
    typical_artifacts:
      - Unit/Integration/Verification test plan, spec, report
      - 코드 커버리지 리포트
      - 회귀시험 결과
    nodes:
      - {id: unit_test_design, label: 유닛 시험 설계, type: core, standard_clause: "SWE.4.BP1"}
      - {id: unit_test_exec, label: 유닛 시험 실행 + 커버리지, type: core, standard_clause: "SWE.4.BP3"}
      - {id: integration_strategy_sw, label: SW 통합 전략, type: core, standard_clause: "SWE.5.BP1"}
      - {id: integration_test_sw, label: SW 컴포넌트/통합 시험, type: core, standard_clause: "SWE.5.BP4"}
      - {id: sw_verify_design, label: SW 검증 설계, type: core, standard_clause: "SWE.6.BP2"}
      - {id: sw_verify_exec, label: SW 검증 실행, type: core, standard_clause: "SWE.6.BP3"}
      - {id: log_problems, label: 결함 등록, type: support, standard_clause: "SUP.9"}
    edges:
      - {from: unit_test_design, to: unit_test_exec}
      - {from: unit_test_exec, to: integration_strategy_sw}
      - {from: integration_strategy_sw, to: integration_test_sw}
      - {from: integration_test_sw, to: sw_verify_design}
      - {from: sw_verify_design, to: sw_verify_exec}
      - {from: sw_verify_exec, to: log_problems}
    mermaid: |
      flowchart LR
        A[유닛 설계] --> B[유닛 실행]
        B --> C[통합 전략]
        C --> D[통합 시험]
        D --> E[SW 검증 설계]
        E --> F[SW 검증 실행]
        F --> G[(SUP.9)]

  # ===== SG-1-3 하드웨어 개발 =====
  - id: SCN-009
    level1: 제품 개발
    level2: 하드웨어 개발
    level3: HW 요구사항·설계
    name: 하드웨어 요구사항 분석 및 설계
    type: main
