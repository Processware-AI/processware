          D[CM 계획] --> E[항목식별] --> F[베이스라인] --> G[감사]
        end

  - id: SCN-020
    level1: 지원 프로세스
    level2: 품질·형상·문제 관리
    level3: 변경·문제 처리
    name: 변경요청·문제해결 처리
    type: exception
    scope_type: project
    description: >
      문제·결함 보고, 분석, 해결과 변경요청 접수·영향평가·승인·구현·검증을
      통합적으로 처리한다 (CCB 운영 포함).
    related_processes: [SUP.9, SUP.10]
    standard_clauses: ["ASPICE 4.0 SUP.9", "ASPICE 4.0 SUP.10"]
    typical_artifacts:
      - Problem Report / Change Request
      - Impact analysis record
      - CCB minutes
      - Verification of fix/change
    nodes:
      - {id: log_problem, label: 문제 보고/분류, type: core, standard_clause: "SUP.9.BP1"}
      - {id: analyze_problem, label: 원인 분석, type: core, standard_clause: "SUP.9.BP3"}
      - {id: resolve_problem, label: 문제 해결·검증, type: core, standard_clause: "SUP.9.BP4"}
      - {id: log_cr, label: 변경요청 등록, type: core, standard_clause: "SUP.10.BP1"}
      - {id: impact_analysis, label: 영향 평가, type: core, standard_clause: "SUP.10.BP3"}
      - {id: ccb_decision, label: CCB 승인, type: core, standard_clause: "SUP.10.BP4"}
      - {id: implement_change, label: 변경 구현·검증, type: core, standard_clause: "SUP.10.BP5"}
      - {id: cm_update, label: 형상관리 업데이트, type: support, standard_clause: "SUP.8"}
    edges:
      - {from: log_problem, to: analyze_problem}
      - {from: analyze_problem, to: resolve_problem}
      - {from: resolve_problem, to: log_cr}
      - {from: log_cr, to: impact_analysis}
      - {from: impact_analysis, to: ccb_decision}
      - {from: ccb_decision, to: implement_change}
      - {from: implement_change, to: cm_update}
    mermaid: |
      flowchart LR
        A[문제 보고] --> B[원인 분석] --> C[해결]
        C --> D[CR 등록] --> E[영향평가] --> F[CCB] --> G[구현·검증] --> H[(SUP.8)]

  # ===== SG-4-1 프로세스 개선·재사용 =====
  - id: SCN-021
    level1: 조직 차원
    level2: 프로세스 개선·재사용
    level3: 개선·재사용 자산 관리
    name: 조직 프로세스 개선 및 재사용 자산 관리
    type: main
    scope_type: common
    description: >
      조직 표준 프로세스의 평가·개선과 재사용 가능한 작업 산출물(컴포넌트, 라이브러리,
      문서 템플릿)의 식별·등록·유지·검색 가능성을 보장한다.
    related_processes: [PIM.3, REU.2]
    standard_clauses: ["ASPICE 4.0 PIM.3", "ASPICE 4.0 REU.2"]
    typical_artifacts:
      - Process improvement plan
      - Lessons learned, Process assessment report
      - Reuse asset register, Reuse strategy
    nodes:
      - {id: improvement_assessment, label: 프로세스 평가, type: core, standard_clause: "PIM.3.BP2"}
      - {id: identify_improvement, label: 개선 기회 식별, type: core, standard_clause: "PIM.3.BP3"}
      - {id: implement_improvement, label: 개선 실행·배포, type: core, standard_clause: "PIM.3.BP5"}
      - {id: reuse_strategy, label: 재사용 전략 수립, type: core, standard_clause: "REU.2.BP1"}
      - {id: reuse_register, label: 재사용 자산 등록, type: core, standard_clause: "REU.2.BP3"}
      - {id: reuse_maintain, label: 재사용 자산 유지/검색성 보장, type: core, standard_clause: "REU.2.BP4"}
      - {id: lessons_feedback, label: 교훈 피드백, type: support, standard_clause: "PIM.3.BP6"}
    edges:
      - {from: improvement_assessment, to: identify_improvement}
      - {from: identify_improvement, to: implement_improvement}
      - {from: implement_improvement, to: lessons_feedback}
      - {from: reuse_strategy, to: reuse_register}
      - {from: reuse_register, to: reuse_maintain}
    mermaid: |
      flowchart LR
        subgraph PIM
          A[평가] --> B[개선 기회] --> C[개선 실행] --> D[교훈]
        end
        subgraph REU
          E[전략] --> F[자산 등록] --> G[유지·검색성]
        end

