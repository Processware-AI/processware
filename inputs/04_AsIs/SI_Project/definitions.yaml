# 본 RFP 에서 사용된 약어·전문용어 정의
standard_id: SI_Project
definitions:
  - term: "HEIS"
    definition: "Institute Health & Environment Information System — 보건환경종합정보시스템. '05년 전국 15개 시도에 보급된 기존 시스템."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
  - term: "LIMS"
    definition: "Laboratory Information Management System — 실험실정보관리시스템. HEIS의 고도화 대상으로, 시험 접수·실험·결과 업무처리 시스템."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
  - term: "RDMS"
    definition: "Row Data Management System — 기초데이터관리시스템. 실험실 기기 원시데이터 통합관리 시스템."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
  - term: "DBMS"
    definition: "Database Management System — 데이터베이스 관리 시스템. 중형급 표준 관계형 DBMS 요구."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
  - term: "SLA"
    definition: "Service Level Agreement — 서비스 수준 협약."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
  - term: "EA"
    definition: "Enterprise Architecture — 정보화 아키텍처. 행정기관의 EA 현행화 의무 대상."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
  - term: "PMO"
    definition: "Project Management Office — 본 RFP 내 사용 가능 컨텍스트."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
  - term: "UI"
    definition: "User Interface — 사용자 인터페이스 표준 요구사항(SIR-002)."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
  - term: "D-클라우드"
    definition: "대구시 D-클라우드 — 본 사업의 이관 대상 인프라(오픈소스 DB 기반)."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
  - term: "기능점수"
    definition: "Software Function Point — SW사업정보저장소 제출용 산출지표(PSR-006)."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
  - term: "전자정부표준프레임워크"
    definition: "범정부 표준 개발 프레임워크 — COR-001 적용 의무."
    source: "RFP 본문 내 정의 또는 일반적 IT 약어"
