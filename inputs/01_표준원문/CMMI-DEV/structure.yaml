standard_id: CMMI-DEV
version: "1.3"
source_type: international_standard
publisher: "Software Engineering Institute, Carnegie Mellon University"
publication_report: "CMU/SEI-2010-TR-033 / ESC-TR-2010-033"
publication_date: "2010-11"
representations:
  - continuous   # 4 Capability Levels (CL0-CL3): Incomplete, Performed, Managed, Defined
  - staged       # 5 Maturity Levels (ML1-ML5): Initial, Managed, Defined, Quantitatively Managed, Optimizing
component_types:
  required:    [SG, GG]           # Specific Goal, Generic Goal — mandatory for compliance
  expected:    [SP, GP]           # Specific Practice, Generic Practice — alternatives possible
  informative: [subpractice, example_work_product, note, example, reference, elaboration]
numbering_scheme:
  specific_goal:     "SG {n}"
  generic_goal:      "GG {n}"
  specific_practice: "SP {x}.{y}"   # x = SG number, y = practice sequence
  generic_practice:  "GP {x}.{y}"   # x = GG number, y = practice sequence

