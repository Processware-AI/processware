    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: MA SG 1
  example_work_products:
  - Measurement objectives
  subpractices:
  - Document information needs and objectives.
  - Prioritize information needs and objectives.
  - Document, review, and update measurement objectives.
  - Provide feedback for refining and clarifying information needs and objectives as necessary.
  - Maintain traceability of measurement objectives to identified information needs and objectives.
  status: active_verbatim
  source_page: 177
- id: CMMIDEV-MA-SP1.2-REQ-001
  clause: MA SP 1.2
  clause_title: Specify Measures
  process_area: MA
  text: 'Specify measures to address measurement objectives.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: MA SG 1
  example_work_products:
  - Specifications of base and derived measures
  subpractices:
  - Identify candidate measures based on documented measurement objectives.
  - Maintain traceability of measures to measurement objectives.
  - Identify existing measures that already address measurement objectives.
  - Specify operational definitions for measures.
  - Prioritize, review, and update measures.
  status: active_verbatim
  source_page: 179
- id: CMMIDEV-MA-SP1.3-REQ-001
  clause: MA SP 1.3
  clause_title: Specify Data Collection and Storage Procedures
  process_area: MA
  text: 'Specify how measurement data are obtained and stored.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: MA SG 1
  example_work_products:
  - Data collection and storage procedures
  - Data collection tools
  subpractices:
  - Identify existing sources of data that are generated from current work products, processes, or transactions.
  - Identify measures for which data are needed but are not currently available.
  - Specify how to collect and store the data for each required measure.
  - Create data collection mechanisms and process guidance.
  - Support automatic collection of data as appropriate and feasible.
  - Prioritize, review, and update data collection and storage procedures.
  - Update measures and measurement objectives as necessary.
  status: active_verbatim
  source_page: 182
- id: CMMIDEV-MA-SP1.4-REQ-001
  clause: MA SP 1.4
  clause_title: Specify Analysis Procedures
  process_area: MA
  text: 'Specify how measurement data are analyzed and communicated.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: MA SG 1
  example_work_products:
  - Analysis specifications and procedures
  - Data analysis tools
  subpractices:
  - Specify and prioritize the analyses to be conducted and the reports to be prepared.
  - Select appropriate data analysis methods and tools.
  - Specify administrative procedures for analyzing data and communicating results.
  - Review and update the proposed content and format of specified analyses and reports.
  - Update measures and measurement objectives as necessary.
  - Specify criteria for evaluating the utility of analysis results and for evaluating the conduct of measurement and analysis activities.
  status: active_verbatim
  source_page: 183
- id: CMMIDEV-MA-SG2-REQ-001
  clause: MA SG 2
  clause_title: Provide Measurement Results
  process_area: MA
  text: 'Measurement results, which address identified information needs and objectives, are provided.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 186
- id: CMMIDEV-MA-SP2.1-REQ-001
  clause: MA SP 2.1
  clause_title: Obtain Measurement Data
