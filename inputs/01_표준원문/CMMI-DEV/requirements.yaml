  - A set of approved requirements
  subpractices:
  - Establish criteria for distinguishing appropriate requirements providers.
  - Establish objective criteria for the evaluation and acceptance of requirements.
  - Analyze requirements to ensure that established criteria are met.
  - Reach an understanding of requirements with requirements providers so that project participants can commit to them.
  status: active_verbatim
  source_page: 343
- id: CMMIDEV-REQM-SP1.2-REQ-001
  clause: REQM SP 1.2
  clause_title: Obtain Commitment to Requirements
  process_area: REQM
  text: 'Obtain commitment to requirements from project participants.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: REQM SG 1
  example_work_products:
  - Requirements impact assessments
  - Documented commitments to requirements and requirements changes
  subpractices:
  - Assess the impact of requirements on existing commitments.
  - Negotiate and record commitments.
  status: active_verbatim
  source_page: 344
- id: CMMIDEV-REQM-SP1.3-REQ-001
  clause: REQM SP 1.3
  clause_title: Manage Requirements Changes
  process_area: REQM
  text: 'Manage changes to requirements as they evolve during the project.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: REQM SG 1
  example_work_products:
  - Requirements change requests
  - Requirements change impact reports
  - Requirements status
  - Requirements database
  subpractices:
  - Document all requirements and requirements changes that are given to or generated by the project.
  - Maintain a requirements change history, including the rationale for changes.
  - Evaluate the impact of requirement changes from the standpoint of relevant stakeholders.
  - Make requirements and change data available to the project.
  status: active_verbatim
  source_page: 345
- id: CMMIDEV-REQM-SP1.4-REQ-001
  clause: REQM SP 1.4
  clause_title: Maintain Bidirectional Traceability of Requirements
  process_area: REQM
  text: 'Maintain bidirectional traceability among requirements and work products.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: REQM SG 1
  example_work_products:
  - Requirements traceability matrix
  - Requirements tracking system
  subpractices:
  - Maintain requirements traceability to ensure that the source of lower level (i.e., derived) requirements is documented.
  - Maintain requirements traceability from a requirement to its derived requirements and allocation to work products.
  - Generate a requirements traceability matrix.
  status: active_verbatim
  source_page: 345
- id: CMMIDEV-REQM-SP1.5-REQ-001
  clause: REQM SP 1.5
  clause_title: Ensure Alignment Between Project Work and Requirements
  process_area: REQM
  text: 'Ensure that project plans and work products remain aligned with requirements.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  target_asset_candidates:
  - PRO
  - REC
  parent_goal: REQM SG 1
  example_work_products:
  - Documentation of inconsistencies between requirements and project plans and work products, including sources and conditions
  - Corrective actions
  subpractices:
  - Review project plans, activities, and work products for consistency with requirements and changes made to them.
  - Identify the source of the inconsistency (if any).
  - Identify any changes that should be made to plans and work products resulting from changes to the requirements baseline.
  - Initiate any necessary corrective actions.
  status: active_verbatim
  source_page: 346
