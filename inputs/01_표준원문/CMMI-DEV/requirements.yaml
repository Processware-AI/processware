- id: CMMIDEV-RSKM-SP1.1-REQ-001
  clause: RSKM SP 1.1
  clause_title: Determine Risk Sources and Categories
  process_area: RSKM
  text: Determine risk sources and categories.
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
