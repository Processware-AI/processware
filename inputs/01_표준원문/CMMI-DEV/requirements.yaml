  - Support documentation for the product integration environment
  subpractices:
  - Identify the requirements for the product integration environment.
  - Identify verification procedures and criteria for the product integration environment.
  - Decide whether to make or buy the needed product integration environment.
  - Develop an integration environment if a suitable environment cannot be acquired.
  - Maintain the product integration environment throughout the project.
  - Dispose of those portions of the environment that are no longer useful.
