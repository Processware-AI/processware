  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Categories of interfaces
  - List of interfaces per category
  - Mapping of the interfaces to the product components and the product integration environment
  subpractices:
  - Review interface data for completeness and ensure complete coverage of all interfaces.
  - Ensure that product components and interfaces are marked to ensure easy and correct connection to the joining product component.
  - Periodically review the adequacy of interface descriptions.
  status: active_verbatim
  source_page: 263
  process_area: PI
  parent_goal: PI SG 2
- id: CMMIDEV-PI-SP2.2-REQ-001
  clause: PI SP 2.2
  clause_title: Manage Interfaces
