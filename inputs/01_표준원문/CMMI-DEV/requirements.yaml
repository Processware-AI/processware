  parent_goal: RD SG 3
- id: CMMIDEV-REQM-SG1-REQ-001
  clause: REQM SG 1
  clause_title: Manage Requirements
  process_area: REQM
  text: 'Requirements are managed and inconsistencies with project plans and work products are identified.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 343
- id: CMMIDEV-REQM-SP1.1-REQ-001
  clause: REQM SP 1.1
  clause_title: Understand Requirements
  process_area: REQM
  text: 'Develop an understanding with the requirements providers on the meaning of the requirements.

    '
