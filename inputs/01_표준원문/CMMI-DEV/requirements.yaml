  clause: OPF SP 1.3
  type: normative
  source_page: 207
  example_work_products:
  - Analysis of candidate process improvements
  - Identification of improvements for the organization's processes
  subpractices:
  - Determine candidate process improvements.
  - Prioritize candidate process improvements.
  - Identify and document the process improvements to be implemented.
  - Revise the list of planned process improvements to keep it current.
  status: active_verbatim
  process_area: OPF
  clause_title: Identify the Organization's Process Improvements
  text: Identify improvements to the organization's processes and process assets.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPF SG 1
- id: CMMIDEV-OPF-SG2-REQ-001
  clause: OPF SG 2
  type: normative
  source_page: 208
  status: active_verbatim
  process_area: OPF
  clause_title: Plan and Implement Process Actions
  text: Process actions that address improvements to the organization's processes and process assets are planned and implemented.
  component: required
  obligation: shall
  classification: process_requirement
- id: CMMIDEV-OPF-SP2.1-REQ-001
  clause: OPF SP 2.1
  type: normative
  source_page: 208
  example_work_products:
  - The organization's approved process action plans
  subpractices:
  - Identify strategies, approaches, and actions to address identified process improvements.
  - Establish process action teams to implement actions.
  - Document process action plans.
  - Review and negotiate process action plans with relevant stakeholders.
  - Revise process action plans as necessary.
  status: active_verbatim
  process_area: OPF
  clause_title: Establish Process Action Plans
  text: Establish and maintain process action plans to address improvements to the organization's processes and process assets.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPF SG 2
- id: CMMIDEV-OPF-SP2.2-REQ-001
  clause: OPF SP 2.2
  type: normative
  source_page: 209
  example_work_products:
  - Commitments among process action teams
  - Status and results of implementing process action plans
  - Plans for pilots
  subpractices:
  - Make process action plans readily available to relevant stakeholders.
  - Negotiate and document commitments among process action teams and revise their process action plans as necessary.
  - Track progress and commitments against process action plans.
  - Conduct joint reviews with process action teams and relevant stakeholders to monitor the progress and results of process actions.
  - Plan pilots needed to test selected process improvements.
  - Review the activities and work products of process action teams.
  - Identify, document, and track to closure issues encountered when implementing process action plans.
  - Ensure that results of implementing process action plans satisfy the organization's process improvement objectives.
  status: active_verbatim
  process_area: OPF
  clause_title: Implement Process Action Plans
  text: Implement process action plans.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPF SG 2
- id: CMMIDEV-OPF-SG3-REQ-001
  clause: OPF SG 3
  type: normative
  source_page: 210
  status: active_verbatim
  process_area: OPF
  clause_title: Deploy Organizational Process Assets and Incorporate Experiences
  text: Organizational process assets are deployed across the organization and process related experiences are incorporated into organizational process assets.
  component: required
  obligation: shall
  classification: process_requirement
- id: CMMIDEV-OPF-SP3.1-REQ-001
  clause: OPF SP 3.1
  type: normative
  source_page: 210
  example_work_products:
  - Plans for deploying organizational process assets and changes to them across the organization
  - Training materials for deploying organizational process assets and changes to them
  - Documentation of changes to organizational process assets
  - Support materials for deploying organizational process assets and changes to them
  subpractices:
  - Deploy organizational process assets across the organization.
  - Document changes to organizational process assets.
  - Deploy changes that were made to organizational process assets across the organization.
  - Provide guidance and consultation on the use of organizational process assets.
  status: active_verbatim
  process_area: OPF
  clause_title: Deploy Organizational Process Assets
  text: Deploy organizational process assets across the organization.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPF SG 3
- id: CMMIDEV-OPF-SP3.2-REQ-001
  clause: OPF SP 3.2
  type: normative
  source_page: 211
  example_work_products:
  - The organization's list of projects and the status of process deployment on each (i.e., existing and planned projects)
  - Guidelines for deploying the organization's set of standard processes on new projects
  - Records of tailoring and implementing the organization's set of standard processes
  subpractices:
  - Identify projects in the organization that are starting up.
  - Identify active projects that would benefit from implementing the organization's current set of standard processes.
  - Establish plans to implement the organization's current set of standard processes on the identified projects.
  - Assist projects in tailoring the organization's set of standard processes to meet their needs.
  - Maintain records of tailoring and implementing processes on the identified projects.
  - Ensure that the defined processes resulting from process tailoring are incorporated into plans for process compliance audits.
  - As the organization's set of standard processes is updated, identify which projects should implement the changes.
  status: active_verbatim
  process_area: OPF
  clause_title: Deploy Standard Processes
  text: Deploy the organization's set of standard processes to projects at their startup and deploy changes to them as appropriate throughout the life of each project.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPF SG 3
- id: CMMIDEV-OPF-SP3.3-REQ-001
  clause: OPF SP 3.3
  type: normative
  source_page: 212
  example_work_products:
  - Results of monitoring process implementation on projects
  - Status and results of process compliance audits
  - Results of reviewing selected process artifacts created as part of process tailoring and implementation
  subpractices:
  - Monitor the projects' use of organizational process assets and changes to them.
  - Review selected process artifacts created during the life of each project.
  - Review results of process compliance audits to determine how well the organization's set of standard processes has been deployed.
  - Identify, document, and track to closure issues related to implementing the organization's set of standard processes.
  status: active_verbatim
  process_area: OPF
  clause_title: Monitor the Implementation
  text: Monitor the implementation of the organization's set of standard processes and use of process assets on all projects.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPF SG 3
- id: CMMIDEV-OPF-SP3.4-REQ-001
  clause: OPF SP 3.4
  type: normative
  source_page: 213
  example_work_products:
  - Process improvement proposals
  - Process lessons learned
  - Measurements of organizational process assets
  - Improvement recommendations for organizational process assets
  - Records of the organization's process improvement activities
  - Information on organizational process assets and improvements to them
  subpractices:
  - Conduct periodic reviews of the effectiveness and suitability of the organization's set of standard processes and related organizational process assets relative to the process needs and objectives derived from the organization's business objectives.
  - Obtain feedback about the use of organizational process assets.
  - Derive lessons learned from defining, piloting, implementing, and deploying organizational process assets.
  - Make lessons learned available to people in the organization as appropriate.
  - Analyze measurement data obtained from the use of the organization's common set of measures.
  - Appraise processes, methods, and tools in use in the organization and develop recommendations for improving organizational process assets.
  - Make the best of the organization's processes, methods, and tools available to people in the organization as appropriate.
  - Manage process improvement proposals.
  - Establish and maintain records of the organization's process improvement activities.
  status: active_verbatim
  process_area: OPF
  clause_title: Incorporate Experiences into Organizational Process Assets
  text: Incorporate process related experiences derived from planning and performing the process into organizational process assets.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPF SG 3
- id: CMMIDEV-OPM-PURPOSE
  clause: OPM Purpose
  type: purpose_statement
  source_page: 217
  maturity_level: 5
  status: active_verbatim
  process_area: OPM
  clause_title: Organizational Performance Management Purpose
  text: The purpose of Organizational Performance Management (OPM) is to proactively manage the organization's performance to meet its business objectives.
  component: informative
- id: CMMIDEV-OPM-SG1-REQ-001
  clause: OPM SG 1
  type: normative
  source_page: 219
  maturity_level: 5
  status: active_verbatim
  process_area: OPM
  clause_title: Manage Business Performance
  text: The organization's business performance is managed using statistical and other quantitative techniques to understand process performance shortfalls, and to identify areas for process improvement.
  component: required
  obligation: shall
  classification: process_requirement
- id: CMMIDEV-OPM-SP1.1-REQ-001
  clause: OPM SP 1.1
  type: normative
  source_page: 220
  maturity_level: 5
  example_work_products:
  - Revised business objectives
  - Revised quality and process performance objectives
  - Senior management approval of revised business objectives and quality and process performance objectives
  - Communication of all revised objectives
  - Updated process performance measures
  subpractices:
  - Evaluate business objectives periodically to ensure they are aligned with business strategies.
  - Compare business objectives with actual process performance results to ensure they are realistic.
  - Prioritize business objectives based on documented criteria, such as the ability to win new business, retain existing clients, or accomplish other key business strategies.
  - Maintain quality and process performance objectives to address changes in business objectives.
  - Revise process performance measures to align with quality and process performance objectives.
  status: active_verbatim
  process_area: OPM
  clause_title: Maintain Business Objectives
  text: Maintain business objectives based on an understanding of business strategies and actual performance results.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPM SG 1
- id: CMMIDEV-OPM-SP1.2-REQ-001
  clause: OPM SP 1.2
  type: normative
  source_page: 221
  maturity_level: 5
  example_work_products:
  - Analysis of current capability vs. business objectives
  - Process performance shortfalls
  - Risks associated with meeting business objectives
  subpractices:
  - Periodically compare quality and process performance objectives to current process performance baselines to evaluate the ability of the organization to meet its business objectives.
  - Identify shortfalls where the actual process performance is not satisfying the business objectives.
  - Identify and analyze risks associated with not meeting business objectives.
  - Report results of the process performance and risk analyses to organizational leadership.
  status: active_verbatim
  process_area: OPM
  clause_title: Analyze Process Performance Data
  text: Analyze process performance data to determine the organization's ability to meet identified business objectives.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPM SG 1
- id: CMMIDEV-OPM-SP1.3-REQ-001
  clause: OPM SP 1.3
  type: normative
  source_page: 222
  maturity_level: 5
  example_work_products:
  - Potential areas for improvement
  subpractices:
  - Identify potential improvement areas based on the analysis of process performance shortfalls.
  - Document the rationale for the potential improvement areas, including references to applicable business objectives and process performance data.
  - Document anticipated costs and benefits associated with addressing potential improvement areas.
  - Communicate the set of potential improvement areas for further evaluation, prioritization, and use.
  status: active_verbatim
  process_area: OPM
  clause_title: Identify Potential Areas for Improvement
  text: Identify potential areas for improvement that could contribute to meeting business objectives.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPM SG 1
- id: CMMIDEV-OPM-SG2-REQ-001
  clause: OPM SG 2
  type: normative
  source_page: 222
  maturity_level: 5
  status: active_verbatim
  process_area: OPM
  clause_title: Select Improvements
  text: Improvements are proactively identified, evaluated using statistical and other quantitative techniques, and selected for deployment based on their contribution to meeting quality and process performance objectives.
  component: required
  obligation: shall
  classification: process_requirement
- id: CMMIDEV-OPM-SP2.1-REQ-001
  clause: OPM SP 2.1
  type: normative
  source_page: 223
  maturity_level: 5
  example_work_products:
  - Suggested incremental improvements
  - Suggested innovative improvements
  subpractices:
  - Elicit suggested improvements.
  - Identify suggested improvements as incremental or innovative.
  - Investigate innovative improvements that may improve the organization's processes and technologies.
  status: active_verbatim
  process_area: OPM
  clause_title: Elicit Suggested Improvements
  text: Elicit and categorize suggested improvements.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPM SG 2
- id: CMMIDEV-OPM-SP2.2-REQ-001
  clause: OPM SP 2.2
  type: normative
  source_page: 225
  maturity_level: 5
  example_work_products:
  - Suggested improvement proposals
  - Selected improvements to be validated
  subpractices:
  - Analyze the costs and benefits of suggested improvements.
  - Identify potential barriers and risks to deploying each suggested improvement.
  - Estimate the cost, effort, and schedule required for implementing, verifying, and deploying each suggested improvement.
  - Select suggested improvements for validation and possible implementation and deployment based on the evaluations.
  - Document the evaluation results of each selected improvement suggestion in an improvement proposal.
  - Determine the detailed changes needed to implement the improvement and document them in the improvement proposal.
  - Determine the validation method that will be used before broad-scale deployment of the change and document it in the improvement proposal.
  - Document results of the selection process.
  status: active_verbatim
  process_area: OPM
  clause_title: Analyze Suggested Improvements
  text: Analyze suggested improvements for their possible impact on achieving the organization's quality and process performance objectives.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPM SG 2
- id: CMMIDEV-OPM-SP2.3-REQ-001
  clause: OPM SP 2.3
  type: normative
  source_page: 227
  maturity_level: 5
  example_work_products:
  - Validation plans
  - Validation evaluation reports
  - Documented lessons learned from validation
  subpractices:
  - Plan the validation.
  - Review and get relevant stakeholder agreement on validation plans.
  - Consult with and assist those who perform the validation.
  - Create a trial implementation, in accordance with the validation plan, for selected improvements to be piloted.
  - Perform each validation in an environment that is similar to the environment present in a broad scale deployment.
  - Track validation against validation plans.
  - Review and document the results of validation.
  status: active_verbatim
  process_area: OPM
  clause_title: Validate Improvements
  text: Validate selected improvements.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPM SG 2
- id: CMMIDEV-OPM-SP2.4-REQ-001
  clause: OPM SP 2.4
  type: normative
  source_page: 229
  maturity_level: 5
  example_work_products:
  - Improvements selected for deployment
  - Updated process documentation and training
  subpractices:
  - Prioritize improvements for deployment.
  - Select improvements to be deployed.
  - Determine how to deploy each improvement.
  - Document results of the selection process.
  - Review any changes needed to implement the improvements.
  - Update the organizational process assets.
  status: active_verbatim
  process_area: OPM
  clause_title: Select and Implement Improvements for Deployment
  text: Select and implement improvements for deployment throughout the organization based on an evaluation of costs, benefits, and other factors.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPM SG 2
- id: CMMIDEV-OPM-SG3-REQ-001
  clause: OPM SG 3
  type: normative
  source_page: 230
  maturity_level: 5
  status: active_verbatim
  process_area: OPM
  clause_title: Deploy Improvements
  text: Measurable improvements to the organization's processes and technologies are deployed and evaluated using statistical and other quantitative techniques.
  component: required
  obligation: shall
  classification: process_requirement
- id: CMMIDEV-OPM-SP3.1-REQ-001
  clause: OPM SP 3.1
  type: normative
  source_page: 230
  maturity_level: 5
  example_work_products:
  - Deployment plans for selected improvements
  subpractices:
  - Determine how each improvement should be adjusted for deployment.
  - Identify strategies that address the potential barriers to deploying each improvement that were defined in the improvement proposals.
  - Identify the target project population for deployment of the improvement.
  - Establish measures and objectives for determining the value of each improvement with respect to the organization's quality and process performance objectives.
  - Document the plans for deploying selected improvements.
  - Review and get agreement with relevant stakeholders on the plans for deploying selected improvements.
  - Revise the plans for deploying selected improvements as necessary.
  status: active_verbatim
  process_area: OPM
  clause_title: Plan the Deployment
  text: Establish and maintain plans for deploying selected improvements.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPM SG 3
- id: CMMIDEV-OPM-SP3.2-REQ-001
  clause: OPM SP 3.2
  type: normative
  source_page: 232
  maturity_level: 5
  example_work_products:
  - Updated training materials (to reflect deployed improvements)
  - Documented results of improvement deployment activities
  - Revised improvement measures, objectives, priorities, and deployment plans
  subpractices:
  - Monitor the deployment of improvements using deployment plans.
  - Coordinate the deployment of improvements across the organization.
  - Deploy improvements in a controlled and disciplined manner.
  - Coordinate the deployment of improvements into the projects' defined processes as appropriate.
  - Provide consulting as appropriate to support deployment of improvements.
  - Provide updated training materials or develop communication packages to reflect improvements to organizational process assets.
  - Confirm that the deployment of all improvements is completed in accordance with the deployment plan.
  - Document and review results of improvement deployment.
  status: active_verbatim
  process_area: OPM
  clause_title: Manage the Deployment
  text: Manage the deployment of selected improvements.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPM SG 3
- id: CMMIDEV-OPM-SP3.3-REQ-001
  clause: OPM SP 3.3
  type: normative
  source_page: 233
  maturity_level: 5
  example_work_products:
  - Documented measures of the effects resulting from deployed improvements
  subpractices:
  - Measure the results of each improvement as implemented on the target projects, using the measures defined in the deployment plans.
  - Measure and analyze progress toward achieving the organization's quality and process performance objectives using statistical and other quantitative techniques and take corrective action as needed.
  status: active_verbatim
  process_area: OPM
  clause_title: Evaluate Improvement Effects
  text: Evaluate the effects of deployed improvements on quality and process performance using statistical and other quantitative techniques.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPM SG 3
- id: CMMIDEV-OPP-PURPOSE
  clause: OPP Purpose
  type: purpose_statement
  source_page: 235
  maturity_level: 4
  status: active_verbatim
  process_area: OPP
  clause_title: Organizational Process Performance Purpose
  text: The purpose of Organizational Process Performance (OPP) is to establish and maintain a quantitative understanding of the performance of selected processes in the organization's set of standard processes in support of achieving quality and process performance objectives, and to provide process performance data, baselines, and models to quantitatively manage the organization's projects.
  component: informative
- id: CMMIDEV-OPP-SG1-REQ-001
  clause: OPP SG 1
  type: normative
  source_page: 237
  maturity_level: 4
  status: active_verbatim
  process_area: OPP
  clause_title: Establish Performance Baselines and Models
  text: Baselines and models, which characterize the expected process performance of the organization's set of standard processes, are established and maintained.
  component: required
  obligation: shall
  classification: process_requirement
- id: CMMIDEV-OPP-SP1.1-REQ-001
  clause: OPP SP 1.1
  type: normative
  source_page: 237
  maturity_level: 4
  example_work_products:
  - Organization's quality and process performance objectives
  subpractices:
  - Review the organization's business objectives related to quality and process performance.
  - Define the organization's quantitative objectives for quality and process performance.
  - Define the priorities of the organization's objectives for quality and process performance.
  - Review, negotiate, and obtain commitment to the organization's quality and process performance objectives and their priorities from relevant stakeholders.
  - Revise the organization's quantitative objectives for quality and process performance as necessary.
  status: active_verbatim
  process_area: OPP
  clause_title: Establish Quality and Process Performance Objectives
  text: Establish and maintain the organization's quantitative objectives for quality and process performance, which are traceable to business objectives.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPP SG 1
- id: CMMIDEV-OPP-SP1.2-REQ-001
  clause: OPP SP 1.2
  type: normative
  source_page: 239
  maturity_level: 4
  example_work_products:
  - List of processes or subprocesses identified for process performance analyses with rationale for their selection including traceability to business objectives
  subpractices:
  - Establish the criteria to use when selecting subprocesses.
  - Select the subprocesses and document the rationale for their selection.
  - Establish and maintain traceability between the selected subprocesses, quality and process performance objectives, and business objectives.
  - Revise the selection as necessary.
  status: active_verbatim
  process_area: OPP
  clause_title: Select Processes
  text: Select processes or subprocesses in the organization's set of standard processes to be included in the organization's process performance analyses and maintain traceability to business objectives.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPP SG 1
- id: CMMIDEV-OPP-SP1.3-REQ-001
  clause: OPP SP 1.3
  type: normative
  source_page: 241
  maturity_level: 4
  example_work_products:
  - Definitions of selected measures of process performance with rationale for their selection including traceability to selected processes or subprocesses
  subpractices:
  - Select measures that reflect appropriate attributes of the selected processes or subprocesses to provide insight into the organization's quality and process performance.
  - Establish operational definitions for the selected measures.
  - Incorporate selected measures into the organization's set of common measures.
  - Revise the set of measures as necessary.
  status: active_verbatim
  process_area: OPP
  clause_title: Establish Process Performance Measures
  text: Establish and maintain definitions of measures to be included in the organization's process performance analyses.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPP SG 1
- id: CMMIDEV-OPP-SP1.4-REQ-001
  clause: OPP SP 1.4
  type: normative
  source_page: 242
  maturity_level: 4
  example_work_products:
  - Analysis of process performance data
  - Baseline data on the organization's process performance
  subpractices:
  - Collect the selected measurements for the selected processes and subprocesses.
  - Analyze the collected measures to establish a distribution or range of results that characterize the expected performance of selected processes or subprocesses when used on a project.
  - Establish and maintain the process performance baselines from collected measurements and analyses.
  - Review and get agreement with relevant stakeholders about the process performance baselines.
  - Make the process performance information available across the organization in the measurement repository.
  - Compare the process performance baselines to associated quality and process performance objectives to determine if those quality and process performance objectives are being achieved.
  - Revise the process performance baselines as necessary.
  status: active_verbatim
  process_area: OPP
  clause_title: Analyze Process Performance and Establish Process Performance Baselines
  text: Analyze the performance of the selected processes, and establish and maintain the process performance baselines.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPP SG 1
- id: CMMIDEV-OPP-SP1.5-REQ-001
  clause: OPP SP 1.5
  type: normative
  source_page: 244
  maturity_level: 4
  example_work_products:
  - Process performance models
  subpractices:
  - Establish process performance models based on the organization's set of standard processes and process performance baselines.
  - Calibrate process performance models based on the past results and current needs.
  - Review process performance models and get agreement with relevant stakeholders.
  - Support the projects' use of process performance models.
  - Revise process performance models as necessary.
  status: active_verbatim
  process_area: OPP
  clause_title: Establish Process Performance Models
  text: Establish and maintain process performance models for the organization's set of standard processes.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPP SG 1
- id: CMMIDEV-OT-PURPOSE
  clause: OT Purpose
  type: purpose_statement
  source_page: 247
  status: active_verbatim
  process_area: OT
  clause_title: Organizational Training Purpose
  text: The purpose of Organizational Training (OT) is to develop skills and knowledge of people so they can perform their roles effectively and efficiently.
  component: informative
- id: CMMIDEV-OT-SG1-REQ-001
  clause: OT SG 1
  type: normative
  source_page: 248
  status: active_verbatim
  process_area: OT
  clause_title: Establish an Organizational Training Capability
  text: A training capability, which supports the roles in the organization, is established and maintained.
  component: required
  obligation: shall
  classification: process_requirement
- id: CMMIDEV-OT-SP1.1-REQ-001
  clause: OT SP 1.1
  type: normative
  source_page: 248
  example_work_products:
  - Training needs
  - Assessment analysis
  subpractices:
  - Analyze the organization's strategic business objectives and process improvement plan to identify potential training needs.
  - Document the strategic training needs of the organization.
  - Determine the roles and skills needed to perform the organization's set of standard processes.
  - Document the training needed to perform roles in the organization's set of standard processes.
  - Document the training needed to maintain the safe, secure, and continued operation of the business.
  - Revise the organization's strategic needs and required training as necessary.
  status: active_verbatim
  process_area: OT
  clause_title: Establish Strategic Training Needs
  text: Establish and maintain strategic training needs of the organization.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OT SG 1
- id: CMMIDEV-OT-SP1.2-REQ-001
  clause: OT SP 1.2
  type: normative
  source_page: 250
  example_work_products:
  - Common project and support group training needs
  - Training commitments
  subpractices:
  - Analyze the training needs identified by projects and support groups.
  - Negotiate with projects and support groups on how their training needs will be satisfied.
  - Document commitments for providing training support to projects and support groups.
  status: active_verbatim
  process_area: OT
  clause_title: Determine Which Training Needs Are the Responsibility of the Organization
  text: Determine which training needs are the responsibility of the organization and which are left to the individual project or support group.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OT SG 1
- id: CMMIDEV-OT-SP1.3-REQ-001
  clause: OT SP 1.3
  type: normative
  source_page: 250
  example_work_products:
  - Organizational training tactical plan
  subpractices:
