    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: MA SG 2
  example_work_products:
  - Base and derived measurement data sets
  - Results of data integrity tests
  subpractices:
  - Obtain data for base measures.
  - Generate data for derived measures.
  - Perform data integrity checks as close to the source of data as possible.
  status: active_verbatim
  source_page: 186
- id: CMMIDEV-MA-SP2.2-REQ-001
  clause: MA SP 2.2
  clause_title: Analyze Measurement Data
  process_area: MA
  text: 'Analyze and interpret measurement data.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: MA SG 2
  example_work_products:
  - Analysis results and draft reports
  subpractices:
  - Conduct initial analyses, interpret results, and draw preliminary conclusions.
  - Conduct additional measurement and analysis as necessary and prepare results for presentation.
  - Review initial results with relevant stakeholders.
  - Refine criteria for future analyses.
  status: active_verbatim
  source_page: 187
- id: CMMIDEV-MA-SP2.3-REQ-001
  clause: MA SP 2.3
  clause_title: Store Data and Results
  process_area: MA
  text: 'Manage and store measurement data, measurement specifications, and analysis results.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: MA SG 2
  example_work_products:
  - Stored data inventory
  subpractices:
  - Review data to ensure their completeness, integrity, accuracy, and currency.
  - Store data according to data storage procedures.
  - Make stored contents available for use only to appropriate groups and staff members.
  - Prevent stored information from being used inappropriately.
  status: active_verbatim
  source_page: 187
- id: CMMIDEV-MA-SP2.4-REQ-001
  clause: MA SP 2.4
  clause_title: Communicate Results
