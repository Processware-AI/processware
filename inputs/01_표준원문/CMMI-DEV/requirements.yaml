  obligation: shall
  type: normative
  classification: evidence_requirement
  component: expected
  target_asset_candidates:
  - REC
  - MAT
  parent_goal: GG3
  subpractices:
  - Store process and product measures in the organization's measurement repository.
  - Submit documentation for inclusion in the organization's process asset library.
  - Document lessons learned from the process for inclusion in the organization's process asset library.
  - Propose improvements to the organizational process assets.
  status: active_verbatim
  source_page: 115
- id: CMMIDEV-CAR-SG1-REQ-001
  clause: CAR SG 1
  clause_title: Determine Causes of Selected Outcomes
  process_area: CAR
  text: 'Root causes of selected outcomes are systematically determined.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 128
- id: CMMIDEV-CAR-SP1.1-REQ-001
  clause: CAR SP 1.1
  clause_title: Select Outcomes for Analysis
  process_area: CAR
  text: 'Select outcomes for analysis.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CAR SG 1
  example_work_products:
  - Data to be used in the initial analysis
  - Initial analysis results data
  - Outcomes selected for further analysis
  subpractices:
  - Gather relevant data.
  - Determine which outcomes to analyze further.
  - Formally define the scope of the analysis, including a clear definition of the improvement needed or expected, stakeholders affected, target affected, etc.
  status: active_verbatim
  source_page: 129
- id: CMMIDEV-CAR-SP1.2-REQ-001
  clause: CAR SP 1.2
  clause_title: Analyze Causes
  process_area: CAR
  text: 'Perform causal analysis of selected outcomes and propose actions to address them.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CAR SG 1
  example_work_products:
  - Root cause analysis results
  - Action proposal
  subpractices:
  - Conduct causal analysis with those who are responsible for performing the task.
  - Analyze selected outcomes to determine their root causes.
  - Combine selected outcomes into groups based on their root causes.
  - Create an action proposal that documents actions to be taken to prevent the future occurrence of similar outcomes or to incorporate best practices into processes.
  status: active_verbatim
  source_page: 130
- id: CMMIDEV-CAR-SG2-REQ-001
  clause: CAR SG 2
  clause_title: Address Causes of Selected Outcomes
  process_area: CAR
  text: 'Root causes of selected outcomes are systematically addressed.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 132
- id: CMMIDEV-CAR-SP2.1-REQ-001
  clause: CAR SP 2.1
  clause_title: Implement Action Proposals
  process_area: CAR
  text: 'Implement selected action proposals developed in causal analysis.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CAR SG 2
  example_work_products:
  - Action proposals selected for implementation
  - Action plans
  subpractices:
  - Analyze action proposals and determine their priorities.
  - Select action proposals to be implemented.
  - Create action plans for implementing the selected action proposals.
  - Implement action plans.
  - Look for similar causes that may exist in other processes and work products and take action as appropriate.
  status: active_verbatim
  source_page: 132
- id: CMMIDEV-CAR-SP2.2-REQ-001
  clause: CAR SP 2.2
  clause_title: Evaluate the Effect of Implemented Actions
  process_area: CAR
  text: 'Evaluate the effect of implemented actions on process performance.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CAR SG 2
  example_work_products:
  - Analysis of process performance and change in process performance
  subpractices:
  - Measure and analyze the change in process performance of the project's affected processes or subprocesses.
  - Determine the impact of the change on achieving the project's quality and process performance objectives.
  - Determine and document appropriate actions if the process or subprocess improvements did not result in expected project benefits.
  status: active_verbatim
  source_page: 133
- id: CMMIDEV-CAR-SP2.3-REQ-001
  clause: CAR SP 2.3
  clause_title: Record Causal Analysis Data
  process_area: CAR
  text: 'Record causal analysis and resolution data for use across projects and the organization.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CAR SG 2
  example_work_products:
  - Causal analysis and resolution records
  - Organizational improvement proposals
  subpractices:
  - Record causal analysis data and make the data available so that other projects can make appropriate process changes and achieve similar results.
  - Submit process improvement proposals for the organization when the implemented actions are effective for the project as appropriate.
  status: active_verbatim
  source_page: 134
- id: CMMIDEV-CM-SG1-REQ-001
  clause: CM SG 1
  clause_title: Establish Baselines
  process_area: CM
  text: 'Baselines of identified work products are established.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 140
- id: CMMIDEV-CM-SP1.1-REQ-001
  clause: CM SP 1.1
  clause_title: Identify Configuration Items
  process_area: CM
  text: 'Identify configuration items, components, and related work products to be placed under configuration management.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CM SG 1
  example_work_products:
  - Identified configuration items
  subpractices:
  - Select configuration items and work products that compose them based on documented criteria.
  - Assign unique identifiers to configuration items.
  - Specify the important characteristics of each configuration item.
  - Specify when each configuration item is placed under configuration management.
  - Identify the owner responsible for each configuration item.
  - Specify relationships among configuration items.
  status: active_verbatim
  source_page: 140
- id: CMMIDEV-CM-SP1.2-REQ-001
  clause: CM SP 1.2
  clause_title: Establish a Configuration Management System
  process_area: CM
  text: 'Establish and maintain a configuration management and change management system for controlling work products.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CM SG 1
  example_work_products:
  - Configuration management system with controlled work products
  - Configuration management system access control procedures
  - Change request database
  subpractices:
  - Establish a mechanism to manage multiple levels of control.
  - Provide access control to ensure authorized access to the configuration management system.
  - Store and retrieve configuration items in a configuration management system.
  - Share and transfer configuration items between control levels in the configuration management system.
  - Store and recover archived versions of configuration items.
  - Store, update, and retrieve configuration management records.
  - Create configuration management reports from the configuration management system.
  - Preserve the contents of the configuration management system.
  - Revise the configuration management structure as necessary.
  status: active_verbatim
  source_page: 142
- id: CMMIDEV-CM-SP1.3-REQ-001
  clause: CM SP 1.3
  clause_title: Create or Release Baselines
  process_area: CM
  text: 'Create or release baselines for internal use and for delivery to the customer.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CM SG 1
  example_work_products:
  - Baselines
  - Description of baselines
  subpractices:
  - Obtain authorization from the CCB before creating or releasing baselines of configuration items.
  - Create or release baselines only from configuration items in the configuration management system.
  - Document the set of configuration items that are contained in a baseline.
  - Make the current set of baselines readily available.
  status: active_verbatim
  source_page: 143
- id: CMMIDEV-CM-SG2-REQ-001
  clause: CM SG 2
  clause_title: Track and Control Changes
  process_area: CM
  text: 'Changes to the work products under configuration management are tracked and controlled.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 144
- id: CMMIDEV-CM-SP2.1-REQ-001
  clause: CM SP 2.1
  clause_title: Track Change Requests
  process_area: CM
  text: 'Track change requests for configuration items.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CM SG 2
  example_work_products:
  - Change requests
  subpractices:
  - Initiate and record change requests in the change request database.
  - Analyze the impact of changes and fixes proposed in change requests.
  - Categorize and prioritize change requests.
  - Review change requests to be addressed in the next baseline with relevant stakeholders and get their agreement.
  - Track the status of change requests to closure.
  status: active_verbatim
  source_page: 144
- id: CMMIDEV-CM-SP2.2-REQ-001
  clause: CM SP 2.2
  clause_title: Control Configuration Items
  process_area: CM
  text: 'Control changes to configuration items.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CM SG 2
  example_work_products:
  - Revision history of configuration items
  - Archives of baselines
  subpractices:
  - Control changes to configuration items throughout the life of the product or service.
  - Obtain appropriate authorization before changed configuration items are entered into the configuration management system.
  - Check in and check out configuration items in the configuration management system for incorporation of changes in a manner that maintains the correctness and integrity of configuration items.
  - Perform reviews to ensure that changes have not caused unintended effects on the baselines (e.g., ensure that changes have not compromised the safety or security of the system).
  - Record changes to configuration items and reasons for changes as appropriate.
  status: active_verbatim
  source_page: 145
- id: CMMIDEV-CM-SG3-REQ-001
  clause: CM SG 3
  clause_title: Establish Integrity
  process_area: CM
  text: 'Integrity of baselines is established and maintained.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 146
- id: CMMIDEV-CM-SP3.1-REQ-001
  clause: CM SP 3.1
  clause_title: Establish Configuration Management Records
  process_area: CM
  text: 'Establish and maintain records describing configuration items.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CM SG 3
  example_work_products:
  - Revision history of configuration items
  - Change log
  - Change request records
  - Status of configuration items
  - Differences between baselines
  subpractices:
  - Record configuration management actions in sufficient detail so the content and status of each configuration item is known and previous versions can be recovered.
  - Ensure that relevant stakeholders have access to and knowledge of the configuration status of configuration items.
  - Specify the latest version of baselines.
  - Identify the version of configuration items that constitute a particular baseline.
  - Describe differences between successive baselines.
  - Revise the status and history (i.e., changes, other actions) of each configuration item as necessary.
  status: active_verbatim
  source_page: 146
- id: CMMIDEV-CM-SP3.2-REQ-001
  clause: CM SP 3.2
  clause_title: Perform Configuration Audits
  process_area: CM
  text: 'Perform configuration audits to maintain the integrity of configuration baselines.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: CM SG 3
  example_work_products:
  - Configuration audit results
  - Action items
  subpractices:
  - Assess the integrity of baselines.
  - Confirm that configuration management records correctly identify configuration items.
  - Review the structure and integrity of items in the configuration management system.
  - Confirm the completeness, correctness, and consistency of items in the configuration management system.
  - Confirm compliance with applicable configuration management standards and procedures.
  - Track action items from the audit to closure.
  status: active_verbatim
  source_page: 146
- id: CMMIDEV-DAR-SG1-REQ-001
  clause: DAR SG 1
  clause_title: Evaluate Alternatives
  process_area: DAR
  text: 'Decisions are based on an evaluation of alternatives using established criteria.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 151
- id: CMMIDEV-DAR-SP1.1-REQ-001
  clause: DAR SP 1.1
  clause_title: Establish Guidelines for Decision Analysis
  process_area: DAR
  text: 'Establish and maintain guidelines to determine which issues are subject to a formal evaluation process.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: DAR SG 1
  example_work_products:
  - Guidelines for when to apply a formal evaluation process
  subpractices:
  - Establish guidelines for when to use a formal evaluation process.
  - Incorporate the use of guidelines into the defined process as appropriate.
  status: active_verbatim
  source_page: 151
- id: CMMIDEV-DAR-SP1.2-REQ-001
  clause: DAR SP 1.2
  clause_title: Establish Evaluation Criteria
  process_area: DAR
  text: 'Establish and maintain criteria for evaluating alternatives and the relative ranking of these criteria.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: DAR SG 1
  example_work_products:
  - Documented evaluation criteria
  - Rankings of criteria importance
  subpractices:
  - Define the criteria for evaluating alternative solutions.
  - Define the range and scale for ranking the evaluation criteria.
  - Rank the criteria.
  - Assess the criteria and their relative importance.
  - Evolve the evaluation criteria to improve their validity.
  - Document the rationale for the selection and rejection of evaluation criteria.
  status: active_verbatim
  source_page: 152
- id: CMMIDEV-DAR-SP1.3-REQ-001
  clause: DAR SP 1.3
  clause_title: Identify Alternative Solutions
  process_area: DAR
  text: 'Identify alternative solutions to address issues.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: DAR SG 1
  example_work_products:
  - Identified alternatives
  subpractices:
  - Perform a literature search.
  - Identify alternatives for consideration in addition to the alternatives that may be provided with the issue.
  - Document proposed alternatives.
  status: active_verbatim
  source_page: 153
- id: CMMIDEV-DAR-SP1.4-REQ-001
  clause: DAR SP 1.4
  clause_title: Select Evaluation Methods
  process_area: DAR
  text: 'Select evaluation methods.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: DAR SG 1
  example_work_products:
  - Selected evaluation methods
  subpractices:
  - Select methods based on the purpose for analyzing a decision and on the availability of the information used to support the method.
  - Select evaluation methods based on their ability to focus on the issues at hand without being overly influenced by side issues.
  - Determine the measures needed to support the evaluation method.
  status: active_verbatim
  source_page: 154
- id: CMMIDEV-DAR-SP1.5-REQ-001
  clause: DAR SP 1.5
  clause_title: Evaluate Alternative Solutions
  process_area: DAR
  text: 'Evaluate alternative solutions using established criteria and methods.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: DAR SG 1
  example_work_products:
  - Evaluation results
  subpractices:
  - Evaluate proposed alternative solutions using the established evaluation criteria and selected methods.
  - Evaluate assumptions related to the evaluation criteria and the evidence that supports the assumptions.
  - Evaluate whether uncertainty in the values for alternative solutions affects the evaluation and address these uncertainties as appropriate.
  - Perform simulations, modeling, prototypes, and pilots as necessary to exercise the evaluation criteria, methods, and alternative solutions.
  - Consider new alternative solutions, criteria, or methods if proposed alternatives do not test well; repeat evaluations until alternatives do test well.
  - Document the results of the evaluation.
  status: active_verbatim
  source_page: 155
- id: CMMIDEV-DAR-SP1.6-REQ-001
  clause: DAR SP 1.6
  clause_title: Select Solutions
  process_area: DAR
  text: 'Select solutions from alternatives based on evaluation criteria.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: DAR SG 1
  example_work_products:
  - Recommended solutions to address significant issues
  subpractices:
  - Assess the risks associated with implementing the recommended solution.
  - Document and communicate to relevant stakeholders the results and rationale for the recommended solution.
  status: active_verbatim
  source_page: 156
- id: CMMIDEV-IPM-SG1-REQ-001
  clause: IPM SG 1
  clause_title: Use the Project's Defined Process
  process_area: IPM
  text: 'The project is conducted using a defined process tailored from the organization''s set of standard processes.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 159
- id: CMMIDEV-IPM-SP1.1-REQ-001
  clause: IPM SP 1.1
  clause_title: Establish the Project's Defined Process
  process_area: IPM
  text: 'Establish and maintain the project''s defined process from project startup through the life of the project.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: IPM SG 1
  example_work_products:
  - The project's defined process
  subpractices:
  - Select a lifecycle model from the ones available in organizational process assets.
  - Select standard processes from the organization's set of standard processes that best fit the needs of the project.
  - Tailor the organization's set of standard processes and other organizational process assets according to tailoring guidelines to produce the project's defined process.
  - Use other artifacts from the organization's process asset library as appropriate.
  - Document the project's defined process.
  - Conduct peer reviews of the project's defined process.
  - Revise the project's defined process as necessary.
  status: active_verbatim
  source_page: 159
- id: CMMIDEV-IPM-SP1.2-REQ-001
  clause: IPM SP 1.2
  clause_title: Use Organizational Process Assets for Planning Project Activities
  process_area: IPM
  text: 'Use organizational process assets and the measurement repository for estimating and planning project activities.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: IPM SG 1
  example_work_products:
  - Project estimates
  - Project plans
  subpractices:
  - Use the tasks and work products of the project's defined process as a basis for estimating and planning project activities.
  - Use the organization's measurement repository in estimating the project's planning parameters.
  status: active_verbatim
  source_page: 161
- id: CMMIDEV-IPM-SP1.3-REQ-001
  clause: IPM SP 1.3
  clause_title: Establish the Project's Work Environment
  process_area: IPM
  text: 'Establish and maintain the project''s work environment based on the organization''s work environment standards.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: IPM SG 1
  example_work_products:
  - Equipment and tools for the project
  - Installation, operation, and maintenance manuals for the project work environment
  - User surveys and results
  - Use, performance, and maintenance records
  - Support services for the project's work environment
  subpractices:
  - Plan, design, and install a work environment for the project.
  - Provide ongoing maintenance and operational support for the project's work environment.
  - Maintain the qualification of components of the project's work environment.
  - Periodically review how well the work environment is meeting project needs and supporting collaboration, and take action as appropriate.
  status: active_verbatim
  source_page: 162
- id: CMMIDEV-IPM-SP1.4-REQ-001
  clause: IPM SP 1.4
  clause_title: Integrate Plans
  process_area: IPM
  text: 'Integrate the project plan and other plans that affect the project to describe the project''s defined process.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: IPM SG 1
  example_work_products:
  - Integrated plans
  subpractices:
  - Integrate other plans that affect the project with the project plan.
  - Incorporate into the project plan the definitions of measures and measurement activities for managing the project.
  - Identify and analyze product and project interface risks.
  - Schedule tasks in a sequence that accounts for critical development and delivery factors and project risks.
  - Incorporate plans for performing peer reviews on work products of the project's defined process.
  - Incorporate the training needed to perform the project's defined process in the project's training plans.
  - Establish objective entry and exit criteria to authorize the initiation and completion of tasks described in the work breakdown structure (WBS).
  - Ensure that the project plan is appropriately compatible with the plans of relevant stakeholders.
  - Identify how conflicts will be resolved that arise among relevant stakeholders.
  status: active_verbatim
  source_page: 164
- id: CMMIDEV-IPM-SP1.5-REQ-001
  clause: IPM SP 1.5
  clause_title: Manage the Project Using Integrated Plans
  process_area: IPM
  text: 'Manage the project using the project plan, other plans that affect the project, and the project''s defined process.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: IPM SG 1
  example_work_products:
  - Work products created by performing the project's defined process
  - Collected measures (i.e., actuals) and status records or reports
  - Revised requirements, plans, and commitments
  - Integrated plans
  subpractices:
  - Implement the project's defined process using the organization's process asset library.
  - Monitor and control the project's activities and work products using the project's defined process, project plan, and other plans that affect the project.
  - Obtain and analyze selected measurements to manage the project and support organization needs.
  - Periodically review and align the project's performance with current and anticipated needs, objectives, and requirements of the organization, customer, and end users as appropriate.
  - Address causes of selected issues that can affect project objectives.
  status: active_verbatim
  source_page: 166
- id: CMMIDEV-IPM-SP1.6-REQ-001
  clause: IPM SP 1.6
  clause_title: Establish Teams
  process_area: IPM
  text: 'Establish and maintain teams.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: IPM SG 1
  example_work_products:
  - Documented shared vision
  - List of members assigned to each team
  - Team charters
  - Periodic team status reports
  subpractices:
  - Establish and maintain the project's shared vision.
  - Establish and maintain the team structure.
  - Establish and maintain each team.
  - Periodically evaluate the team structure and composition.
  status: active_verbatim
  source_page: 168
- id: CMMIDEV-IPM-SP1.7-REQ-001
  clause: IPM SP 1.7
  clause_title: Contribute to Organizational Process Assets
  process_area: IPM
  text: 'Contribute process related experiences to organizational process assets.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: IPM SG 1
  example_work_products:
  - Proposed improvements to organizational process assets
  - Actual process and product measures collected from the project
  - Documentation (e.g., exemplary process descriptions, plans, training modules, checklists, lessons learned)
  - Process artifacts associated with tailoring and implementing the organization's set of standard processes on the project
  subpractices:
  - Propose improvements to the organizational process assets.
  - Store process and product measures in the organization's measurement repository.
  - Submit documentation for possible inclusion in the organization's process asset library.
  - Document lessons learned from the project for inclusion in the organization's process asset library.
  - Provide process artifacts associated with tailoring and implementing the organization's set of standard processes in support of the organization's process monitoring activities.
  status: active_verbatim
  source_page: 169
- id: CMMIDEV-IPM-SG2-REQ-001
  clause: IPM SG 2
  clause_title: Coordinate and Collaborate with Relevant Stakeholders
  process_area: IPM
  text: 'Coordination and collaboration between the project and relevant stakeholders are conducted.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 171
- id: CMMIDEV-IPM-SP2.1-REQ-001
  clause: IPM SP 2.1
  clause_title: Manage Stakeholder Involvement
  process_area: IPM
  text: 'Manage the involvement of relevant stakeholders in the project.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: IPM SG 2
  example_work_products:
  - Agendas and schedules for collaborative activities
  - Recommendations for resolving relevant stakeholder issues
  - Documented issues (e.g., issues with stakeholder requirements, product and product component requirements, product architecture, product design)
  subpractices:
  - Coordinate with relevant stakeholders who should participate in project activities.
  - Ensure work products that are produced to satisfy commitments meet the requirements of the recipients.
  - Develop recommendations and coordinate actions to resolve misunderstandings and problems with requirements.
  status: active_verbatim
  source_page: 171
- id: CMMIDEV-IPM-SP2.2-REQ-001
  clause: IPM SP 2.2
  clause_title: Manage Dependencies
  process_area: IPM
  text: 'Participate with relevant stakeholders to identify, negotiate, and track critical dependencies.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: IPM SG 2
  example_work_products:
  - Defects, issues, and action items resulting from reviews with relevant stakeholders
  - Critical dependencies
  - Commitments to address critical dependencies
  - Status of critical dependencies
  subpractices:
  - Conduct reviews with relevant stakeholders.
  - Identify each critical dependency.
  - Establish need dates and plan dates for each critical dependency based on the project schedule.
  - Review and get agreement on commitments to address each critical dependency with those who are responsible for providing or receiving the work product.
  - Document critical dependencies and commitments.
  - Track the critical dependencies and commitments and take corrective action as appropriate.
  status: active_verbatim
  source_page: 172
- id: CMMIDEV-IPM-SP2.3-REQ-001
  clause: IPM SP 2.3
  clause_title: Resolve Coordination Issues
  process_area: IPM
  text: 'Resolve issues with relevant stakeholders.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: IPM SG 2
  example_work_products:
  - Relevant stakeholder coordination issues
  - Status of relevant stakeholder coordination issues
  subpractices:
  - Identify and document issues.
  - Communicate issues to relevant stakeholders.
  - Resolve issues with relevant stakeholders.
  - Escalate to appropriate managers the issues not resolvable with relevant stakeholders.
  - Track issues to closure.
  - Communicate with relevant stakeholders on the status and resolution of issues.
  status: active_verbatim
  source_page: 173
- id: CMMIDEV-MA-SG1-REQ-001
  clause: MA SG 1
  clause_title: Align Measurement and Analysis Activities
  process_area: MA
  text: 'Measurement objectives and activities are aligned with identified information needs and objectives.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 177
- id: CMMIDEV-MA-SP1.1-REQ-001
  clause: MA SP 1.1
  clause_title: Establish Measurement Objectives
  process_area: MA
