  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Table of relationships among the product components and the external environment
  - Table of relationships among the different product components
  - List of agreed-to interfaces defined for each pair of product components, when applicable
  - Reports from the interface control working group meetings
  - Action items for updating interfaces
  - Application program interface (API)
  - Updated interface description or agreement
  subpractices:
  - Ensure the compatibility of the interfaces throughout the life of the product.
  - Resolve conflict, noncompliance, and change issues.
  - Maintain a repository for interface data accessible to project participants.
  status: active_verbatim
  source_page: 264
  process_area: PI
  parent_goal: PI SG 2
- id: CMMIDEV-PI-SG3-REQ-001
  clause: PI SG 3
  clause_title: Assemble Product Components and Deliver the Product
  text: Verified product components are assembled and the integrated, verified, and validated product is delivered.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 266
  process_area: PI
- id: CMMIDEV-PI-SP3.1-REQ-001
  clause: PI SP 3.1
  clause_title: Confirm Readiness of Product Components for Integration
  text: Confirm, prior to assembly, that each product component required to assemble the product has been properly identified, behaves according to its description, and that the product component interfaces comply with the interface descriptions.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Acceptance documents for the received product components
  - Delivery receipts
  - Checked packing lists
  - Exception reports
  - Waivers
  subpractices:
  - Track the status of all product components as soon as they become available for integration.
  - Ensure that product components are delivered to the product integration environment in accordance with the product integration strategy and procedures.
  - Confirm the receipt of each properly identified product component.
  - Ensure that each received product component meets its description.
  - Check the configuration status against the expected configuration.
  - Perform a pre-check (e.g., by a visual inspection, using basic measures) of all the physical interfaces before connecting product components together.
  status: active_verbatim
  source_page: 266
  process_area: PI
  parent_goal: PI SG 3
- id: CMMIDEV-PI-SP3.2-REQ-001
  clause: PI SP 3.2
  clause_title: Assemble Product Components
  text: Assemble product components according to the product integration strategy and procedures.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Assembled product or product components
  subpractices:
  - Ensure the readiness of the product integration environment.
  - Conduct integration in accordance with the product integration strategy, procedures, and criteria.
  - Revise the product integration strategy, procedures, and criteria as appropriate.
  status: active_verbatim
  source_page: 267
  process_area: PI
  parent_goal: PI SG 3
- id: CMMIDEV-PI-SP3.3-REQ-001
  clause: PI SP 3.3
  clause_title: Evaluate Assembled Product Components
  text: Evaluate assembled product components for interface compatibility.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Exception reports
  - Interface evaluation reports
  - Product integration summary reports
  subpractices:
  - Conduct the evaluation of assembled product components following the product integration strategy, procedures, and criteria.
  - Record the evaluation results.
  status: active_verbatim
  source_page: 267
  process_area: PI
  parent_goal: PI SG 3
- id: CMMIDEV-PI-SP3.4-REQ-001
  clause: PI SP 3.4
  clause_title: Package and Deliver the Product or Product Component
  text: Package the assembled product or product component and deliver it to the customer.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Packaged product or product components
  - Delivery documentation
  subpractices:
  - Review the requirements, design, product, verification results, and documentation to ensure that issues affecting the packaging and delivery of the product are identified and resolved.
  - Use effective methods to package and deliver the assembled product.
  - Satisfy the applicable requirements and standards for packaging and delivering the product.
  - Prepare the operational site for installation of the product.
  - Deliver the product and related documentation and confirm receipt.
  - Install the product at the operational site and confirm correct operation.
  status: active_verbatim
  source_page: 268
  process_area: PI
  parent_goal: PI SG 3
