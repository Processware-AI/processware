  type: normative
  classification: process_requirement
  component: expected
  parent_goal: PP SG 3
  example_work_products:
  - Documented requests for commitments
  - Documented commitments
  subpractices:
  - Identify needed support and negotiate commitments with relevant stakeholders.
  - Document all organizational commitments, both full and provisional, ensuring the appropriate level of signatories.
  - Review internal commitments with senior management as appropriate.
  - Review external commitments with senior management as appropriate.
  - Identify commitments regarding interfaces between project elements and other projects and organizational units so that these commitments can be monitored.
  status: active_verbatim
  source_page: 298
- id: CMMIDEV-PPQA-SG1-REQ-001
  clause: PPQA SG 1
  clause_title: Objectively Evaluate Processes and Work Products
  process_area: PPQA
  text: 'Adherence of the performed process and associated work products to applicable process descriptions, standards, and procedures is objectively evaluated.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 303
- id: CMMIDEV-PPQA-SP1.1-REQ-001
  clause: PPQA SP 1.1
  clause_title: Objectively Evaluate Processes
  process_area: PPQA
  text: 'Objectively evaluate selected performed processes against applicable process descriptions, standards, and procedures.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: PPQA SG 1
  example_work_products:
  - Evaluation reports
  - Noncompliance reports
  - Corrective actions
  subpractices:
  - Promote an environment (created as part of project management) that encourages staff participation in identifying and reporting quality issues.
  - Establish and maintain clearly stated criteria for evaluations.
  - Use the stated criteria to evaluate selected performed processes for adherence to process descriptions, standards, and procedures.
  - Identify each noncompliance found during the evaluation.
  - Identify lessons learned that could improve processes.
  status: active_verbatim
  source_page: 303
- id: CMMIDEV-PPQA-SP1.2-REQ-001
  clause: PPQA SP 1.2
  clause_title: Objectively Evaluate Work Products
  process_area: PPQA
  text: 'Objectively evaluate selected work products against applicable process descriptions, standards, and procedures.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: PPQA SG 1
  example_work_products:
  - Evaluation reports
  - Noncompliance reports
  - Corrective actions
  subpractices:
  - Select work products to be evaluated based on documented sampling criteria if sampling is used.
  - Establish and maintain clearly stated criteria for the evaluation of selected work products.
  - Use the stated criteria during evaluations of selected work products.
  - Evaluate selected work products at selected times.
  - Identify each case of noncompliance found during evaluations.
  - Identify lessons learned that could improve processes.
  status: active_verbatim
  source_page: 304
- id: CMMIDEV-PPQA-SG2-REQ-001
  clause: PPQA SG 2
  clause_title: Provide Objective Insight
  process_area: PPQA
  text: 'Noncompliance issues are objectively tracked and communicated, and resolution is ensured.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 305
- id: CMMIDEV-PPQA-SP2.1-REQ-001
  clause: PPQA SP 2.1
  clause_title: Communicate and Resolve Noncompliance Issues
  process_area: PPQA
  text: 'Communicate quality issues and ensure the resolution of noncompliance issues with the staff and managers.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: PPQA SG 2
  example_work_products:
  - Corrective action reports
  - Evaluation reports
  - Quality trends
  subpractices:
  - Resolve each noncompliance with the appropriate members of the staff if possible.
  - Document noncompliance issues when they cannot be resolved in the project.
  - Escalate noncompliance issues that cannot be resolved in the project to the appropriate level of management designated to receive and act on noncompliance issues.
  - Analyze noncompliance issues to see if there are quality trends that can be identified and addressed.
  - Ensure that relevant stakeholders are aware of results of evaluations and quality trends in a timely manner.
  - Periodically review open noncompliance issues and trends with the manager designated to receive and act on noncompliance issues.
  - Track noncompliance issues to resolution.
  status: active_verbatim
  source_page: 305
- id: CMMIDEV-PPQA-SP2.2-REQ-001
  clause: PPQA SP 2.2
  clause_title: Establish Records
  process_area: PPQA
  text: 'Establish and maintain records of quality assurance activities.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: PPQA SG 2
  example_work_products:
  - Evaluation logs
  - Quality assurance reports
  - Status reports of corrective actions
  - Reports of quality trends
  subpractices:
  - Record process and product quality assurance activities in sufficient detail so that status and results are known.
  - Revise the status and history of quality assurance activities as necessary.
  status: active_verbatim
  source_page: 306
- id: CMMIDEV-QPM-SG1-REQ-001
  clause: QPM SG 1
  clause_title: Prepare for Quantitative Management
  process_area: QPM
  text: 'Preparation for quantitative management is conducted.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 310
- id: CMMIDEV-QPM-SP1.1-REQ-001
  clause: QPM SP 1.1
  clause_title: Establish the Project's Objectives
  process_area: QPM
  text: 'Establish and maintain the project''s quality and process performance objectives.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: QPM SG 1
  example_work_products:
  - The project's quality and process performance objectives
  - Assessment of the risk of not achieving the project's objectives
  subpractices:
  - Review the organization's objectives for quality and process performance.
  - Identify the quality and process performance needs and priorities of the customer, suppliers, end users, and other relevant stakeholders.
  - Define and document measurable quality and process performance objectives for the project.
  - Derive interim objectives to monitor progress toward achieving the project's objectives.
  - Determine the risk of not achieving the project's quality and process performance objectives.
  - Resolve conflicts among the project's quality and process performance objectives (e.g., if one objective cannot be achieved without compromising another).
  - Establish traceability to the project's quality and process performance objectives from their sources.
  - Define and negotiate quality and process performance objectives for suppliers.
  - Revise the project's quality and process performance objectives as necessary.
  status: active_verbatim
  source_page: 310
- id: CMMIDEV-QPM-SP1.2-REQ-001
  clause: QPM SP 1.2
  clause_title: Compose the Defined Process
  process_area: QPM
  text: 'Using statistical and other quantitative techniques, compose a defined process that enables the project to achieve its quality and process performance objectives.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: QPM SG 1
  example_work_products:
  - Criteria used to evaluate alternatives for the project
  - Alternative subprocesses
  - Subprocesses to be included in the project's defined process
  - Assessment of risk of not achieving the project's objectives
  subpractices:
  - Establish the criteria to use in evaluating process alternatives for the project.
  - Identify alternative processes and subprocesses for the project.
  - Analyze the interaction of alternative subprocesses to understand relationships among the subprocesses, including their attributes.
  - Evaluate alternative subprocesses against the criteria.
  - Select the alternative subprocesses that best meet the criteria.
  - Evaluate the risk of not achieving the project's quality and process performance objectives.
  status: active_verbatim
  source_page: 313
- id: CMMIDEV-QPM-SP1.3-REQ-001
  clause: QPM SP 1.3
  clause_title: Select Subprocesses and Attributes
  process_area: QPM
  text: 'Select subprocesses and attributes critical to evaluating performance and that help to achieve the project''s quality and process performance objectives.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: QPM SG 1
  example_work_products:
  - Criteria used to select subprocesses that are key contributors to achieving the project's objectives
  - Selected subprocesses
  - Attributes of selected subprocesses that help in predicting future project performance
  subpractices:
  - Analyze how subprocesses, their attributes, other factors, and project performance results relate to each other.
  - Identify criteria to be used in selecting subprocesses that are key contributors to achieving the project's quality and process performance objectives.
  - Select subprocesses using the identified criteria.
  - Identify product and process attributes to be monitored.
  status: active_verbatim
  source_page: 315
- id: CMMIDEV-QPM-SP1.4-REQ-001
  clause: QPM SP 1.4
  clause_title: Select Measures and Analytic Techniques
  process_area: QPM
  text: 'Select measures and analytic techniques to be used in quantitative management.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: QPM SG 1
  example_work_products:
  - Definitions of measures and analytic techniques to be used in quantitative management
  - Traceability of measures back to the project's quality and process performance objectives
  - Quality and process performance objectives for selected subprocesses and their attributes
  - Process performance baselines and models for use by the project
  subpractices:
  - Identify common measures from the organizational process assets that support quantitative management.
  - Identify additional measures that may be needed to cover critical product and process attributes of the selected subprocesses.
  - Identify the measures to be used in managing subprocesses.
  - Specify the operational definitions of measures, their collection points in subprocesses, and how the integrity of measures will be determined.
  - Analyze the relationship of identified measures to the project quality and process performance objectives and derive subprocess quality and process performance objectives that state targets (e.g., thresholds, ranges) to be met for each measured attribute of each selected subprocess.
  - Identify the statistical and other quantitative techniques to be used in quantitative management.
  - Determine what process performance baselines and models may be needed to support identified analyses.
  - Instrument the organizational or project support environment to support collection, derivation, and analysis of measures.
  - Revise measures and statistical analysis techniques as necessary.
  status: active_verbatim
  source_page: 317
- id: CMMIDEV-QPM-SG2-REQ-001
  clause: QPM SG 2
  clause_title: Quantitatively Manage the Project
  process_area: QPM
  text: 'The project is quantitatively managed.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 320
- id: CMMIDEV-QPM-SP2.1-REQ-001
  clause: QPM SP 2.1
  clause_title: Monitor the Performance of Selected Subprocesses
  process_area: QPM
  text: 'Monitor the performance of selected subprocesses using statistical and other quantitative techniques.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: QPM SG 2
  example_work_products:
  - Natural bounds of process performance for each selected subprocess attribute
  - The actions needed to address deficiencies in the process stability or capability of each selected subprocess
  subpractices:
  - Collect data, as defined by the selected measures, on the subprocesses as they execute.
  - Monitor the variation and stability of the selected subprocesses and address deficiencies.
  - Monitor the capability and performance of the selected subprocesses and address deficiencies.
  status: active_verbatim
  source_page: 320
- id: CMMIDEV-QPM-SP2.2-REQ-001
  clause: QPM SP 2.2
  clause_title: Manage Project Performance
  process_area: QPM
  text: 'Manage the project using statistical and other quantitative techniques to determine whether or not the project''s objectives for quality and process performance will be satisfied.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: QPM SG 2
  example_work_products:
  - Predictions of results to be achieved relative to the project's quality and process performance objectives
  - Graphical displays and data tabulations for other subprocesses, which support quantitative management
  - Assessment of risks of not achieving the project's quality and process performance objectives
  - Actions needed to address deficiencies in achieving project objectives
  subpractices:
  - Periodically review the performance of subprocesses.
  - Monitor and analyze suppliers' progress toward achieving their quality and process performance objectives.
  - Periodically review and analyze actual results achieved against established interim objectives.
  - Use process performance models calibrated with project data to assess progress toward achieving the project's quality and process performance objectives.
  - Identify and manage risks associated with achieving the project's quality and process performance objectives.
  - Determine and implement actions needed to address deficiencies in achieving the project's quality and process performance objectives.
  status: active_verbatim
  source_page: 321
- id: CMMIDEV-QPM-SP2.3-REQ-001
  clause: QPM SP 2.3
  clause_title: Perform Root Cause Analysis
  process_area: QPM
  text: 'Perform root cause analysis of selected issues to address deficiencies in achieving the project''s quality and process performance objectives.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: QPM SG 2
  example_work_products:
  - Subprocess and project performance measurements and analyses (including statistical analyses) recorded in the organization's measurement repository
  - Graphical displays of data used to understand subprocess and project performance and performance trends
  - Identified root causes and potential actions to take
  subpractices:
  - Perform root cause analysis, as appropriate, to diagnose process performance deficiencies.
  - Identify and analyze potential actions.
  - Implement selected actions.
  - Assess the impact of the actions on subprocess performance.
  status: active_verbatim
  source_page: 323
- id: CMMIDEV-RD-SG1-REQ-001
  clause: RD SG 1
  clause_title: Develop Customer Requirements
  text: Stakeholder needs, expectations, constraints, and interfaces are collected and translated into customer requirements.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 328
  process_area: RD
- id: CMMIDEV-RD-SP1.1-REQ-001
  clause: RD SP 1.1
  clause_title: Elicit Needs
  text: Elicit stakeholder needs, expectations, constraints, and interfaces for all phases of the product lifecycle.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Results of requirements elicitation activities
  subpractices:
  - Engage relevant stakeholders using methods for eliciting needs, expectations, constraints, and external interfaces.
  status: active_verbatim
  source_page: 329
  process_area: RD
  parent_goal: RD SG 1
- id: CMMIDEV-RD-SP1.2-REQ-001
  clause: RD SP 1.2
  clause_title: Transform Stakeholder Needs into Customer Requirements
  text: Transform stakeholder needs, expectations, constraints, and interfaces into prioritized customer requirements.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Prioritized customer requirements
  - Customer constraints on the conduct of verification
  - Customer constraints on the conduct of validation
  subpractices:
  - Translate stakeholder needs, expectations, constraints, and interfaces into documented customer requirements.
  - Establish and maintain a prioritization of customer functional and quality attribute requirements.
  - Define constraints for verification and validation.
  status: active_verbatim
  source_page: 330
  process_area: RD
  parent_goal: RD SG 1
- id: CMMIDEV-RD-SG2-REQ-001
  clause: RD SG 2
  clause_title: Develop Product Requirements
  text: Customer requirements are refined and elaborated to develop product and product component requirements.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 331
  process_area: RD
- id: CMMIDEV-RD-SP2.1-REQ-001
  clause: RD SP 2.1
  clause_title: Establish Product and Product Component Requirements
  text: Establish and maintain product and product component requirements, which are based on the customer requirements.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Derived requirements
  - Product requirements
  - Product component requirements
  - Architectural requirements, which specify or constrain the relationships among product components
  subpractices:
  - Develop requirements in technical terms necessary for product and product component design.
  - Derive requirements that result from design decisions.
  - Develop architectural requirements capturing critical quality attributes and quality attribute measures necessary for establishing the product architecture and design.
  - Establish and maintain relationships between requirements for consideration during change management and requirements allocation.
  status: active_verbatim
  source_page: 331
  process_area: RD
  parent_goal: RD SG 2
- id: CMMIDEV-RD-SP2.2-REQ-001
  clause: RD SP 2.2
  clause_title: Allocate Product Component Requirements
  text: Allocate the requirements for each product component.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Requirement allocation sheets
  - Provisional requirement allocations
  - Design constraints
  - Derived requirements
  - Relationships among derived requirements
  subpractices:
  - Allocate requirements to functions.
  - Allocate requirements to product components and the architecture.
  - Allocate design constraints to product components and the architecture.
  - Allocate requirements to delivery increments.
  - Document relationships among allocated requirements.
  status: active_verbatim
  source_page: 333
  process_area: RD
  parent_goal: RD SG 2
- id: CMMIDEV-RD-SP2.3-REQ-001
  clause: RD SP 2.3
  clause_title: Identify Interface Requirements
  text: Identify interface requirements.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Interface requirements
  subpractices:
  - Identify interfaces both external to the product and internal to the product (e.g., between functional partitions or objects).
  - Develop the requirements for the identified interfaces.
  status: active_verbatim
  source_page: 334
  process_area: RD
  parent_goal: RD SG 2
- id: CMMIDEV-RD-SG3-REQ-001
  clause: RD SG 3
  clause_title: Analyze and Validate Requirements
  text: The requirements are analyzed and validated.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 334
  process_area: RD
- id: CMMIDEV-RD-SP3.1-REQ-001
  clause: RD SP 3.1
  clause_title: Establish Operational Concepts and Scenarios
  text: Establish and maintain operational concepts and associated scenarios.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Operational concept
  - Product or product component development, installation, operational, maintenance, and support concepts
  - Disposal concepts
  - Use cases
  - Timeline scenarios
  - New requirements
  subpractices:
  - Develop operational concepts and scenarios that include operations, installation, development, maintenance, support, and disposal as appropriate.
  - Define the environment in which the product or product component will operate, including boundaries and constraints.
  - Review operational concepts and scenarios to refine and discover requirements.
  - Develop a detailed operational concept, as products and product components are selected, that defines the interaction of the product, the end user, and the environment, and that satisfies the operational, maintenance, support, and disposal needs.
  status: active_verbatim
  source_page: 335
  process_area: RD
  parent_goal: RD SG 3
- id: CMMIDEV-RD-SP3.2-REQ-001
  clause: RD SP 3.2
  clause_title: Establish a Definition of Required Functionality and Quality Attributes
  text: Establish and maintain a definition of required functionality and quality attributes.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Definition of required functionality and quality attributes
  - Functional architecture
  - Activity diagrams and use cases
  - Object oriented analysis with services or methods identified
  - Architecturally significant quality attribute requirements
  subpractices:
  - Determine key mission and business drivers.
  - Identify desirable functionality and quality attributes.
  - Determine architecturally significant quality attributes based on key mission and business drivers.
  - Analyze and quantify functionality required by end users.
  - Analyze requirements to identify logical or functional partitions (e.g., subfunctions).
  - Partition requirements into groups, based on established criteria (e.g., similar functionality, similar quality attribute requirements, coupling), to facilitate and focus the requirements analysis.
  - Allocate customer requirements to functional partitions, objects, people, or support elements to support the synthesis of solutions.
  - Allocate requirements to functions and subfunctions (or other logical entities).
  status: active_verbatim
  source_page: 336
  process_area: RD
  parent_goal: RD SG 3
- id: CMMIDEV-RD-SP3.3-REQ-001
  clause: RD SP 3.3
  clause_title: Analyze Requirements
  text: Analyze requirements to ensure that they are necessary and sufficient.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Requirements defects reports
  - Proposed requirements changes to resolve defects
  - Key requirements
  - Technical performance measures
  subpractices:
  - Analyze stakeholder needs, expectations, constraints, and external interfaces to organize them into related subjects and remove conflicts.
  - Analyze requirements to determine whether they satisfy the objectives of higher level requirements.
  - Analyze requirements to ensure that they are complete, feasible, realizable, and verifiable.
  - Identify key requirements that have a strong influence on cost, schedule, performance, or risk.
  - Identify technical performance measures that will be tracked during the development effort.
  - Analyze operational concepts and scenarios to refine the customer needs, constraints, and interfaces and to discover new requirements.
  status: active_verbatim
  source_page: 337
  process_area: RD
  parent_goal: RD SG 3
- id: CMMIDEV-RD-SP3.4-REQ-001
  clause: RD SP 3.4
  clause_title: Analyze Requirements to Achieve Balance
  text: Analyze requirements to balance stakeholder needs and constraints.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Assessment of risks related to requirements
  subpractices:
  - Use proven models, simulations, and prototyping to analyze the balance of stakeholder needs and constraints.
  - Perform a risk assessment on the requirements and definition of required functionality and quality attributes.
  - Examine product lifecycle concepts for impacts of requirements on risks.
  - Assess the impact of the architecturally significant quality attribute requirements on the product and product development costs and risks.
  status: active_verbatim
  source_page: 339
  process_area: RD
  parent_goal: RD SG 3
- id: CMMIDEV-RD-SP3.5-REQ-001
  clause: RD SP 3.5
  clause_title: Validate Requirements
  text: Validate requirements to ensure the resulting product will perform as intended in the end user's environment.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Record of analysis methods and results
  subpractices:
  - Analyze the requirements to determine the risk that the resulting product will not perform appropriately in its intended use environment.
  - Explore the adequacy and completeness of requirements by developing product representations (e.g., prototypes, simulations, models, scenarios, storyboards) and by obtaining feedback about them from relevant stakeholders.
  - Assess the design as it matures in the context of the requirements validation environment to identify validation issues and expose unstated needs and customer requirements.
  status: active_verbatim
  source_page: 339
