  example_work_products:
  - Delivered reports and related analysis results
  - Contextual information or guidance to help interpret analysis results
  subpractices:
  - Keep relevant stakeholders informed of measurement results in a timely manner.
  - Assist relevant stakeholders in understanding results.
  status: active_verbatim
  source_page: 189
- id: CMMIDEV-OPD-PURPOSE
  clause: OPD Purpose
  type: purpose_statement
  source_page: 191
  status: active_verbatim
  process_area: OPD
  clause_title: Organizational Process Definition Purpose
  text: The purpose of Organizational Process Definition (OPD) is to establish and maintain a usable set of organizational process assets, work environment standards, and rules and guidelines for teams.
  component: informative
- id: CMMIDEV-OPD-SG1-REQ-001
  clause: OPD SG 1
  type: normative
  source_page: 192
  status: active_verbatim
  process_area: OPD
  clause_title: Establish Organizational Process Assets
  text: A set of organizational process assets is established and maintained.
  component: required
  obligation: shall
  classification: process_requirement
- id: CMMIDEV-OPD-SP1.1-REQ-001
  clause: OPD SP 1.1
  type: normative
  source_page: 192
  example_work_products:
  - Organization's set of standard processes
  subpractices:
  - Decompose each standard process into constituent process elements to the detail needed to understand and describe the process.
  - Specify the critical attributes of each process element.
  - Specify relationships among process elements.
  - Ensure that the organization's set of standard processes adheres to applicable policies, standards, and models.
  - Ensure that the organization's set of standard processes satisfies process needs and objectives of the organization.
  - Ensure that there is appropriate integration among processes that are included in the organization's set of standard processes.
  - Document the organization's set of standard processes.
  - Conduct peer reviews on the organization's set of standard processes.
  - Revise the organization's set of standard processes as necessary.
  status: active_verbatim
  process_area: OPD
  clause_title: Establish Standard Processes
  text: Establish and maintain the organization's set of standard processes.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPD SG 1
- id: CMMIDEV-OPD-SP1.2-REQ-001
  clause: OPD SP 1.2
  type: normative
  source_page: 194
  example_work_products:
  - Descriptions of lifecycle models
  subpractices:
  - Select lifecycle models based on the needs of projects and the organization.
  - Document descriptions of lifecycle models.
  - Conduct peer reviews on lifecycle models.
  - Revise the descriptions of lifecycle models as necessary.
  status: active_verbatim
  process_area: OPD
  clause_title: Establish Lifecycle Model Descriptions
  text: Establish and maintain descriptions of lifecycle models approved for use in the organization.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPD SG 1
- id: CMMIDEV-OPD-SP1.3-REQ-001
  clause: OPD SP 1.3
  type: normative
  source_page: 195
  example_work_products:
  - Tailoring guidelines for the organization's set of standard processes
  subpractices:
  - Specify selection criteria and procedures for tailoring the organization's set of standard processes.
  - Specify the standards used for documenting defined processes.
  - Specify the procedures used for submitting and obtaining approval of waivers from the organization's set of standard processes.
  - Document tailoring guidelines for the organization's set of standard processes.
  - Conduct peer reviews on the tailoring guidelines.
  - Revise tailoring guidelines as necessary.
  status: active_verbatim
  process_area: OPD
  clause_title: Establish Tailoring Criteria and Guidelines
  text: Establish and maintain tailoring criteria and guidelines for the organization's set of standard processes.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPD SG 1
- id: CMMIDEV-OPD-SP1.4-REQ-001
  clause: OPD SP 1.4
  type: normative
  source_page: 197
  example_work_products:
  - Definition of the common set of product and process measures for the organization's set of standard processes
  - Design of the organization's measurement repository
  - Organization's measurement repository (i.e., the repository structure, support environment)
  - Organization's measurement data
  subpractices:
  - Determine the organization's needs for storing, retrieving, and analyzing measurements.
  - Define a common set of process and product measures for the organization's set of standard processes.
  - Design and implement the measurement repository.
  - Specify procedures for storing, updating, and retrieving measures.
  - Conduct peer reviews on definitions of the common set of measures and procedures for storing, updating, and retrieving measures.
  - Enter specified measures into the repository.
  - Make the contents of the measurement repository available for use by the organization and projects as appropriate.
  - Revise the measurement repository, the common set of measures, and procedures as the organization's needs change.
  status: active_verbatim
  process_area: OPD
  clause_title: Establish the Organization's Measurement Repository
  text: Establish and maintain the organization's measurement repository.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPD SG 1
- id: CMMIDEV-OPD-SP1.5-REQ-001
  clause: OPD SP 1.5
  type: normative
  source_page: 199
  example_work_products:
  - Design of the organization's process asset library
  - The organization's process asset library
  - Selected items to be included in the organization's process asset library
  - The catalog of items in the organization's process asset library
  subpractices:
  - Design and implement the organization's process asset library, including the library structure and support environment.
  - Specify criteria for including items in the library.
  - Specify procedures for storing, updating, and retrieving items.
  - Enter selected items into the library and catalog them for easy reference and retrieval.
  - Make items available for use by projects.
  - Periodically review the use of each item.
  - Revise the organization's process asset library as necessary.
  status: active_verbatim
  process_area: OPD
  clause_title: Establish the Organization's Process Asset Library
  text: Establish and maintain the organization's process asset library.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPD SG 1
- id: CMMIDEV-OPD-SP1.6-REQ-001
  clause: OPD SP 1.6
  type: normative
  source_page: 200
  example_work_products:
  - Work environment standards
  subpractices:
  - Evaluate commercially available work environment standards appropriate for the organization.
  - Adopt existing work environment standards and develop new ones to fill gaps based on the organization's process needs and objectives.
  status: active_verbatim
  process_area: OPD
  clause_title: Establish Work Environment Standards
  text: Establish and maintain work environment standards.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPD SG 1
- id: CMMIDEV-OPD-SP1.7-REQ-001
  clause: OPD SP 1.7
  type: normative
  source_page: 200
  example_work_products:
  - Rules and guidelines for structuring and forming teams
  - Operating rules for teams
  subpractices:
  - Establish and maintain empowerment mechanisms to enable timely decision making.
  - Establish and maintain rules and guidelines for structuring and forming teams.
  - Define the expectations, rules, and guidelines that guide how teams work collectively.
  status: active_verbatim
  process_area: OPD
  clause_title: Establish Rules and Guidelines for Teams
  text: Establish and maintain organizational rules and guidelines for the structure, formation, and operation of teams.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPD SG 1
- id: CMMIDEV-OPF-PURPOSE
  clause: OPF Purpose
  type: purpose_statement
  source_page: 203
  status: active_verbatim
  process_area: OPF
  clause_title: Organizational Process Focus Purpose
  text: The purpose of Organizational Process Focus (OPF) is to plan, implement, and deploy organizational process improvements based on a thorough understanding of current strengths and weaknesses of the organization's processes and process assets.
  component: informative
- id: CMMIDEV-OPF-SG1-REQ-001
  clause: OPF SG 1
  type: normative
  source_page: 204
  status: active_verbatim
  process_area: OPF
  clause_title: Determine Process Improvement Opportunities
  text: Strengths, weaknesses, and improvement opportunities for the organization's processes are identified periodically and as needed.
  component: required
  obligation: shall
  classification: process_requirement
- id: CMMIDEV-OPF-SP1.1-REQ-001
  clause: OPF SP 1.1
  type: normative
  source_page: 204
  example_work_products:
  - The organization's process needs and objectives
  subpractices:
  - Identify policies, standards, and business objectives that are applicable to the organization's processes.
  - Examine relevant process standards and models for best practices.
  - Determine the organization's process performance objectives.
  - Define essential characteristics of the organization's processes.
  - Document the organization's process needs and objectives.
  - Revise the organization's process needs and objectives as needed.
  status: active_verbatim
  process_area: OPF
  clause_title: Establish Organizational Process Needs
  text: Establish and maintain the description of process needs and objectives for the organization.
  component: expected
  obligation: shall
  classification: process_requirement
  parent_goal: OPF SG 1
- id: CMMIDEV-OPF-SP1.2-REQ-001
  clause: OPF SP 1.2
  type: normative
  source_page: 206
  example_work_products:
  - Plans for the organization's process appraisals
  - Appraisal findings that address strengths and weaknesses of the organization's processes
  - Improvement recommendations for the organization's processes
  subpractices:
  - Obtain sponsorship of the process appraisal from senior management.
  - Define the scope of the process appraisal.
  - Determine the method and criteria to be used for the process appraisal.
  - Plan, schedule, and prepare for the process appraisal.
  - Conduct the process appraisal.
  - Document and deliver the appraisal's activities and findings.
  status: active_verbatim
  process_area: OPF
  clause_title: Appraise the Organization's Processes
  text: Appraise the organization's processes periodically and as needed to maintain an understanding of their strengths and weaknesses.
  component: expected
  obligation: shall
