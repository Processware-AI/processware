- id: CMMIDEV-PP-SP3.2-REQ-001
  clause: PP SP 3.2
  clause_title: Reconcile Work and Resource Levels
  process_area: PP
  text: 'Adjust the project plan to reconcile available and estimated resources.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: PP SG 3
  example_work_products:
  - Revised methods and corresponding estimating parameters (e.g., better tools, the use of off-the-shelf components)
  - Renegotiated budgets
  - Revised schedules
  - Revised requirements list
  - Renegotiated stakeholder agreements
  subpractices: []
  status: active_verbatim
  source_page: 298
- id: CMMIDEV-PP-SP3.3-REQ-001
  clause: PP SP 3.3
  clause_title: Obtain Plan Commitment
  process_area: PP
  text: 'Obtain commitment from relevant stakeholders responsible for performing and supporting plan execution.

    '
