  example_work_products:
  - Risk source lists (external and internal)
  - Risk categories list
  status: active_verbatim
  source_page: 351
- id: CMMIDEV-RSKM-SP1.2-REQ-001
  clause: RSKM SP 1.2
  clause_title: Define Risk Parameters
  process_area: RSKM
  text: 'Define parameters used to analyze and categorize risks and to control the risk management effort.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: RSKM SG 1
  example_work_products:
  - Risk evaluation, categorization, and prioritization criteria
  - Risk management requirements (e.g., control and approval levels, reassessment intervals)
  status: active_verbatim
  source_page: 352
- id: CMMIDEV-RSKM-SP1.3-REQ-001
  clause: RSKM SP 1.3
  clause_title: Establish a Risk Management Strategy
  process_area: RSKM
  text: Establish and maintain the strategy to be used for risk management.
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: RSKM SG 1
  example_work_products:
  - Project risk management strategy
  status: active_verbatim
  source_page: 353
- id: CMMIDEV-RSKM-SG2-REQ-001
  clause: RSKM SG 2
  clause_title: Identify and Analyze Risks
  process_area: RSKM
  text: 'Risks are identified and analyzed to determine their relative importance.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 354
- id: CMMIDEV-RSKM-SP2.1-REQ-001
  clause: RSKM SP 2.1
  clause_title: Identify Risks
  process_area: RSKM
  text: Identify and document risks.
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: RSKM SG 2
  example_work_products:
  - List of identified risks, including the context, conditions, and consequences of risk occurrence
  status: active_verbatim
  source_page: 354
- id: CMMIDEV-RSKM-SP2.2-REQ-001
  clause: RSKM SP 2.2
  clause_title: Evaluate, Categorize, and Prioritize Risks
  process_area: RSKM
  text: 'Evaluate and categorize each identified risk using defined risk categories and parameters, and determine its relative priority.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: RSKM SG 2
  example_work_products:
  - List of risks and their assigned priority
  subpractices:
  - Evaluate identified risks using defined risk parameters.
  - Categorize and group risks according to defined risk categories.
  - Prioritize risks for mitigation.
  status: active_verbatim
  source_page: 357
- id: CMMIDEV-RSKM-SG3-REQ-001
  clause: RSKM SG 3
  clause_title: Mitigate Risks
  process_area: RSKM
  text: 'Risks are handled and mitigated as appropriate to reduce adverse impacts on achieving objectives.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 358
- id: CMMIDEV-RSKM-SP3.1-REQ-001
  clause: RSKM SP 3.1
  clause_title: Develop Risk Mitigation Plans
  process_area: RSKM
  text: 'Develop a risk mitigation plan in accordance with the risk management strategy.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: RSKM SG 3
  example_work_products:
  - Documented handling options for each identified risk
  - Risk mitigation plans
  - Contingency plans
  - List of those who are responsible for tracking and addressing each risk
  subpractices:
  - Determine the levels and thresholds that define when a risk becomes unacceptable and triggers the execution of a risk mitigation plan or contingency plan.
  - Identify the person or group responsible for addressing each risk.
  - Determine the costs and benefits of implementing the risk mitigation plan for each risk.
  - Develop an overall risk mitigation plan for the project to orchestrate the implementation of individual risk mitigation and contingency plans.
  - Develop contingency plans for selected critical risks in the event their impacts are realized.
  status: active_verbatim
  source_page: 358
- id: CMMIDEV-RSKM-SP3.2-REQ-001
  clause: RSKM SP 3.2
  clause_title: Implement Risk Mitigation Plans
  process_area: RSKM
  text: 'Monitor the status of each risk periodically and implement the risk mitigation plan as appropriate.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: RSKM SG 3
  example_work_products:
  - Updated lists of risk status
  - Updated assessments of risk likelihood, consequence, and thresholds
  - Updated list of risk handling options
  - Updated list of actions taken to handle risks
  - Risk mitigation plans of risk handling options
  subpractices:
  - Monitor risk status.
  - Provide a method for tracking open risk handling action items to closure.
  - Invoke selected risk handling options when monitored risks exceed defined thresholds.
  - Establish a schedule or period of performance for each risk handling activity that includes a start date and anticipated completion date.
  - Provide a continued commitment of resources for each plan to allow the successful execution of risk handling activities.
  - Collect performance measures on risk handling activities.
  status: active_verbatim
  source_page: 360
- id: CMMIDEV-SAM-SG1-REQ-001
  clause: SAM SG 1
  clause_title: Establish Supplier Agreements
  process_area: SAM
  text: 'Agreements with the suppliers are established and maintained.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 365
- id: CMMIDEV-SAM-SP1.1-REQ-001
  clause: SAM SP 1.1
  clause_title: Determine Acquisition Type
  process_area: SAM
  text: 'Determine the type of acquisition for each product or product component to be acquired.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: SAM SG 1
  example_work_products:
  - List of the acquisition types that will be used for all products and product components to be acquired
  subpractices: []
  status: active_verbatim
  source_page: 365
- id: CMMIDEV-SAM-SP1.2-REQ-001
  clause: SAM SP 1.2
  clause_title: Select Suppliers
  process_area: SAM
  text: 'Select suppliers based on an evaluation of their ability to meet the specified requirements and established criteria.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: SAM SG 1
  example_work_products:
  - Market studies
  - List of candidate suppliers
  - Preferred supplier list
  - Trade study or other record of evaluation criteria, advantages and disadvantages of candidate suppliers, and rationale for selection of suppliers
  - Solicitation materials and requirements
  subpractices:
  - Establish and document criteria for evaluating potential suppliers.
  - Identify potential suppliers and distribute solicitation material and requirements to them.
  - Evaluate proposals according to evaluation criteria.
  - Evaluate risks associated with each proposed supplier.
  - Evaluate proposed suppliers' abilities to perform the work.
  - Select the supplier.
  status: active_verbatim
  source_page: 366
- id: CMMIDEV-SAM-SP1.3-REQ-001
  clause: SAM SP 1.3
  clause_title: Establish Supplier Agreements
  process_area: SAM
  text: 'Establish and maintain supplier agreements.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: SAM SG 1
  example_work_products:
  - Statements of work
  - Contracts
  - Memoranda of agreement
  - Licensing agreement
  subpractices:
  - Revise the requirements (e.g., product requirements, service level requirements) to be fulfilled by the supplier to reflect negotiations with the supplier when necessary.
  - Document what the project will provide to the supplier.
  - Document the supplier agreement.
  - Periodically review the supplier agreement to ensure it accurately reflects the project's relationship with the supplier and current risks and market conditions.
  - Ensure that all parties to the supplier agreement understand and agree to all requirements before implementing the agreement or any changes.
  - Revise the supplier agreement as necessary to reflect changes to the supplier's processes or work products.
  - Revise the project's plans and commitments, including changes to the project's processes or work products, as necessary to reflect the supplier agreement.
  status: active_verbatim
  source_page: 367
- id: CMMIDEV-SAM-SG2-REQ-001
  clause: SAM SG 2
  clause_title: Satisfy Supplier Agreements
  process_area: SAM
  text: 'Agreements with suppliers are satisfied by both the project and the supplier.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: required
  status: active_verbatim
  source_page: 369
- id: CMMIDEV-SAM-SP2.1-REQ-001
  clause: SAM SP 2.1
  clause_title: Execute the Supplier Agreement
  process_area: SAM
  text: 'Perform activities with the supplier as specified in the supplier agreement.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: SAM SG 2
  example_work_products:
  - Supplier progress reports and performance measures
  - Supplier review materials and reports
  - Action items tracked to closure
  - Product and documentation deliveries
  subpractices:
  - Monitor supplier progress and performance (e.g., schedule, effort, cost, technical performance) as defined in the supplier agreement.
  - Select, monitor, and analyze processes used by the supplier as defined in the supplier agreement.
  - Select and evaluate work products from the supplier as defined in the supplier agreement.
  - Conduct reviews with the supplier as specified in the supplier agreement.
  - Conduct technical reviews with the supplier as defined in the supplier agreement.
  - Conduct management reviews with the supplier as defined in the supplier agreement.
  - Use the results of reviews to improve the supplier's performance and to establish and nurture long-term relationships with preferred suppliers.
  - Monitor risks involving the supplier and take corrective action as necessary.
  status: active_verbatim
  source_page: 369
- id: CMMIDEV-SAM-SP2.2-REQ-001
  clause: SAM SP 2.2
  clause_title: Accept the Acquired Product
  process_area: SAM
  text: 'Ensure that the supplier agreement is satisfied before accepting the acquired product.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: SAM SG 2
  example_work_products:
  - Acceptance procedures
  - Acceptance reviews or test results
  - Discrepancy reports or corrective action plans
  subpractices:
  - Define the acceptance procedures.
  - Review and obtain agreement from relevant stakeholders on the acceptance procedures before the acceptance review or test.
  - Verify that the acquired products satisfy their requirements.
  - Confirm that the nontechnical commitments associated with the acquired work product are satisfied.
  - Document the results of the acceptance review or test.
  - Establish an action plan and obtain supplier agreement to take action to correct acquired work products that do not pass their acceptance review or test.
  - Identify, document, and track action items to closure.
  status: active_verbatim
  source_page: 371
- id: CMMIDEV-SAM-SP2.3-REQ-001
  clause: SAM SP 2.3
  clause_title: Ensure Transition of Products
  process_area: SAM
  text: 'Ensure the transition of products acquired from the supplier.

    '
  obligation: shall
  type: normative
  classification: process_requirement
  component: expected
  parent_goal: SAM SG 2
  example_work_products:
  - Transition plans
  - Training reports
  - Support and maintenance reports
  subpractices:
  - Ensure that facilities exist to receive, store, integrate, and maintain the acquired products as appropriate.
  - Ensure that appropriate training is provided for those who are involved in receiving, storing, integrating, and maintaining acquired products.
  - Ensure that acquired products are stored, distributed, and integrated according to the terms and conditions specified in the supplier agreement or license.
  status: active_verbatim
  source_page: 372
- id: CMMIDEV-TS-SG1-REQ-001
  clause: TS SG 1
  clause_title: Select Product Component Solutions
  text: Product or product component solutions are selected from alternative solutions.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 375
  process_area: TS
- id: CMMIDEV-TS-SP1.1-REQ-001
  clause: TS SP 1.1
  clause_title: Develop Alternative Solutions and Selection Criteria
  text: Develop alternative solutions and selection criteria.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Alternative solution screening criteria
  - Evaluation reports of new technologies
  - Alternative solutions
  - Selection criteria for final selection
  - Evaluation reports of COTS products
  subpractices:
  - Identify screening criteria to select a set of alternative solutions for consideration.
  - Identify technologies currently in use and new product technologies for competitive advantage.
  - Identify candidate COTS products that satisfy the requirements.
  - Identify re-usable solution components or applicable architecture patterns.
  - Generate alternative solutions.
  - Obtain a complete requirements allocation for each alternative.
  - Develop the criteria for selecting the best alternative solution.
  status: active_verbatim
  source_page: 376
  process_area: TS
  parent_goal: TS SG 1
- id: CMMIDEV-TS-SP1.2-REQ-001
  clause: TS SP 1.2
  clause_title: Select Product Component Solutions
  text: Select the product component solutions based on selection criteria.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Product component selection decisions and rationale
  - Documented relationships between requirements and product components
  - Documented solutions, evaluations, and rationale
  subpractices:
  - Evaluate each alternative solution/set of solutions against the selection criteria established in the context of the operational concepts and scenarios.
  - Based on the evaluation of alternatives, assess the adequacy of the selection criteria and update these criteria as necessary.
  - Identify and resolve issues with the alternative solutions and requirements.
  - Select the best set of alternative solutions that satisfy the established selection criteria.
  - Establish the functional and quality attribute requirements associated with the selected set of alternatives as the set of allocated requirements to those product components.
  - Identify the product component solutions that will be reused or acquired.
  - Establish and maintain the documentation of the solutions, evaluations, and rationale.
  status: active_verbatim
  source_page: 378
  process_area: TS
  parent_goal: TS SG 1
- id: CMMIDEV-TS-SG2-REQ-001
  clause: TS SG 2
  clause_title: Develop the Design
  text: Product or product component designs are developed.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 379
  process_area: TS
- id: CMMIDEV-TS-SP2.1-REQ-001
  clause: TS SP 2.1
  clause_title: Design the Product or Product Component
  text: Develop a design for the product or product component.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Product architecture
  - Product component design
  subpractices:
  - Establish and maintain criteria against which the design can be evaluated.
  - Identify, develop, or acquire the design methods appropriate for the product.
  - Ensure that the design adheres to applicable design standards and criteria.
  - Ensure that the design adheres to allocated requirements.
  - Document the design.
  status: active_verbatim
  source_page: 380
  process_area: TS
  parent_goal: TS SG 2
- id: CMMIDEV-TS-SP2.2-REQ-001
  clause: TS SP 2.2
  clause_title: Establish a Technical Data Package
  text: Establish and maintain a technical data package.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Technical data package
  subpractices:
  - Determine the number of levels of design and the appropriate level of documentation for each design level.
  - Determine the views to be used to document the architecture.
  - Base detailed design descriptions on the allocated product component requirements, architecture, and higher level designs.
  - Document the design in the technical data package.
  - Document the key (i.e., significant effect on cost, schedule, or technical performance) decisions made or defined, including their rationale.
  - Revise the technical data package as necessary.
  status: active_verbatim
  source_page: 383
  process_area: TS
  parent_goal: TS SG 2
- id: CMMIDEV-TS-SP2.3-REQ-001
  clause: TS SP 2.3
  clause_title: Design Interfaces Using Criteria
  text: Design product component interfaces using established criteria.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Interface design specifications
  - Interface control documents
  - Interface specification criteria
  - Rationale for selected interface design
  subpractices:
  - Define interface criteria.
  - Identify interfaces associated with other product components.
  - Identify interfaces associated with external items.
  - Identify interfaces between product components and the product related lifecycle processes.
  - Apply the criteria to the interface design alternatives.
  - Document the selected interface designs and the rationale for the selection.
  status: active_verbatim
  source_page: 385
  process_area: TS
  parent_goal: TS SG 2
- id: CMMIDEV-TS-SP2.4-REQ-001
  clause: TS SP 2.4
  clause_title: Perform Make, Buy, or Reuse Analyses
  text: Evaluate whether the product components should be developed, purchased, or reused based on established criteria.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Criteria for design and product component reuse
  - Make-or-buy analyses
  - Guidelines for choosing COTS product components
  subpractices:
  - Develop criteria for the reuse of product component designs.
  - Analyze designs to determine if product components should be developed, reused, or purchased.
  - Analyze implications for maintenance when considering purchased or nondevelopmental (e.g., COTS, government off the shelf, reuse) items.
  status: active_verbatim
  source_page: 386
  process_area: TS
  parent_goal: TS SG 2
- id: CMMIDEV-TS-SG3-REQ-001
  clause: TS SG 3
  clause_title: Implement the Product Design
  text: Product components, and associated support documentation, are implemented from their designs.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 387
  process_area: TS
- id: CMMIDEV-TS-SP3.1-REQ-001
  clause: TS SP 3.1
  clause_title: Implement the Design
  text: Implement the designs of the product components.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Implemented design
  subpractices:
  - Use effective methods to implement the product components.
  - Adhere to applicable standards and criteria.
  - Conduct peer reviews of the selected product components.
  - Perform unit testing of the product component as appropriate.
  - Revise the product component as necessary.
  status: active_verbatim
  source_page: 388
  process_area: TS
  parent_goal: TS SG 3
- id: CMMIDEV-TS-SP3.2-REQ-001
  clause: TS SP 3.2
  clause_title: Develop Product Support Documentation
  text: Develop and maintain the end-use documentation.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - End-user training materials
  - User's manual
  - Operator's manual
  - Maintenance manual
  - Online help
  subpractices:
  - Review the requirements, design, product, and test results to ensure that issues affecting the installation, operation, and maintenance documentation are identified and resolved.
  - Use effective methods to develop the installation, operation, and maintenance documentation.
  - Adhere to the applicable documentation standards.
  - Develop preliminary versions of the installation, operation, and maintenance documentation in early phases of the project lifecycle for review by the relevant stakeholders.
  - Conduct peer reviews of the installation, operation, and maintenance documentation.
  - Revise the installation, operation, and maintenance documentation as necessary.
  status: active_verbatim
  source_page: 390
  process_area: TS
  parent_goal: TS SG 3
- id: CMMIDEV-VAL-SG1-REQ-001
  clause: VAL SG 1
  clause_title: Prepare for Validation
  text: Preparation for validation is conducted.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 394
  process_area: VAL
- id: CMMIDEV-VAL-SP1.1-REQ-001
  clause: VAL SP 1.1
  clause_title: Select Products for Validation
  text: Select products and product components to be validated and validation methods to be used.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Lists of products and product components selected for validation
  - Validation methods for each product or product component
  - Requirements for performing validation for each product or product component
  - Validation constraints for each product or product component
  subpractices:
  - Identify the key principles, features, and phases for product or product component validation throughout the life of the project.
  - Determine which categories of end user needs (operational, maintenance, training, or support) are to be validated.
  - Select the product and product components to be validated.
  - Select the evaluation methods for product or product component validation.
  - Review the validation selection, constraints, and methods with relevant stakeholders.
  status: active_verbatim
  source_page: 395
  process_area: VAL
  parent_goal: VAL SG 1
- id: CMMIDEV-VAL-SP1.2-REQ-001
  clause: VAL SP 1.2
  clause_title: Establish the Validation Environment
  text: Establish and maintain the environment needed to support validation.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Validation environment
  subpractices:
  - Identify requirements for the validation environment.
  - Identify customer supplied products.
  - Identify test equipment and tools.
  - Identify validation resources that are available for reuse and modification.
  - Plan the availability of resources in detail.
  status: active_verbatim
  source_page: 397
  process_area: VAL
  parent_goal: VAL SG 1
- id: CMMIDEV-VAL-SP1.3-REQ-001
  clause: VAL SP 1.3
  clause_title: Establish Validation Procedures and Criteria
  text: Establish and maintain procedures and criteria for validation.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Validation procedures
  - Validation criteria
  - Test and evaluation procedures for maintenance, training, and support
  subpractices:
  - Review the product requirements to ensure that issues affecting validation of the product or product component are identified and resolved.
  - Document the environment, operational scenario, procedures, inputs, outputs, and criteria for the validation of the selected product or product component.
  - Assess the design as it matures in the context of the validation environment to identify validation issues.
  status: active_verbatim
  source_page: 398
  process_area: VAL
  parent_goal: VAL SG 1
- id: CMMIDEV-VAL-SG2-REQ-001
  clause: VAL SG 2
  clause_title: Validate Product or Product Components
  text: The product or product components are validated to ensure they are suitable for use in their intended operating environment.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 398
  process_area: VAL
- id: CMMIDEV-VAL-SP2.1-REQ-001
  clause: VAL SP 2.1
  clause_title: Perform Validation
  text: Perform validation on selected products and product components.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Validation reports
  - Validation results
  - Validation cross reference matrix
  - As-run procedures log
  - Operational demonstrations
  status: active_verbatim
  source_page: 398
  process_area: VAL
  parent_goal: VAL SG 2
- id: CMMIDEV-VAL-SP2.2-REQ-001
  clause: VAL SP 2.2
  clause_title: Analyze Validation Results
  text: Analyze results of validation activities.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Validation deficiency reports
  - Validation issues
  - Procedure change request
  subpractices:
  - Compare actual results to expected results.
  - Based on the established validation criteria, identify products and product components that do not perform suitably in their intended operating environments, or identify problems with methods, criteria, or the environment.
  - Analyze validation data for defects.
  - Record results of the analysis and identify issues.
  - Use validation results to compare actual measurements and performance to the intended use or operational need.
  - Provide information on how defects can be resolved (including validation methods, criteria, and validation environment) and initiate corrective action.
  status: active_verbatim
  source_page: 399
  process_area: VAL
  parent_goal: VAL SG 2
- id: CMMIDEV-VER-SG1-REQ-001
  clause: VER SG 1
  clause_title: Prepare for Verification
  text: Preparation for verification is conducted.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 403
  process_area: VER
- id: CMMIDEV-VER-SP1.1-REQ-001
  clause: VER SP 1.1
  clause_title: Select Work Products for Verification
  text: Select work products to be verified and verification methods to be used.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Lists of work products selected for verification
  - Verification methods for each selected work product
  subpractices:
  - Identify work products for verification.
  - Identify requirements to be satisfied by each selected work product.
  - Identify verification methods available for use.
  - Define verification methods to be used for each selected work product.
  - Submit for integration with the project plan the identification of work products to be verified, the requirements to be satisfied, and the methods to be used.
  status: active_verbatim
  source_page: 403
  process_area: VER
  parent_goal: VER SG 1
- id: CMMIDEV-VER-SP1.2-REQ-001
  clause: VER SP 1.2
  clause_title: Establish the Verification Environment
  text: Establish and maintain the environment needed to support verification.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Verification environment
  subpractices:
  - Identify verification environment requirements.
  - Identify verification resources that are available for reuse or modification.
  - Identify verification equipment and tools.
  - Acquire verification support equipment and an environment (e.g., test equipment, software).
  status: active_verbatim
  source_page: 405
  process_area: VER
  parent_goal: VER SG 1
- id: CMMIDEV-VER-SP1.3-REQ-001
  clause: VER SP 1.3
  clause_title: Establish Verification Procedures and Criteria
  text: Establish and maintain verification procedures and criteria for the selected work products.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Verification procedures
  - Verification criteria
  subpractices:
  - Generate a set of comprehensive, integrated verification procedures for work products and commercial off-the-shelf products, as necessary.
  - Develop and refine verification criteria as necessary.
  - Identify the expected results, tolerances allowed, and other criteria for satisfying the requirements.
  - Identify equipment and environmental components needed to support verification.
  status: active_verbatim
  source_page: 405
  process_area: VER
  parent_goal: VER SG 1
- id: CMMIDEV-VER-SG2-REQ-001
  clause: VER SG 2
  clause_title: Perform Peer Reviews
  text: Peer reviews are performed on selected work products.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 406
  process_area: VER
- id: CMMIDEV-VER-SP2.1-REQ-001
  clause: VER SP 2.1
  clause_title: Prepare for Peer Reviews
  text: Prepare for peer reviews of selected work products.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Peer review schedule
  - Peer review checklist
  - Entry and exit criteria for work products
  - Criteria for requiring another peer review
  - Peer review training material
  - Selected work products to be reviewed
  subpractices:
  - Determine the type of peer review to be conducted.
  - Define requirements for collecting data during the peer review.
  - Establish and maintain entry and exit criteria for the peer review.
  - Establish and maintain criteria for requiring another peer review.
  - Establish and maintain checklists to ensure that work products are reviewed consistently.
  - Develop a detailed peer review schedule, including the dates for peer review training and for when materials for peer reviews will be available.
  - Ensure that the work product satisfies the peer review entry criteria prior to distribution.
  - Distribute the work product to be reviewed and related information to participants early enough to enable them to adequately prepare for the peer review.
  - Assign roles for the peer review as appropriate.
  - Prepare for the peer review by reviewing the work product prior to conducting the peer review.
  status: active_verbatim
  source_page: 406
  process_area: VER
  parent_goal: VER SG 2
- id: CMMIDEV-VER-SP2.2-REQ-001
  clause: VER SP 2.2
  clause_title: Conduct Peer Reviews
  text: Conduct peer reviews of selected work products and identify issues resulting from these reviews.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Peer review results
  - Peer review issues
  - Peer review data
  subpractices:
  - Perform the assigned roles in the peer review.
  - Identify and document defects and other issues in the work product.
  - Record results of the peer review, including action items.
  - Collect peer review data.
  - Identify action items and communicate issues to relevant stakeholders.
  - Conduct an additional peer review if needed.
  - Ensure that the exit criteria for the peer review are satisfied.
  status: active_verbatim
  source_page: 408
  process_area: VER
  parent_goal: VER SG 2
- id: CMMIDEV-VER-SP2.3-REQ-001
  clause: VER SP 2.3
  clause_title: Analyze Peer Review Data
  text: Analyze data about the preparation, conduct, and results of the peer reviews.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Peer review data
  - Peer review action items
  subpractices:
  - Record data related to the preparation, conduct, and results of the peer reviews.
  - Store the data for future reference and analysis.
  - Protect the data to ensure that peer review data are not used inappropriately.
  - Analyze the peer review data.
  status: active_verbatim
  source_page: 408
  process_area: VER
  parent_goal: VER SG 2
- id: CMMIDEV-VER-SG3-REQ-001
  clause: VER SG 3
  clause_title: Verify Selected Work Products
  text: Selected work products are verified against their specified requirements.
  obligation: shall
  type: normative
  classification: process_goal
  component: required
  status: active_verbatim
  source_page: 409
  process_area: VER
- id: CMMIDEV-VER-SP3.1-REQ-001
  clause: VER SP 3.1
  clause_title: Perform Verification
  text: Perform verification on selected work products.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Verification results
  - Verification reports
  - Demonstrations
  - As-run procedures log
  subpractices:
  - Perform the verification of selected work products against their requirements.
  - Record the results of verification activities.
  - Identify action items resulting from the verification of work products.
  - Document the "as-run" verification method and deviations from available methods and procedures discovered during its performance.
  status: active_verbatim
  source_page: 409
  process_area: VER
  parent_goal: VER SG 3
- id: CMMIDEV-VER-SP3.2-REQ-001
  clause: VER SP 3.2
  clause_title: Analyze Verification Results
  text: Analyze results of all verification activities.
  obligation: shall
  type: normative
  classification: process_practice
  component: expected
  example_work_products:
  - Analysis report (e.g., statistics on performance, causal analysis of nonconformances, comparison of the behavior between the real product and models, trends)
  - Trouble reports
  - Change requests for verification methods, criteria, and the environment
  subpractices:
  - Compare actual results to expected results.
  - Based on the established verification criteria, identify products that do not meet their requirements or identify problems with methods, procedures, criteria, and the verification environment.
  - Analyze defect data.
  - Record all results of the analysis in a report.
  - Use verification results to compare actual measurements and performance to technical performance parameters.
  - Provide information on how defects can be resolved (including verification methods, criteria, and verification environment) and initiate corrective action.
  status: active_verbatim
  source_page: 410
  process_area: VER
  parent_goal: VER SG 3
