  # ============================================================
  # CM — Configuration Management (Maturity Level 2)
  # ============================================================
  - id: CMMIDEV-CM-SG1-REQ-001
    clause: "CM SG 1"
    clause_title: "Establish Baselines"
    process_area: CM
    text: >
      Baselines of identified work products are established.
    obligation: shall
    type: normative
    classification: process_requirement
    component: required
    status: active_verbatim
    source_page: 140

  - id: CMMIDEV-CM-SP1.1-REQ-001
    clause: "CM SP 1.1"
    clause_title: "Identify Configuration Items"
    process_area: CM
    text: >
      Identify configuration items, components, and related work products to be placed under configuration management.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "CM SG 1"
    example_work_products:
      - "Identified configuration items"
    subpractices:
      - "Select configuration items and work products that compose them based on documented criteria."
      - "Assign unique identifiers to configuration items."
      - "Specify the important characteristics of each configuration item."
      - "Specify when each configuration item is placed under configuration management."
      - "Identify the owner responsible for each configuration item."
      - "Specify relationships among configuration items."
    status: active_verbatim
    source_page: 140

  - id: CMMIDEV-CM-SP1.2-REQ-001
    clause: "CM SP 1.2"
    clause_title: "Establish a Configuration Management System"
    process_area: CM
    text: >
      Establish and maintain a configuration management and change management system for controlling work products.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "CM SG 1"
    example_work_products:
      - "Configuration management system with controlled work products"
      - "Configuration management system access control procedures"
      - "Change request database"
    subpractices:
      - "Establish a mechanism to manage multiple levels of control."
      - "Provide access control to ensure authorized access to the configuration management system."
      - "Store and retrieve configuration items in a configuration management system."
      - "Share and transfer configuration items between control levels in the configuration management system."
      - "Store and recover archived versions of configuration items."
      - "Store, update, and retrieve configuration management records."
      - "Create configuration management reports from the configuration management system."
      - "Preserve the contents of the configuration management system."
      - "Revise the configuration management structure as necessary."
    status: active_verbatim
    source_page: 142

  - id: CMMIDEV-CM-SP1.3-REQ-001
    clause: "CM SP 1.3"
    clause_title: "Create or Release Baselines"
    process_area: CM
    text: >
      Create or release baselines for internal use and for delivery to the customer.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "CM SG 1"
    example_work_products:
      - "Baselines"
      - "Description of baselines"
    subpractices:
      - "Obtain authorization from the CCB before creating or releasing baselines of configuration items."
      - "Create or release baselines only from configuration items in the configuration management system."
      - "Document the set of configuration items that are contained in a baseline."
      - "Make the current set of baselines readily available."
    status: active_verbatim
    source_page: 143

  - id: CMMIDEV-CM-SG2-REQ-001
    clause: "CM SG 2"
    clause_title: "Track and Control Changes"
    process_area: CM
    text: >
      Changes to the work products under configuration management are tracked and controlled.
    obligation: shall
    type: normative
    classification: process_requirement
    component: required
    status: active_verbatim
    source_page: 144

  - id: CMMIDEV-CM-SP2.1-REQ-001
    clause: "CM SP 2.1"
    clause_title: "Track Change Requests"
    process_area: CM
    text: >
      Track change requests for configuration items.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "CM SG 2"
    example_work_products:
      - "Change requests"
    subpractices:
      - "Initiate and record change requests in the change request database."
      - "Analyze the impact of changes and fixes proposed in change requests."
      - "Categorize and prioritize change requests."
      - "Review change requests to be addressed in the next baseline with relevant stakeholders and get their agreement."
      - "Track the status of change requests to closure."
    status: active_verbatim
    source_page: 144

  - id: CMMIDEV-CM-SP2.2-REQ-001
    clause: "CM SP 2.2"
    clause_title: "Control Configuration Items"
    process_area: CM
    text: >
      Control changes to configuration items.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "CM SG 2"
    example_work_products:
      - "Revision history of configuration items"
      - "Archives of baselines"
    subpractices:
      - "Control changes to configuration items throughout the life of the product or service."
      - "Obtain appropriate authorization before changed configuration items are entered into the configuration management system."
      - "Check in and check out configuration items in the configuration management system for incorporation of changes in a manner that maintains the correctness and integrity of configuration items."
      - "Perform reviews to ensure that changes have not caused unintended effects on the baselines (e.g., ensure that changes have not compromised the safety or security of the system)."
      - "Record changes to configuration items and reasons for changes as appropriate."
    status: active_verbatim
    source_page: 145

  - id: CMMIDEV-CM-SG3-REQ-001
    clause: "CM SG 3"
    clause_title: "Establish Integrity"
    process_area: CM
    text: >
      Integrity of baselines is established and maintained.
    obligation: shall
    type: normative
    classification: process_requirement
    component: required
    status: active_verbatim
    source_page: 146

  - id: CMMIDEV-CM-SP3.1-REQ-001
    clause: "CM SP 3.1"
    clause_title: "Establish Configuration Management Records"
    process_area: CM
    text: >
      Establish and maintain records describing configuration items.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "CM SG 3"
    example_work_products:
      - "Revision history of configuration items"
      - "Change log"
      - "Change request records"
      - "Status of configuration items"
      - "Differences between baselines"
    subpractices:
      - "Record configuration management actions in sufficient detail so the content and status of each configuration item is known and previous versions can be recovered."
      - "Ensure that relevant stakeholders have access to and knowledge of the configuration status of configuration items."
      - "Specify the latest version of baselines."
      - "Identify the version of configuration items that constitute a particular baseline."
      - "Describe differences between successive baselines."
      - "Revise the status and history (i.e., changes, other actions) of each configuration item as necessary."
    status: active_verbatim
    source_page: 146

  - id: CMMIDEV-CM-SP3.2-REQ-001
    clause: "CM SP 3.2"
    clause_title: "Perform Configuration Audits"
    process_area: CM
    text: >
      Perform configuration audits to maintain the integrity of configuration baselines.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "CM SG 3"
    example_work_products:
      - "Configuration audit results"
      - "Action items"
    subpractices:
      - "Assess the integrity of baselines."
      - "Confirm that configuration management records correctly identify configuration items."
      - "Review the structure and integrity of items in the configuration management system."
      - "Confirm the completeness, correctness, and consistency of items in the configuration management system."
      - "Confirm compliance with applicable configuration management standards and procedures."
      - "Track action items from the audit to closure."
    status: active_verbatim
    source_page: 146

