    source_page: 274

  - id: CMMIDEV-PMC-SP1.3-REQ-001
    clause: "PMC SP 1.3"
    clause_title: "Monitor Project Risks"
    process_area: PMC
    text: >
      Monitor risks against those identified in the project plan.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "PMC SG 1"
    example_work_products:
      - "Records of project risk monitoring"
    subpractices:
      - "Periodically review the documentation of risks in the context of the project's current status and circumstances."
      - "Revise the documentation of risks as additional information becomes available."
      - "Communicate the risk status to relevant stakeholders."
    status: active_verbatim
    source_page: 274

  - id: CMMIDEV-PMC-SP1.4-REQ-001
    clause: "PMC SP 1.4"
    clause_title: "Monitor Data Management"
    process_area: PMC
