    subpractices:
      - "Conduct milestone reviews with relevant stakeholders at meaningful points in the project's schedule, such as the completion of selected phases."
      - "Review commitments, the plan, status, and risks of the project."
      - "Identify and document significant issues and their impacts."
      - "Document results of the review, action items, and decisions."
      - "Track action items to closure."
    status: active_verbatim
    source_page: 276

  - id: CMMIDEV-PMC-SG2-REQ-001
    clause: "PMC SG 2"
    clause_title: "Manage Corrective Action to Closure"
    process_area: PMC
    text: >
