      - "Cost performance reports"
    subpractices:
      - "Monitor progress against the schedule."
      - "Monitor the project's costs and expended effort."
      - "Monitor the attributes of work products and tasks."
      - "Monitor resources provided and used."
      - "Monitor the knowledge and skills of project staff."
      - "Document significant deviations in project planning parameters."
    status: active_verbatim
    source_page: 272

  - id: CMMIDEV-PMC-SP1.2-REQ-001
    clause: "PMC SP 1.2"
    clause_title: "Monitor Commitments"
