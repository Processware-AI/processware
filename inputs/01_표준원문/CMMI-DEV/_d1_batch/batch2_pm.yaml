    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "PMC SG 1"
    example_work_products:
      - "Records of data management"
    subpractices:
      - "Periodically review data management activities against their description in the project plan."
      - "Identify and document significant issues and their impacts."
      - "Document results of data management activity reviews."
    status: active_verbatim
    source_page: 275

  - id: CMMIDEV-PMC-SP1.5-REQ-001
    clause: "PMC SP 1.5"
    clause_title: "Monitor Stakeholder Involvement"
    process_area: PMC
    text: >
      Monitor stakeholder involvement against the project plan.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "PMC SG 1"
    example_work_products:
      - "Records of stakeholder involvement"
    subpractices:
      - "Periodically review the status of stakeholder involvement."
      - "Identify and document significant issues and their impacts."
      - "Document the results of stakeholder involvement status reviews."
    status: active_verbatim
    source_page: 275

  - id: CMMIDEV-PMC-SP1.6-REQ-001
    clause: "PMC SP 1.6"
    clause_title: "Conduct Progress Reviews"
    process_area: PMC
    text: >
      Periodically review the project's progress, performance, and issues.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "PMC SG 1"
    example_work_products:
      - "Documented project review results"
    subpractices:
      - "Regularly communicate status on assigned activities and work products to relevant stakeholders."
      - "Review the results of collecting and analyzing measures for controlling the project."
      - "Identify and document significant issues and deviations from the plan."
      - "Document change requests and problems identified in work products and processes."
      - "Document the results of reviews."
      - "Track change requests and problem reports to closure."
    status: active_verbatim
    source_page: 276

  - id: CMMIDEV-PMC-SP1.7-REQ-001
    clause: "PMC SP 1.7"
    clause_title: "Conduct Milestone Reviews"
    process_area: PMC
