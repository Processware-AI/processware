requirements:
  # ============================================================
  # IPM — Integrated Project Management (Maturity Level 3)
  # ============================================================
  - id: CMMIDEV-IPM-SG1-REQ-001
    clause: "IPM SG 1"
    clause_title: "Use the Project's Defined Process"
    process_area: IPM
    text: >
      The project is conducted using a defined process tailored from the organization's set of standard processes.
    obligation: shall
    type: normative
    classification: process_requirement
    component: required
    status: active_verbatim
    source_page: 159

  - id: CMMIDEV-IPM-SP1.1-REQ-001
    clause: "IPM SP 1.1"
    clause_title: "Establish the Project's Defined Process"
    process_area: IPM
    text: >
      Establish and maintain the project's defined process from project startup through the life of the project.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "IPM SG 1"
    example_work_products:
      - "The project's defined process"
    subpractices:
      - "Select a lifecycle model from the ones available in organizational process assets."
      - "Select standard processes from the organization's set of standard processes that best fit the needs of the project."
      - "Tailor the organization's set of standard processes and other organizational process assets according to tailoring guidelines to produce the project's defined process."
      - "Use other artifacts from the organization's process asset library as appropriate."
      - "Document the project's defined process."
      - "Conduct peer reviews of the project's defined process."
      - "Revise the project's defined process as necessary."
    status: active_verbatim
    source_page: 159

  - id: CMMIDEV-IPM-SP1.2-REQ-001
    clause: "IPM SP 1.2"
    clause_title: "Use Organizational Process Assets for Planning Project Activities"
    process_area: IPM
    text: >
      Use organizational process assets and the measurement repository for estimating and planning project activities.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "IPM SG 1"
    example_work_products:
      - "Project estimates"
      - "Project plans"
    subpractices:
      - "Use the tasks and work products of the project's defined process as a basis for estimating and planning project activities."
      - "Use the organization's measurement repository in estimating the project's planning parameters."
    status: active_verbatim
    source_page: 161

  - id: CMMIDEV-IPM-SP1.3-REQ-001
    clause: "IPM SP 1.3"
    clause_title: "Establish the Project's Work Environment"
    process_area: IPM
    text: >
      Establish and maintain the project's work environment based on the organization's work environment standards.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "IPM SG 1"
    example_work_products:
      - "Equipment and tools for the project"
      - "Installation, operation, and maintenance manuals for the project work environment"
      - "User surveys and results"
      - "Use, performance, and maintenance records"
      - "Support services for the project's work environment"
    subpractices:
      - "Plan, design, and install a work environment for the project."
      - "Provide ongoing maintenance and operational support for the project's work environment."
      - "Maintain the qualification of components of the project's work environment."
      - "Periodically review how well the work environment is meeting project needs and supporting collaboration, and take action as appropriate."
    status: active_verbatim
    source_page: 162

  - id: CMMIDEV-IPM-SP1.4-REQ-001
    clause: "IPM SP 1.4"
    clause_title: "Integrate Plans"
    process_area: IPM
    text: >
      Integrate the project plan and other plans that affect the project to describe the project's defined process.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "IPM SG 1"
    example_work_products:
      - "Integrated plans"
    subpractices:
      - "Integrate other plans that affect the project with the project plan."
      - "Incorporate into the project plan the definitions of measures and measurement activities for managing the project."
      - "Identify and analyze product and project interface risks."
      - "Schedule tasks in a sequence that accounts for critical development and delivery factors and project risks."
      - "Incorporate plans for performing peer reviews on work products of the project's defined process."
      - "Incorporate the training needed to perform the project's defined process in the project's training plans."
      - "Establish objective entry and exit criteria to authorize the initiation and completion of tasks described in the work breakdown structure (WBS)."
      - "Ensure that the project plan is appropriately compatible with the plans of relevant stakeholders."
      - "Identify how conflicts will be resolved that arise among relevant stakeholders."
    status: active_verbatim
    source_page: 164

  - id: CMMIDEV-IPM-SP1.5-REQ-001
    clause: "IPM SP 1.5"
    clause_title: "Manage the Project Using Integrated Plans"
    process_area: IPM
    text: >
      Manage the project using the project plan, other plans that affect the project, and the project's defined process.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "IPM SG 1"
    example_work_products:
      - "Work products created by performing the project's defined process"
      - "Collected measures (i.e., actuals) and status records or reports"
      - "Revised requirements, plans, and commitments"
      - "Integrated plans"
    subpractices:
      - "Implement the project's defined process using the organization's process asset library."
      - "Monitor and control the project's activities and work products using the project's defined process, project plan, and other plans that affect the project."
      - "Obtain and analyze selected measurements to manage the project and support organization needs."
      - "Periodically review and align the project's performance with current and anticipated needs, objectives, and requirements of the organization, customer, and end users as appropriate."
      - "Address causes of selected issues that can affect project objectives."
    status: active_verbatim
    source_page: 166

  - id: CMMIDEV-IPM-SP1.6-REQ-001
    clause: "IPM SP 1.6"
    clause_title: "Establish Teams"
    process_area: IPM
    text: >
      Establish and maintain teams.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "IPM SG 1"
    example_work_products:
      - "Documented shared vision"
      - "List of members assigned to each team"
      - "Team charters"
      - "Periodic team status reports"
    subpractices:
      - "Establish and maintain the project's shared vision."
      - "Establish and maintain the team structure."
      - "Establish and maintain each team."
      - "Periodically evaluate the team structure and composition."
    status: active_verbatim
    source_page: 168

  - id: CMMIDEV-IPM-SP1.7-REQ-001
    clause: "IPM SP 1.7"
    clause_title: "Contribute to Organizational Process Assets"
    process_area: IPM
    text: >
      Contribute process related experiences to organizational process assets.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "IPM SG 1"
    example_work_products:
      - "Proposed improvements to organizational process assets"
      - "Actual process and product measures collected from the project"
      - "Documentation (e.g., exemplary process descriptions, plans, training modules, checklists, lessons learned)"
      - "Process artifacts associated with tailoring and implementing the organization's set of standard processes on the project"
    subpractices:
      - "Propose improvements to the organizational process assets."
      - "Store process and product measures in the organization's measurement repository."
      - "Submit documentation for possible inclusion in the organization's process asset library."
      - "Document lessons learned from the project for inclusion in the organization's process asset library."
      - "Provide process artifacts associated with tailoring and implementing the organization's set of standard processes in support of the organization's process monitoring activities."
    status: active_verbatim
    source_page: 169

  - id: CMMIDEV-IPM-SG2-REQ-001
    clause: "IPM SG 2"
    clause_title: "Coordinate and Collaborate with Relevant Stakeholders"
    process_area: IPM
    text: >
      Coordination and collaboration between the project and relevant stakeholders are conducted.
    obligation: shall
    type: normative
    classification: process_requirement
    component: required
    status: active_verbatim
    source_page: 171

  - id: CMMIDEV-IPM-SP2.1-REQ-001
    clause: "IPM SP 2.1"
    clause_title: "Manage Stakeholder Involvement"
    process_area: IPM
    text: >
      Manage the involvement of relevant stakeholders in the project.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "IPM SG 2"
    example_work_products:
      - "Agendas and schedules for collaborative activities"
      - "Recommendations for resolving relevant stakeholder issues"
      - "Documented issues (e.g., issues with stakeholder requirements, product and product component requirements, product architecture, product design)"
    subpractices:
      - "Coordinate with relevant stakeholders who should participate in project activities."
      - "Ensure work products that are produced to satisfy commitments meet the requirements of the recipients."
      - "Develop recommendations and coordinate actions to resolve misunderstandings and problems with requirements."
    status: active_verbatim
    source_page: 171

  - id: CMMIDEV-IPM-SP2.2-REQ-001
    clause: "IPM SP 2.2"
    clause_title: "Manage Dependencies"
    process_area: IPM
    text: >
      Participate with relevant stakeholders to identify, negotiate, and track critical dependencies.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "IPM SG 2"
    example_work_products:
      - "Defects, issues, and action items resulting from reviews with relevant stakeholders"
      - "Critical dependencies"
      - "Commitments to address critical dependencies"
      - "Status of critical dependencies"
    subpractices:
      - "Conduct reviews with relevant stakeholders."
      - "Identify each critical dependency."
      - "Establish need dates and plan dates for each critical dependency based on the project schedule."
      - "Review and get agreement on commitments to address each critical dependency with those who are responsible for providing or receiving the work product."
      - "Document critical dependencies and commitments."
      - "Track the critical dependencies and commitments and take corrective action as appropriate."
    status: active_verbatim
    source_page: 172

  - id: CMMIDEV-IPM-SP2.3-REQ-001
    clause: "IPM SP 2.3"
    clause_title: "Resolve Coordination Issues"
    process_area: IPM
    text: >
      Resolve issues with relevant stakeholders.
    obligation: shall
    type: normative
    classification: process_requirement
    component: expected
    parent_goal: "IPM SG 2"
    example_work_products:
      - "Relevant stakeholder coordination issues"
      - "Status of relevant stakeholder coordination issues"
    subpractices:
      - "Identify and document issues."
      - "Communicate issues to relevant stakeholders."
      - "Resolve issues with relevant stakeholders."
      - "Escalate to appropriate managers the issues not resolvable with relevant stakeholders."
      - "Track issues to closure."
      - "Communicate with relevant stakeholders on the status and resolution of issues."
    status: active_verbatim
    source_page: 173

  # ============================================================
  # PMC — Project Monitoring and Control (Maturity Level 2)
  # ============================================================
  - id: CMMIDEV-PMC-SG1-REQ-001
    clause: "PMC SG 1"
    clause_title: "Monitor the Project Against the Plan"
    process_area: PMC
    text: >
