definitions:
- term: acceptance criteria
  definition: The criteria that a deliverable must satisfy to be accepted by a user, customer, or other authorized entity.
  source_page: 434
  status: active_verbatim
  cross_references:
  - deliverable
- term: acceptance testing
  definition: Formal testing conducted to enable a user, customer, or other authorized entity to determine whether to accept a deliverable.
  source_page: 434
  status: active_verbatim
  cross_references:
  - unit testing
- term: achievement profile
  definition: A list of process areas and their corresponding capability levels that represent the organization's progress for each process area while advancing through the capability levels.
  source_page: 434
  status: active_verbatim
  cross_references:
  - capability level profile
  - target profile
  - target staging
- term: acquirer
  definition: The stakeholder that acquires or procures a product or service from a supplier.
  source_page: 434
  status: active_verbatim
  cross_references:
  - stakeholder
- term: acquisition
  definition: The process of obtaining products or services through supplier agreements.
  source_page: 434
  status: active_verbatim
  cross_references:
  - supplier agreement
- term: acquisition strategy
  definition: The specific approach to acquiring products and services that is based on considerations of supply sources, acquisition methods, requirements specification types, agreement types, and related acquisition risks.
  source_page: 434
  status: active_verbatim
- term: addition
  definition: A clearly marked model component that contains information of interest to particular users.
  source_page: 434
  status: active_verbatim
  notes: In a CMMI model, all additions bearing the same name can be optionally selected as a group for use. In CMMI for Services, the Service System Development (SSD) process area is an addition.
- term: allocated requirement
  definition: Requirement that results from levying all or part of a higher level requirement on a lower level architectural element or design component.
  source_page: 434
  status: active_verbatim
  notes: More generally, requirements can be allocated to other logical or physical components including people, consumables, delivery increments, or the architecture as a whole, depending on what best enables the product or service to achieve the requirements.
- term: appraisal
  definition: An examination of one or more processes by a trained team of professionals using an appraisal reference model as the basis for determining, at a minimum, strengths and weaknesses.
  source_page: 435
  status: active_verbatim
  notes: This term has a special meaning in the CMMI Product Suite besides its common standard English meaning.
- term: appraisal findings
  definition: The results of an appraisal that identify the most important issues, problems, or opportunities for process improvement within the appraisal scope.
  source_page: 435
  status: active_verbatim
  notes: Appraisal findings are inferences drawn from corroborated objective evidence.
- term: appraisal participants
  definition: Members of the organizational unit who participate in providing information during an appraisal.
  source_page: 435
  status: active_verbatim
- term: appraisal rating
  definition: The value assigned by an appraisal team to (a) a CMMI goal or process area, (b) the capability level of a process area, or (c) the maturity level of an organizational unit.
  source_page: 435
  status: active_verbatim
  notes: This term is used in CMMI appraisal materials such as the SCAMPI MDD. A rating is determined by enacting the defined rating process for the appraisal method being employed.
- term: appraisal reference model
  definition: The CMMI model to which an appraisal team correlates implemented process activities.
  source_page: 435
  status: active_verbatim
- term: appraisal scope
  definition: The definition of the boundaries of an appraisal encompassing the organizational limits and CMMI model limits within which the processes to be investigated operate.
  source_page: 435
  status: active_verbatim
- term: architecture
  definition: The set of structures needed to reason about a product. These structures are comprised of elements, relations among them, and properties of both.
  source_page: 435
  status: active_verbatim
  cross_references:
  - functional architecture
  notes: In a service context, the architecture is often applied to the service system. Note that functionality is only one aspect of the product. Quality attributes, such as responsiveness, reliability, and security, are also important to reason about.
- term: audit
  definition: An objective examination of a work product or set of work products against specific criteria (e.g., requirements).
  source_page: 436
  status: active_verbatim
  cross_references:
  - objectively evaluate
  notes: This is a term used in several ways in CMMI, including configuration audits and process compliance audits.
- term: base measure
  definition: Measure defined in terms of an attribute and the method for quantifying it.
  source_page: 436
  status: active_verbatim
  cross_references:
  - derived measure
  notes: A base measure is functionally independent of other measures.
- term: baseline
  definition: A set of specifications or work products that has been formally reviewed and agreed on, which thereafter serves as the basis for further development, and which can be changed only through change control procedures.
  source_page: 436
  status: active_verbatim
  cross_references:
  - configuration baseline
  - product baseline
- term: bidirectional traceability
  definition: An association among two or more logical entities that is discernable in either direction (i.e., to and from an entity).
  source_page: 436
  status: active_verbatim
  cross_references:
  - requirements traceability
  - traceability
- term: business objectives
  definition: See organization's business objectives.
  source_page: 436
  status: active_verbatim
  cross_references:
  - organization's business objectives
- term: capability level
  definition: Achievement of process improvement within an individual process area.
  source_page: 436
  status: active_verbatim
  abbreviation: CL
  cross_references:
  - generic goal
  - specific goal
  - maturity level
  - process area
  notes: A capability level is defined by appropriate specific and generic goals for a process area.
- term: capability level profile
  definition: A list of process areas and their corresponding capability levels.
  source_page: 436
  status: active_verbatim
  cross_references:
  - achievement profile
  - target profile
  - target staging
  notes: A capability level profile can be an 'achievement profile' when it represents the organization's progress for each process area while advancing through the capability levels. Or, it can be a 'target profile' when it represents an objective for process improvement.
- term: capability maturity model
  definition: A model that contains the essential elements of effective processes for one or more areas of interest and describes an evolutionary improvement path from ad hoc, immature processes to disciplined, mature processes with improved quality and effectiveness.
  source_page: 436
  status: active_verbatim
  abbreviation: CMM
- term: capable process
  definition: A process that can satisfy its specified product quality, service quality, and process performance objectives.
  source_page: 436
  status: active_verbatim
  cross_references:
  - stable process
  - standard process
- term: causal analysis
  definition: The analysis of outcomes to determine their causes.
  source_page: 436
  status: active_verbatim
- term: change management
  definition: Judicious use of means to effect a change, or a proposed change, to a product or service.
  source_page: 437
  status: active_verbatim
  cross_references:
  - configuration management
- term: CMMI Framework
  definition: The basic structure that organizes CMMI components, including elements of current CMMI models as well as rules and methods for generating models, appraisal methods (including associated artifacts), and training materials.
  source_page: 437
  status: active_verbatim
  cross_references:
  - CMMI model
  - CMMI Product Suite
  notes: The framework enables new areas of interest to be added to CMMI so that they will integrate with the existing ones.
- term: CMMI model
  definition: A model generated from the CMMI Framework.
  source_page: 437
  status: active_verbatim
  cross_references:
  - CMMI Framework
  - CMMI Product Suite
- term: CMMI model component
  definition: Any of the main architectural elements that compose a CMMI model.
  source_page: 437
  status: active_verbatim
  notes: Some of the main elements of a CMMI model include specific practices, generic practices, specific goals, generic goals, process areas, capability levels, and maturity levels.
- term: CMMI Product Suite
  definition: The complete set of products developed around the CMMI concept.
  source_page: 437
  status: active_verbatim
  cross_references:
  - CMMI Framework
  - CMMI model
  notes: These products include the framework itself, models, appraisal methods, appraisal materials, and training materials.
- term: commercial off-the-shelf
  definition: Items that can be purchased from a commercial supplier.
  source_page: 437
  status: active_verbatim
  abbreviation: COTS
- term: common cause of variation
  definition: The variation of a process that exists because of normal and expected interactions among components of a process.
  source_page: 437
  status: active_verbatim
  cross_references:
  - special cause of variation
- term: configuration audit
  definition: An audit conducted to verify that a configuration item or a collection of configuration items that make up a baseline conforms to a specified standard or requirement.
  source_page: 437
  status: active_verbatim
  cross_references:
  - audit
  - configuration item
- term: configuration baseline
  definition: The configuration information formally designated at a specific time during a product's or product component's life.
  source_page: 437
  status: active_verbatim
  cross_references:
  - product lifecycle
  notes: Configuration baselines plus approved changes from those baselines constitute the current configuration information.
- term: configuration control
  definition: An element of configuration management consisting of the evaluation, coordination, approval or disapproval, and implementation of changes to configuration items after formal establishment of their configuration identification.
  source_page: 438
  status: active_verbatim
  cross_references:
  - configuration identification
  - configuration item
  - configuration management
- term: configuration control board
  definition: A group of people responsible for evaluating and approving or disapproving proposed changes to configuration items and for ensuring implementation of approved changes.
  source_page: 438
  status: active_verbatim
  abbreviation: CCB
  cross_references:
  - configuration item
  notes: Configuration control boards are also known as 'change control boards.'
- term: configuration identification
  definition: An element of configuration management consisting of selecting the configuration items for a product, assigning unique identifiers to them, and recording their functional and physical characteristics in technical documentation.
  source_page: 438
  status: active_verbatim
  cross_references:
  - configuration item
  - configuration management
  - product
- term: configuration item
  definition: An aggregation of work products that is designated for configuration management and treated as a single entity in the configuration management process.
  source_page: 438
  status: active_verbatim
  abbreviation: CI
  cross_references:
  - configuration management
- term: configuration management
  definition: A discipline applying technical and administrative direction and surveillance to (1) identify and document the functional and physical characteristics of a configuration item, (2) control changes to those characteristics, (3) record and report change processing and implementation status, and (4) verify compliance with specified requirements.
  source_page: 438
  status: active_verbatim
  abbreviation: CM
  cross_references:
  - configuration audit
  - configuration control
  - configuration identification
  - configuration status accounting
- term: configuration status accounting
  definition: An element of configuration management consisting of the recording and reporting of information needed to manage a configuration effectively.
  source_page: 438
  status: active_verbatim
  cross_references:
  - configuration identification
  - configuration management
  notes: This information includes a list of the approved configuration, the status of proposed changes to the configuration, and the implementation status of approved changes.
- term: constellation
  definition: A collection of CMMI components that are used to construct models, training materials, and appraisal related documents for an area of interest (e.g., acquisition, development, services).
  source_page: 438
  status: active_verbatim
- term: continuous representation
  definition: A capability maturity model structure wherein capability levels provide a recommended order for approaching process improvement within each specified process area.
  source_page: 439
  status: active_verbatim
  cross_references:
  - capability level
  - process area
  - staged representation
- term: contractor
  definition: See supplier.
  source_page: 439
  status: active_verbatim
  cross_references:
  - supplier
- term: contractual requirements
  definition: The result of the analysis and refinement of customer requirements into a set of requirements suitable to be included in one or more solicitation packages, or supplier agreements.
  source_page: 439
  status: active_verbatim
  cross_references:
  - acquirer
  - customer requirement
  - supplier agreement
  - solicitation package
  notes: Contractual requirements include both technical and nontechnical requirements necessary for the acquisition of a product or service.
- term: corrective action
  definition: Acts or deeds used to remedy a situation or remove an error.
  source_page: 439
  status: active_verbatim
- term: customer
  definition: The party responsible for accepting the product or for authorizing payment.
  source_page: 439
  status: active_verbatim
  cross_references:
  - stakeholder
  - customer requirement
  - end user
  notes: The customer is external to the project or work group (except possibly in certain project structures in which the customer effectively is on the project team or in the work group) but not necessarily external to the organization. The customer can be a higher level project or work group. Customers are a subset of stakeholders. In most cases where this term is used, the preceding definition is intended; however, in some contexts, the term 'customer' is intended to include other relevant stakeholders. End users can be distinguished from customers if the parties that directly receive the value of products and services are not the same as the parties that arrange for, pay for, or negotiate agreements.
- term: customer requirement
  definition: The result of eliciting, consolidating, and resolving conflicts among the needs, expectations, constraints, and interfaces of the product's relevant stakeholders in a way that is acceptable to the customer.
  source_page: 439
  status: active_verbatim
  cross_references:
  - customer
- term: data
  definition: Recorded information.
  source_page: 439
  status: active_verbatim
  notes: Recorded information can include technical data, computer software documents, financial information, management information, representation of facts, numbers, or datum of any nature that can be communicated, stored, and processed.
- term: data management
  definition: The disciplined processes and systems that plan for, acquire, and provide stewardship for business and technical data, consistent with data requirements, throughout the data lifecycle.
  source_page: 440
  status: active_verbatim
- term: defect density
  definition: Number of defects per unit of product size.
  source_page: 440
  status: active_verbatim
  notes: An example is the number of problem reports per thousand lines of code.
- term: defined process
  definition: A managed process that is tailored from the organization's set of standard processes according to the organization's tailoring guidelines; has a maintained process description; and contributes process related experiences to the organizational process assets.
  source_page: 440
  status: active_verbatim
  cross_references:
  - managed process
- term: definition of required functionality and quality attributes
  definition: A characterization of required functionality and quality attributes obtained through 'chunking,' organizing, annotating, structuring, or formalizing the requirements (functional and non-functional) to facilitate further refinement and reasoning about the requirements as well as (possibly, initial) solution exploration, definition, and evaluation.
  source_page: 440
  status: active_verbatim
  cross_references:
  - architecture
  - functional architecture
  - quality attribute
- term: deliverable
  definition: An item to be provided to an acquirer or other designated recipient as specified in an agreement.
  source_page: 440
  status: active_verbatim
  cross_references:
  - acquirer
  notes: This item can be a document, hardware item, software item, service, or any type of work product.
- term: delivery environment
  definition: The complete set of circumstances and conditions under which services are delivered in accordance with service agreements.
  source_page: 441
  status: active_verbatim
  cross_references:
  - service
  - service agreement
- term: derived measure
  definition: Measure that is defined as a function of two or more values of base measures.
  source_page: 441
  status: active_verbatim
  cross_references:
  - base measure
- term: derived requirements
  definition: Requirements that are not explicitly stated in customer requirements but are inferred (1) from contextual requirements (e.g., applicable standards, laws, policies, common practices, management decisions) or (2) from requirements needed to specify a product or service component.
  source_page: 441
  status: active_verbatim
  cross_references:
  - product requirements
- term: design review
  definition: A formal, documented, comprehensive, and systematic examination of a design to determine if the design meets the applicable requirements, to identify problems, and to propose solutions.
  source_page: 441
  status: active_verbatim
- term: development
  definition: To create a product or service system by deliberate effort.
  source_page: 441
  status: active_verbatim
  notes: In some contexts, development can include the maintenance of the developed product.
- term: document
  definition: A collection of data, regardless of the medium on which it is recorded, that generally has permanence and can be read by humans or machines.
  source_page: 441
  status: active_verbatim
  notes: Documents include both paper and electronic documents.
- term: end user
  definition: A party that ultimately uses a delivered product or that receives the benefit of a delivered service.
  source_page: 442
  status: active_verbatim
  cross_references:
  - customer
  - service agreement
  - service request
  notes: End users may or may not also be customers (who can establish and accept agreements or authorize payments). In contexts where a single service agreement covers multiple service deliveries, any party that initiates a service request can be considered an end user.
- term: enterprise
  definition: The full composition of a company.
  source_page: 442
  status: active_verbatim
  cross_references:
  - organization
  notes: A company can consist of many organizations in many locations with different customers.
- term: entry criteria
  definition: States of being that must be present before an effort can begin successfully.
  source_page: 442
  status: active_verbatim
- term: equivalent staging
  definition: A target staging, created using the continuous representation that is defined so that the results of using the target staging can be compared to maturity levels of the staged representation.
  source_page: 442
  status: active_verbatim
  cross_references:
  - capability level profile
  - maturity level
  - target profile
  - target staging
- term: establish and maintain
  definition: Create, document, use, and revise work products as necessary to ensure they remain useful.
  source_page: 442
  status: active_verbatim
  notes: 'The phrase ''establish and maintain'' plays a special role in communicating a deeper principle in CMMI: work products that have a central or key role in work group, project, and organizational performance should be given attention to ensure they are used and useful in that role. This phrase has particular significance in CMMI because it often appears in goal and practice statements (though in the former as ''established and maintained'') and should be taken as shorthand for applying the principle to whatever work product is the object of the phrase.'
- term: example work product
  definition: An informative model component that provides sample outputs from a specific practice.
  source_page: 442
  status: active_verbatim
- term: executive
  definition: See senior manager.
  source_page: 442
  status: active_verbatim
  cross_references:
  - senior manager
- term: exit criteria
  definition: States of being that must be present before an effort can end successfully.
  source_page: 443
  status: active_verbatim
- term: expected CMMI components
  definition: CMMI components that describe the activities that are important in achieving a required CMMI component.
  source_page: 443
  status: active_verbatim
  notes: Model users can implement the expected components explicitly or implement equivalent practices to these components. Specific and generic practices are expected model components.
- term: findings
  definition: See appraisal findings.
  source_page: 443
  status: active_verbatim
  cross_references:
  - appraisal findings
- term: formal evaluation process
  definition: A structured approach to evaluating alternative solutions against established criteria to determine a recommended solution to address an issue.
  source_page: 443
  status: active_verbatim
- term: framework
  definition: See CMMI Framework.
  source_page: 443
  status: active_verbatim
  cross_references:
  - CMMI Framework
- term: functional analysis
  definition: Examination of a defined function to identify all the subfunctions necessary to accomplish that function; identification of functional relationships and interfaces (internal and external) and capturing these relationships and interfaces in a functional architecture; and flow down of upper level requirements and assignment of these requirements to lower level subfunctions.
  source_page: 443
  status: active_verbatim
  cross_references:
  - functional architecture
- term: functional architecture
  definition: The hierarchical arrangement of functions, their internal and external (external to the aggregation itself) functional interfaces and external physical interfaces, their respective requirements, and their design constraints.
  source_page: 443
  status: active_verbatim
  cross_references:
  - architecture
  - functional analysis
  - definition of required functionality and quality attributes
- term: generic goal
  definition: A required model component that describes characteristics that must be present to institutionalize processes that implement a process area.
  source_page: 443
  status: active_verbatim
  abbreviation: GG
  cross_references:
  - institutionalization
- term: generic practice
  definition: An expected model component that is considered important in achieving the associated generic goal.
  source_page: 443
  status: active_verbatim
  abbreviation: GP
  notes: The generic practices associated with a generic goal describe the activities that are expected to result in achievement of the generic goal and contribute to the institutionalization of the processes associated with a process area.
- term: generic practice elaboration
  definition: An informative model component that appears after a generic practice to provide guidance on how the generic practice could be applied uniquely to a process area.
  source_page: 443
  status: active_verbatim
  notes: This model component is not present in all CMMI models.
- term: hardware engineering
  definition: The application of a systematic, disciplined, and quantifiable approach to transforming a set of requirements that represent the collection of stakeholder needs, expectations, and constraints, using documented techniques and technology to design, implement, and maintain a tangible product.
  source_page: 444
  status: active_verbatim
  cross_references:
  - software engineering
  - systems engineering
  notes: In CMMI, hardware engineering represents all technical fields (e.g., electrical, mechanical) that transform requirements and ideas into tangible products.
- term: higher level management
  definition: The person or persons who provide the policy and overall guidance for the process but do not provide the direct day-to-day monitoring and controlling of the process.
  source_page: 444
  status: active_verbatim
  cross_references:
  - senior manager
  notes: Such persons belong to a level of management in the organization above the immediate level responsible for the process and can be (but are not necessarily) senior managers.
- term: incomplete process
  definition: A process that is not performed or is performed only partially; one or more of the specific goals of the process area are not satisfied.
  source_page: 444
  status: active_verbatim
  notes: An incomplete process is also known as capability level 0.
- term: informative CMMI components
  definition: CMMI components that help model users understand the required and expected components of a model.
  source_page: 444
  status: active_verbatim
  notes: These components can be examples, detailed explanations, or other helpful information. Subpractices, notes, references, goal titles, practice titles, sources, example work products, and generic practice elaborations are informative model components.
- term: institutionalization
  definition: The ingrained way of doing business that an organization follows routinely as part of its corporate culture.
  source_page: 444
  status: active_verbatim
- term: interface control
  definition: In configuration management, the process of (1) identifying all functional and physical characteristics relevant to the interfacing of two or more configuration items provided by one or more organizations and (2) ensuring that proposed changes to these characteristics are evaluated and approved prior to implementation.
  source_page: 444
  status: active_verbatim
  cross_references:
  - configuration item
  - configuration management
- term: lifecycle model
  definition: A partitioning of the life of a product, service, project, work group, or set of work activities into phases.
  source_page: 444
  status: active_verbatim
- term: managed process
  definition: A performed process that is planned and executed in accordance with policy; employs skilled people having adequate resources to produce controlled outputs; involves relevant stakeholders; is monitored, controlled, and reviewed; and is evaluated for adherence to its process description.
  source_page: 445
  status: active_verbatim
  cross_references:
  - performed process
- term: manager
  definition: A person who provides technical and administrative direction and control to those who perform tasks or activities within the manager's area of responsibility.
  source_page: 445
  status: active_verbatim
  notes: This term has a special meaning in the CMMI Product Suite besides its common standard English meaning. The traditional functions of a manager include planning, organizing, directing, and controlling work within an area of responsibility.
- term: maturity level
  definition: Degree of process improvement across a predefined set of process areas in which all goals in the set are attained.
  source_page: 445
  status: active_verbatim
  abbreviation: ML
  cross_references:
  - capability level
  - process area
- term: measure (noun)
  definition: Variable to which a value is assigned as a result of measurement.
  source_page: 445
  status: active_verbatim
  cross_references:
  - base measure
  - derived measure
  - measurement
  notes: The definition of this term in CMMI is consistent with the definition of this term in ISO 15939.
- term: measurement
  definition: A set of operations to determine the value of a measure.
  source_page: 445
  status: active_verbatim
  cross_references:
  - measure (noun)
  notes: The definition of this term in CMMI is consistent with the definition of this term in ISO 15939.
- term: measurement result
  definition: A value determined by performing a measurement.
  source_page: 445
  status: active_verbatim
  cross_references:
  - measurement
- term: memorandum of agreement
  definition: Binding document of understanding or agreement between two or more parties.
  source_page: 445
  status: active_verbatim
  abbreviation: MOA
  notes: A memorandum of agreement is also known as a 'memorandum of understanding.'
- term: natural bounds
  definition: The inherent range of variation in a process, as determined by process performance measures.
  source_page: 445
  status: active_verbatim
  cross_references:
  - measure (noun)
  - process performance
  notes: Natural bounds are sometimes referred to as 'voice of the process.' Techniques such as control charts, confidence intervals, and prediction intervals are used to determine whether the variation is due to common causes (i.e., the process is predictable or stable) or is due to some special cause that can and should be identified and removed.
- term: nondevelopmental item
  definition: An item that was developed prior to its current use in an acquisition or development process.
  source_page: 446
  status: active_verbatim
  abbreviation: NDI
  notes: Such an item can require minor modifications to meet the requirements of its current intended use.
- term: nontechnical requirements
  definition: Requirements affecting product and service acquisition or development that are not properties of the product or service.
  source_page: 446
  status: active_verbatim
  notes: Examples include numbers of products or services to be delivered, data rights for delivered COTS and nondevelopmental items, delivery dates, and milestones with exit criteria. Other nontechnical requirements include work constraints associated with training, site provisions, and deployment schedules.
- term: objectively evaluate
  definition: To review activities and work products against criteria that minimize subjectivity and bias by the reviewer.
  source_page: 446
  status: active_verbatim
  cross_references:
  - audit
  notes: An example of an objective evaluation is an audit against requirements, standards, or procedures by an independent quality assurance function.
- term: operational concept
  definition: A general description of the way in which an entity is used or operates.
  source_page: 446
  status: active_verbatim
  notes: An operational concept is also known as 'concept of operations.'
- term: operational scenario
  definition: A description of an imagined sequence of events that includes the interaction of the product or service with its environment and users, as well as interaction among its product or service components.
  source_page: 446
  status: active_verbatim
  notes: Operational scenarios are used to evaluate the requirements and design of the system and to verify and validate the system.
- term: organization
  definition: An administrative structure in which people collectively manage one or more projects or work groups as a whole, share a senior manager, and operate under the same policies.
  source_page: 446
  status: active_verbatim
  cross_references:
  - enterprise
  notes: However, the word 'organization' as used throughout CMMI models can also apply to one person who performs a function in a small organization that might be performed by a group of people in a large organization.
- term: organization's business objectives
  definition: Senior-management-developed objectives designed to ensure an organization's continued existence and enhance its profitability, market share, and other factors influencing the organization's success.
  source_page: 447
  status: active_verbatim
  cross_references:
  - quality and process performance objectives
  - quantitative objective
- term: organization's measurement repository
  definition: A repository used to collect and make measurement results available on processes and work products, particularly as they relate to the organization's set of standard processes.
  source_page: 447
  status: active_verbatim
  notes: This repository contains or references actual measurement results and related information needed to understand and analyze measurement results.
- term: organization's process asset library
  definition: A library of information used to store and make process assets available that are useful to those who are defining, implementing, and managing processes in the organization.
  source_page: 447
  status: active_verbatim
  abbreviation: OPAL
  notes: This library contains process assets that include process related documentation such as policies, defined processes, checklists, lessons learned documents, templates, standards, procedures, plans, and training materials.
- term: organization's set of standard processes
  definition: A collection of definitions of the processes that guide activities in an organization.
  source_page: 447
  status: active_verbatim
  abbreviation: OSSP
  cross_references:
  - defined process
  - process element
  notes: These process descriptions cover the fundamental process elements (and their relationships to each other such as ordering and interfaces) that should be incorporated into the defined processes that are implemented in projects, work groups, and work across the organization. A standard process enables consistent development and maintenance activities across the organization and is essential for long-term stability and improvement.
- term: organizational maturity
  definition: The extent to which an organization has explicitly and consistently deployed processes that are documented, managed, measured, controlled, and continually improved.
  source_page: 446
  status: active_verbatim
  notes: Organizational maturity can be measured via appraisals.
- term: organizational policy
  definition: A guiding principle typically established by senior management that is adopted by an organization to influence and determine decisions.
  source_page: 447
  status: active_verbatim
- term: organizational process assets
  definition: Artifacts that relate to describing, implementing, and improving processes.
  source_page: 447
  status: active_verbatim
  abbreviation: OPA
  cross_references:
  - process asset library
  notes: Examples of these artifacts include policies, measurement descriptions, process descriptions, process implementation support tools. The term 'process assets' is used to indicate that these artifacts are developed or acquired to meet the business objectives of the organization and that they represent investments by the organization that are expected to provide current and future business value.
- term: outsourcing
  definition: See acquisition.
  source_page: 447
  status: active_verbatim
  cross_references:
  - acquisition
- term: peer review
  definition: The review of work products performed by peers during the development of work products to identify defects for removal.
  source_page: 448
  status: active_verbatim
  cross_references:
  - work product
  notes: The term 'peer review' is used in the CMMI Product Suite instead of the term 'work product inspection.'
- term: performance parameters
  definition: The measures of effectiveness and other key measures used to guide and control progressive development.
  source_page: 448
  status: active_verbatim
- term: performed process
  definition: A process that accomplishes the needed work to produce work products; the specific goals of the process area are satisfied.
  source_page: 448
  status: active_verbatim
- term: planned process
  definition: A process that is documented by both a description and a plan.
  source_page: 448
  status: active_verbatim
  notes: The description and plan should be coordinated and the plan should include standards, requirements, objectives, resources, and assignments.
- term: policy
  definition: See organizational policy.
  source_page: 448
  status: active_verbatim
  cross_references:
  - organizational policy
- term: process
  definition: A set of interrelated activities, which transform inputs into outputs, to achieve a given purpose.
  source_page: 448
  status: active_verbatim
  cross_references:
  - process area
  - subprocess
  - process element
  notes: There is a special use of the phrase 'the process' in the statements and descriptions of the generic goals and generic practices. 'The process,' as used in Part Two, is the process or processes that implement the process area. The terms 'process,' 'subprocess' and 'process element' form a hierarchy with 'process' as the highest, most general term, 'subprocesses' below it, and 'process element' as the most specific. This definition of process is consistent with the definition of process in ISO 9000, ISO 12207, ISO 15504, and EIA 731.
- term: process action plan
  definition: A plan, usually resulting from appraisals, that documents how specific improvements targeting the weaknesses uncovered by an appraisal will be implemented.
  source_page: 448
  status: active_verbatim
- term: process action team
  definition: A team that has the responsibility to develop and implement process improvement activities for an organization as documented in a process action plan.
  source_page: 448
  status: active_verbatim
- term: process and technology improvements
  definition: Incremental and innovative improvements to processes and to process, product, or service technologies.
  source_page: 448
  status: active_verbatim
- term: process architecture
  definition: (1) The ordering, interfaces, interdependencies, and other relationships among the process elements in a standard process, or (2) the interfaces, interdependencies, and other relationships between process elements and external processes.
  source_page: 449
  status: active_verbatim
- term: process area
  definition: A cluster of related practices in an area that, when implemented collectively, satisfies a set of goals considered important for making improvement in that area.
  source_page: 449
  status: active_verbatim
  abbreviation: PA
- term: process asset
  definition: Anything the organization considers useful in attaining the goals of a process area.
  source_page: 449
  status: active_verbatim
  cross_references:
  - organizational process assets
- term: process asset library
  definition: A collection of process asset holdings that can be used by an organization, project, or work group.
  source_page: 449
  status: active_verbatim
  cross_references:
  - organization's process asset library
- term: process attribute
  definition: A measurable characteristic of process capability applicable to any process.
  source_page: 449
  status: active_verbatim
- term: process capability
  definition: The range of expected results that can be achieved by following a process.
  source_page: 449
  status: active_verbatim
- term: process definition
  definition: The act of defining and describing a process.
  source_page: 449
  status: active_verbatim
  cross_references:
  - process description
  notes: The result of process definition is a process description.
- term: process description
  definition: A documented expression of a set of activities performed to achieve a given purpose.
  source_page: 449
  status: active_verbatim
  notes: A process description provides an operational definition of the major components of a process. The description specifies, in a complete, precise, and verifiable manner, the requirements, design, behavior, or other characteristics of a process. It also can include procedures for determining whether these provisions have been satisfied. Process descriptions can be found at the activity, project, work group, or organizational level.
- term: process element
  definition: The fundamental unit of a process.
  source_page: 450
  status: active_verbatim
  cross_references:
  - process
  - subprocess
  notes: A process can be defined in terms of subprocesses or process elements. A subprocess is a process element when it is not further decomposed into subprocesses or process elements. Each process element covers a closely related set of activities (e.g., estimating element, peer review element). Process elements can be portrayed using templates to be completed, abstractions to be refined, or descriptions to be modified or used. A process element can be an activity or task. The terms 'process,' 'subprocess,' and 'process element' form a hierarchy with 'process' as the highest, most general term, 'subprocesses' below it, and 'process element' as the most specific.
- term: process group
  definition: A collection of specialists who facilitate the definition, maintenance, and improvement of processes used by the organization.
  source_page: 450
  status: active_verbatim
- term: process improvement
  definition: A program of activities designed to improve the process performance and maturity of the organization's processes, and the results of such a program.
  source_page: 450
  status: active_verbatim
- term: process improvement objectives
  definition: A set of target characteristics established to guide the effort to improve an existing process in a specific, measurable way either in terms of resultant product or service characteristics (e.g., quality, product performance, conformance to standards) or in the way in which the process is executed (e.g., elimination of redundant process steps, combination of process steps, improvement of cycle time).
  source_page: 450
  status: active_verbatim
  cross_references:
  - organization's business objectives
  - quantitative objective
- term: process improvement plan
  definition: A plan for achieving organizational process improvement objectives based on a thorough understanding of current strengths and weaknesses of the organization's processes and process assets.
  source_page: 450
  status: active_verbatim
- term: process measurement
  definition: A set of operations used to determine values of measures of a process and its resulting products or services for the purpose of characterizing and understanding the process.
  source_page: 450
  status: active_verbatim
  cross_references:
  - measurement
- term: process owner
  definition: The person (or team) responsible for defining and maintaining a process.
  source_page: 451
  status: active_verbatim
  cross_references:
  - defined process
  - standard process
  notes: At the organizational level, the process owner is the person (or team) responsible for the description of a standard process; at the project or work group level, the process owner is the person (or team) responsible for the description of the defined process. A process can therefore have multiple owners at different levels of responsibility.
- term: process performance
  definition: A measure of results achieved by following a process.
  source_page: 451
  status: active_verbatim
  cross_references:
  - measure (noun)
  notes: Process performance is characterized by both process measures (e.g., effort, cycle time, defect removal efficiency) and product or service measures (e.g., reliability, defect density, response time).
- term: process performance baseline
  definition: A documented characterization of process performance, which can include central tendency and variation.
  source_page: 451
  status: active_verbatim
  cross_references:
  - process performance
  notes: A process performance baseline can be used as a benchmark for comparing actual process performance against expected process performance.
- term: process performance model
  definition: A description of relationships among the measurable attributes of one or more processes or work products that is developed from historical process performance data and is used to predict future performance.
  source_page: 451
  status: active_verbatim
  cross_references:
  - measure (noun)
- term: process tailoring
  definition: Making, altering, or adapting a process description for a particular end.
  source_page: 451
  status: active_verbatim
  cross_references:
  - defined process
  - organization's set of standard processes
  - process description
- term: product
  definition: A work product that is intended for delivery to a customer or end user.
  source_page: 452
  status: active_verbatim
  cross_references:
  - customer
  - product component
  - service
  - work product
  notes: This term has a special meaning in the CMMI Product Suite besides its common standard English meaning. The form of a product can vary in different contexts.
- term: product baseline
  definition: The initial approved technical data package defining a configuration item during the production, operation, maintenance, and logistic support of its lifecycle.
  source_page: 452
  status: active_verbatim
  cross_references:
  - configuration item
  - configuration management
  - technical data package
- term: product component
  definition: A work product that is a lower level component of the product.
  source_page: 452
  status: active_verbatim
  cross_references:
  - product
  - work product
  notes: Product components are integrated to produce the product. There can be multiple levels of product components. Throughout the process areas, where the terms 'product' and 'product component' are used, their intended meanings also encompass services, service systems, and their components.
- term: product component requirements
  definition: A complete specification of a product or service component, including fit, form, function, performance, and any other requirement.
  source_page: 452
  status: active_verbatim
- term: product lifecycle
  definition: The period of time, consisting of phases, that begins when a product or service is conceived and ends when the product or service is no longer available for use.
  source_page: 452
  status: active_verbatim
  notes: 'A product lifecycle could consist of the following phases: (1) concept and vision, (2) feasibility, (3) design/development, (4) production, and (5) phase out.'
- term: product line
  definition: A group of products sharing a common, managed set of features that satisfy specific needs of a selected market or mission and that are developed from a common set of core assets in a prescribed way.
  source_page: 453
  status: active_verbatim
  cross_references:
  - service line
- term: product related lifecycle processes
  definition: Processes associated with a product or service throughout one or more phases of its life (e.g., from conception through disposal), such as manufacturing and support processes.
  source_page: 453
  status: active_verbatim
- term: product requirements
  definition: A refinement of customer requirements into the developers' language, making implicit requirements into explicit derived requirements.
  source_page: 453
  status: active_verbatim
  cross_references:
  - derived requirements
  - product component requirements
- term: product suite
  definition: See CMMI Product Suite.
  source_page: 453
  status: active_verbatim
  cross_references:
  - CMMI Product Suite
- term: project
  definition: A managed set of interrelated activities and resources, including people, that delivers one or more products or services to a customer or end user.
  source_page: 453
  status: active_verbatim
  cross_references:
  - project startup
  notes: A project has an intended beginning (i.e., project startup) and end. Projects typically operate according to a plan. In some contexts, the term 'program' is used to refer to a project.
- term: project plan
  definition: A plan that provides the basis for performing and controlling the project's activities, which addresses the commitments to the project's customer.
  source_page: 454
  status: active_verbatim
  notes: Project planning includes estimating the attributes of work products and tasks, determining the resources needed, negotiating commitments, producing a schedule, and identifying and analyzing project risks.
- term: project progress and performance
  definition: What a project achieves with respect to implementing project plans, including effort, cost, schedule, and technical performance.
  source_page: 454
  status: active_verbatim
  cross_references:
  - technical performance
- term: project startup
  definition: When a set of interrelated resources for a project are directed to develop or deliver one or more products or services for a customer or end user.
  source_page: 454
  status: active_verbatim
  cross_references:
  - project
- term: prototype
  definition: A preliminary type, form, or instance of a product, service, product component, or service component that serves as a model for later stages or for the final, complete version of the product or service.
  source_page: 454
  status: active_verbatim
  notes: 'This model of the product or service (e.g., physical, electronic, digital, analytical) can be used for the following (and other) purposes: assessing the feasibility of a new or unfamiliar technology, assessing or mitigating technical risk, validating requirements, demonstrating critical features, qualifying a product or service, qualifying a process, characterizing performance or features of the product or service, and elucidating physical principles.'
- term: quality
  definition: The degree to which a set of inherent characteristics fulfills requirements.
  source_page: 454
  status: active_verbatim
- term: quality and process performance objectives
  definition: Quantitative objectives and requirements for product quality, service quality, and process performance.
  source_page: 454
  status: active_verbatim
  notes: Quantitative process performance objectives include quality; however, to emphasize the importance of quality in the CMMI Product Suite, the phrase 'quality and process performance objectives' is used. 'Process performance objectives' are referenced in maturity level 3; the term 'quality and process performance objectives' implies the use of quantitative data and is only used in maturity levels 4 and 5.
- term: quality assurance
  definition: A planned and systematic means for assuring management that the defined standards, practices, procedures, and methods of the process are applied.
  source_page: 455
  status: active_verbatim
- term: quality attribute
  definition: A property of a product or service by which its quality will be judged by relevant stakeholders. Quality attributes are characterizable by some appropriate measure.
  source_page: 455
  status: active_verbatim
  notes: Quality attributes are non-functional, such as timeliness, throughput, responsiveness, security, modifiability, reliability, and usability. They have a significant influence on the architecture.
- term: quality control
  definition: The operational techniques and activities that are used to fulfill requirements for quality.
  source_page: 455
  status: active_verbatim
  cross_references:
  - quality assurance
- term: quantitative management
  definition: Managing a project or work group using statistical and other quantitative techniques to build an understanding of the performance or predicted performance of processes in comparison to the project's or work group's quality and process performance objectives, and identifying corrective action that may need to be taken.
  source_page: 455
  status: active_verbatim
  cross_references:
  - statistical techniques
- term: quantitative objective
  definition: Desired target value expressed using quantitative measures.
  source_page: 455
  status: active_verbatim
  cross_references:
  - measure (noun)
  - process improvement objectives
  - quality and process performance objectives
- term: quantitatively managed
  definition: See quantitative management.
  source_page: 455
  status: active_verbatim
  cross_references:
  - quantitative management
- term: reference model
  definition: A model that is used as a benchmark for measuring an attribute.
  source_page: 455
  status: active_verbatim
- term: relevant stakeholder
  definition: A stakeholder that is identified for involvement in specified activities and is included in a plan.
  source_page: 455
  status: active_verbatim
  cross_references:
  - stakeholder
- term: representation
  definition: The organization, use, and presentation of a CMM's components.
  source_page: 455
  status: active_verbatim
  notes: 'Overall, two types of approaches to presenting best practices are evident: the staged representation and the continuous representation.'
- term: required CMMI components
  definition: CMMI components that are essential to achieving process improvement in a given process area.
  source_page: 456
  status: active_verbatim
  notes: Specific goals and generic goals are required model components. Goal satisfaction is used in appraisals as the basis for deciding whether a process area has been satisfied.
- term: requirement
  definition: (1) A condition or capability needed by a user to solve a problem or achieve an objective. (2) A condition or capability that must be met or possessed by a product, service, product component, or service component to satisfy a supplier agreement, standard, specification, or other formally imposed documents. (3) A documented representation of a condition or capability as in (1) or (2).
  source_page: 456
  status: active_verbatim
  cross_references:
  - supplier agreement
- term: requirements analysis
  definition: The determination of product or service specific functional and quality attribute characteristics based on analyses of customer needs, expectations, and constraints; operational concept; projected utilization environments for people, products, services, and processes; and measures of effectiveness.
  source_page: 456
  status: active_verbatim
  cross_references:
  - operational concept
- term: requirements elicitation
  definition: Using systematic techniques such as prototypes and structured surveys to proactively identify and document customer and end-user needs.
  source_page: 456
  status: active_verbatim
- term: requirements management
  definition: The management of all requirements received by or generated by the project or work group, including both technical and nontechnical requirements as well as those requirements levied on the project or work group by the organization.
  source_page: 456
  status: active_verbatim
  cross_references:
  - nontechnical requirements
- term: requirements traceability
  definition: A discernable association between requirements and related requirements, implementations, and verifications.
  source_page: 456
  status: active_verbatim
  cross_references:
  - bidirectional traceability
  - traceability
- term: return on investment
  definition: The ratio of revenue from output (product or service) to production costs, which determines whether an organization benefits from performing an action to produce something.
  source_page: 456
  status: active_verbatim
  abbreviation: ROI
- term: risk analysis
  definition: The evaluation, classification, and prioritization of risks.
  source_page: 456
  status: active_verbatim
- term: risk identification
  definition: An organized, thorough approach used to seek out probable or realistic risks in achieving objectives.
  source_page: 456
  status: active_verbatim
- term: risk management
  definition: An organized, analytic process used to identify what might cause harm or loss (identify risks); to assess and quantify the identified risks; and to develop and, if needed, implement an appropriate approach to prevent or handle causes of risk that could result in significant harm or loss.
  source_page: 457
  status: active_verbatim
  notes: Typically, risk management is performed for the activities of a project, a work group, an organization, or other organizational units that are developing or delivering products or services.
- term: senior manager
  definition: A management role at a high enough level in an organization that the primary focus of the person filling the role is the long-term vitality of the organization rather than short-term concerns and pressures.
  source_page: 457
  status: active_verbatim
  cross_references:
  - higher level management
  notes: A senior manager has authority to direct the allocation or reallocation of resources in support of organizational process improvement effectiveness. A senior manager can be any manager who satisfies this description, including the head of the organization.
- term: service
  definition: A product that is intangible and non-storable.
  source_page: 457
  status: active_verbatim
  cross_references:
  - product
  - customer
  - work product
- term: service agreement
  definition: A binding, written record of a promised exchange of value between a service provider and a customer.
  source_page: 458
  status: active_verbatim
  cross_references:
  - customer
- term: service catalog
  definition: A list or repository of standardized service definitions.
  source_page: 458
  status: active_verbatim
- term: service incident
  definition: An indication of an actual or potential interference with a service.
  source_page: 458
  status: active_verbatim
  notes: Service incidents can occur in any service domain because customer and end-user complaints are types of incidents.
- term: service level
  definition: A defined magnitude, degree, or quality of service delivery performance.
  source_page: 458
  status: active_verbatim
  cross_references:
  - service
  - service level measure
- term: service level agreement
  definition: A service agreement that specifies delivered services; service measures; levels of acceptable and unacceptable services; and expected responsibilities, liabilities, and actions of both the provider and customer in anticipated situations.
  source_page: 459
  status: active_verbatim
  abbreviation: SLA
  cross_references:
  - measure (noun)
  - service
  - service agreement
- term: service level measure
  definition: A measure of service delivery performance associated with a service level.
  source_page: 459
  status: active_verbatim
  cross_references:
  - measure (noun)
  - service level
- term: service line
  definition: A consolidated and standardized set of services and service levels that satisfy specific needs of a selected market or mission area.
  source_page: 459
  status: active_verbatim
  cross_references:
  - product line
  - service level
- term: service request
  definition: A communication from a customer or end user that one or more specific instances of service delivery are desired.
  source_page: 459
  status: active_verbatim
  cross_references:
  - service agreement
- term: service requirements
  definition: The complete set of requirements that affect service delivery and service system development.
  source_page: 459
  status: active_verbatim
  cross_references:
  - service system
- term: service system
  definition: An integrated and interdependent combination of component resources that satisfies service requirements.
  source_page: 460
  status: active_verbatim
  cross_references:
  - service system component
  - service requirements
- term: service system component
  definition: A resource required for a service system to successfully deliver services.
  source_page: 460
  status: active_verbatim
  cross_references:
  - customer
  - end user
- term: service system consumable
  definition: A service system component that ceases to be available or becomes permanently changed by its use during the delivery of a service.
  source_page: 460
  status: active_verbatim
- term: shared vision
  definition: A common understanding of guiding principles, including mission, objectives, expected behavior, values, and final outcomes, which are developed and used by a project or work group.
  source_page: 461
  status: active_verbatim
- term: software engineering
  definition: (1) The application of a systematic, disciplined, quantifiable approach to the development, operation, and maintenance of software. (2) The study of approaches as in (1).
  source_page: 461
  status: active_verbatim
  cross_references:
  - hardware engineering
  - systems engineering
- term: solicitation
  definition: The process of preparing a package to be used in selecting a supplier.
  source_page: 461
  status: active_verbatim
  cross_references:
  - solicitation package
- term: solicitation package
  definition: A collection of formal documents that includes a description of the desired form of response from a potential supplier, the relevant statement of work for the supplier, and required provisions in the supplier agreement.
  source_page: 461
  status: active_verbatim
- term: special cause of variation
  definition: A cause of a defect that is specific to some transient circumstance and is not an inherent part of a process.
  source_page: 461
  status: active_verbatim
  cross_references:
  - common cause of variation
- term: specific goal
  definition: A required model component that describes the unique characteristics that must be present to satisfy the process area.
  source_page: 461
  status: active_verbatim
  abbreviation: SG
  cross_references:
  - capability level
  - generic goal
  - organization's business objectives
  - process area
- term: specific practice
  definition: An expected model component that is considered important in achieving the associated specific goal.
  source_page: 461
  status: active_verbatim
  abbreviation: SP
  cross_references:
  - process area
  - specific goal
  notes: The specific practices describe the activities expected to result in achievement of the specific goals of a process area.
- term: stable process
  definition: The state in which special causes of process variation have been removed and prevented from recurring so that only common causes of process variation of the process remain.
  source_page: 461
  status: active_verbatim
  cross_references:
  - capable process
  - common cause of variation
  - special cause of variation
  - standard process
- term: staged representation
  definition: A model structure wherein attaining the goals of a set of process areas establishes a maturity level; each level builds a foundation for subsequent levels.
  source_page: 461
  status: active_verbatim
  cross_references:
  - maturity level
  - process area
- term: stakeholder
  definition: A group or individual that is affected by or is in some way accountable for the outcome of an undertaking.
  source_page: 462
  status: active_verbatim
  cross_references:
  - customer
  - relevant stakeholder
  notes: Stakeholders may include project or work group members, suppliers, customers, end users, and others. This term has a special meaning in the CMMI Product Suite besides its common standard English meaning.
- term: standard (noun)
  definition: Formal requirements developed and used to prescribe consistent approaches to acquisition, development, or service.
  source_page: 462
  status: active_verbatim
  notes: Examples of standards include ISO/IEC standards, IEEE standards, and organizational standards.
- term: standard process
  definition: An operational definition of the basic process that guides the establishment of a common process in an organization.
  source_page: 462
  status: active_verbatim
  cross_references:
  - defined process
  notes: A standard process describes the fundamental process elements that are expected to be incorporated into any defined process. It also describes relationships (e.g., ordering, interfaces) among these process elements.
- term: statement of work
  definition: A description of work to be performed.
  source_page: 462
  status: active_verbatim
  abbreviation: SOW
- term: statistical and other quantitative techniques
  definition: Analytic techniques that enable accomplishing an activity by quantifying parameters of the task (e.g., inputs, size, effort, and performance).
  source_page: 462
  status: active_verbatim
  cross_references:
  - statistical techniques
  - quantitative management
- term: statistical process control
  definition: Statistically based analysis of a process and measures of process performance, which identify common and special causes of variation in process performance and maintain process performance within limits.
  source_page: 462
  status: active_verbatim
  abbreviation: SPC
  cross_references:
  - common cause of variation
  - special cause of variation
  - statistical techniques
- term: statistical techniques
  definition: Techniques adapted from the field of mathematical statistics used for activities such as characterizing process performance, understanding process variation, and predicting outcomes.
  source_page: 463
  status: active_verbatim
  notes: Examples of statistical techniques include sampling techniques, analysis of variance, chi-squared tests, and process control charts.
- term: subpractice
  definition: An informative model component that provides guidance for interpreting and implementing specific or generic practices.
  source_page: 463
  status: active_verbatim
  notes: Subpractices may be worded as if prescriptive, but they are actually meant only to provide ideas that can be useful for process improvement.
- term: subprocess
  definition: A process that is part of a larger process.
  source_page: 463
  status: active_verbatim
  cross_references:
  - process
  - process description
  - process element
- term: supplier
  definition: (1) An entity delivering products or performing services being acquired. (2) An individual, partnership, company, corporation, association, or other entity having an agreement with an acquirer for the design, development, manufacture, maintenance, modification, or supply of items under the terms of an agreement.
  source_page: 463
  status: active_verbatim
  cross_references:
  - acquirer
- term: supplier agreement
  definition: A documented agreement between the acquirer and supplier.
  source_page: 463
  status: active_verbatim
  cross_references:
  - supplier
  notes: Supplier agreements are also known as contracts, licenses, and memoranda of agreement.
- term: sustainment
  definition: The processes used to ensure that a product or service remains operational.
  source_page: 463
  status: active_verbatim
- term: system of systems
  definition: A set or arrangement of systems that results when independent and useful systems are integrated into a large system that delivers unique capabilities.
  source_page: 463
  status: active_verbatim
  abbreviation: SoS
- term: systems engineering
  definition: The interdisciplinary approach governing the total technical and managerial effort required to transform a set of customer needs, expectations, and constraints into a solution and to support that solution throughout its life.
  source_page: 464
  status: active_verbatim
  cross_references:
  - hardware engineering
  - software engineering
- term: tailoring
  definition: The act of making, altering, or adapting something for a particular end.
  source_page: 464
  status: active_verbatim
  notes: For example, a project or work group establishes its defined process by tailoring from the organization's set of standard processes to meet its objectives, constraints, and environment. Likewise, a service provider tailors standard services for a particular service agreement.
- term: tailoring guidelines
  definition: Organizational guidelines that enable projects, work groups, and organizational functions to appropriately adapt standard processes for their use.
  source_page: 464
  status: active_verbatim
  notes: The organization's set of standard processes is described at a general level that may not be directly usable to perform a process. Tailoring guidelines aid those who establish the defined processes for project or work groups. Tailoring guidelines cover (1) selecting a standard process, (2) selecting an approved lifecycle model, and (3) tailoring the selected standard process and lifecycle model to fit project or work group needs.
- term: target profile
  definition: A list of process areas and their corresponding capability levels that represent an objective for process improvement.
  source_page: 464
  status: active_verbatim
  cross_references:
  - achievement profile
  - capability level profile
  notes: Target profiles are only available when using the continuous representation.
- term: target staging
  definition: A sequence of target profiles that describes the path of process improvement to be followed by the organization.
  source_page: 464
  status: active_verbatim
  cross_references:
  - achievement profile
  - capability level profile
  - target profile
  notes: Target staging is only available when using the continuous representation.
- term: team
  definition: A group of people with complementary skills and expertise who work together to accomplish specified objectives.
  source_page: 465
  status: active_verbatim
  notes: A team establishes and maintains a process that identifies roles, responsibilities, and interfaces; is sufficiently precise to enable the team to measure, manage, and improve their work performance; and enables the team to make and defend their commitments.
- term: technical data package
  definition: 'A collection of items that can include the following if such information is appropriate to the type of product and product component: product architecture description, allocated requirements, product component descriptions, product related lifecycle process descriptions (if not described as separate product components), key product characteristics, required physical characteristics and constraints, interface requirements, materials requirements (bills of material and material characteristics), fabrication and manufacturing requirements (for both the original equipment manufacturer and field support), verification criteria used to ensure requirements have been achieved, conditions of use (environments) and operating/usage scenarios, modes and states for operations, support, training, manufacturing, disposal, and verifications throughout the life of the product, rationale for decisions and characteristics (e.g., requirements, requirement allocations, design choices).'
  source_page: 465
  status: active_verbatim
- term: technical performance
  definition: Characteristic of a process, product, or service, generally defined by a functional or technical requirement.
  source_page: 466
  status: active_verbatim
  notes: Examples of technical performance types include estimating accuracy, end-user functions, security functions, response time, component accuracy, maximum weight, minimum throughput, allowable range.
- term: technical performance measure
  definition: Precisely defined technical measure of a requirement, capability, or some combination of requirements and capabilities.
  source_page: 466
  status: active_verbatim
  cross_references:
  - measure (noun)
- term: technical requirements
  definition: Properties (i.e., attributes) of products or services to be acquired or developed.
  source_page: 466
  status: active_verbatim
- term: traceability
  definition: A discernable association among two or more logical entities such as requirements, system elements, verifications, or tasks.
  source_page: 466
  status: active_verbatim
  cross_references:
  - bidirectional traceability
  - requirements traceability
- term: trade study
  definition: An evaluation of alternatives, based on criteria and systematic analysis, to select the best alternative for attaining determined objectives.
  source_page: 466
  status: active_verbatim
- term: training
  definition: Formal and informal learning options.
  source_page: 466
  status: active_verbatim
  notes: These learning options can include classroom training, informal mentoring, web-based training, guided self study, and formalized on-the-job training programs.
- term: unit testing
  definition: Testing of individual hardware or software units or groups of related units.
  source_page: 466
  status: active_verbatim
  cross_references:
  - acceptance testing
- term: validation
  definition: Confirmation that the product or service, as provided (or as it will be provided), will fulfill its intended use.
  source_page: 466
  status: active_verbatim
  cross_references:
  - verification
  notes: In other words, validation ensures that 'you built the right thing.'
- term: verification
  definition: Confirmation that work products properly reflect the requirements specified for them.
  source_page: 466
  status: active_verbatim
  cross_references:
  - validation
  notes: In other words, verification ensures that 'you built it right.'
- term: version control
  definition: The establishment and maintenance of baselines and the identification of changes to baselines that make it possible to return to the previous baseline.
  source_page: 467
  status: active_verbatim
  notes: In some contexts, an individual work product may have its own baseline and a level of control less than formal configuration control may be sufficient.
- term: work breakdown structure
  definition: An arrangement of work elements and their relationship to each other and to the end product or service.
  source_page: 467
  status: active_verbatim
  abbreviation: WBS
- term: work group
  definition: A managed set of people and other assigned resources that delivers one or more products or services to a customer or end user.
  source_page: 467
  status: active_verbatim
  cross_references:
  - project
  notes: A work group can be any organizational entity with a defined purpose, whether or not that entity appears on an organization chart. Work groups can appear at any level of an organization, can contain other work groups, and can span organizational boundaries. A work group together with its work can be considered the same as a project if it has an intentionally limited lifetime.
- term: work plan
  definition: A plan of activities and related resource allocations for a work group.
  source_page: 467
  status: active_verbatim
  notes: Work planning includes estimating the attributes of work products and tasks, determining the resources needed, negotiating commitments, producing a schedule, and identifying and analyzing risks.
- term: work product
  definition: A useful result of a process.
  source_page: 467
  status: active_verbatim
  cross_references:
  - product
  - product component
  notes: This result can include files, documents, products, parts of a product, services, process descriptions, specifications, and invoices. A key distinction between a work product and a product component is that a work product is not necessarily part of the end product. In CMMI models, the definition of 'work product' includes services, however, the phrase 'work products and services' is sometimes used to emphasize the inclusion of services in the discussion.
- term: work product and task attributes
  definition: Characteristics of products, services, and tasks used to help in estimating work.
  source_page: 467
  status: active_verbatim
  notes: These characteristics include items such as size, complexity, weight, form, fit, and function. They are typically used as one input to deriving other resource estimates (e.g., effort, cost, schedule).
- term: work startup
  definition: When a set of interrelated resources for a work group is directed to develop or deliver one or more products or services for a customer or end user.
  source_page: 468
  status: active_verbatim
  cross_references:
  - work group
