# CMMI Adoption Guide — Part One Chapter 5 (p.55-61)
# ============================================================================

adoption_overview:
  source_page: 55
  introductory_text: |
    The complexity of products today demands an integrated view of how
    organizations do business. CMMI can reduce the cost of process
    improvement across enterprises that depend on multiple functions or
    groups to achieve their objectives.

    To achieve this integrated view, the CMMI Framework includes common
    terminology, common model components, common appraisal methods, and
    common training materials.

adopting_cmmi:
  source_page_range: "55-56"
  initial_step: "Build organizational support through strong senior management sponsorship. To gain the sponsorship of senior management, it is often beneficial to expose them to the performance results experienced by others who have used CMMI to improve their processes."
  reference: "Gibson 2006 — SEI website: http://www.sei.cmu.edu/cmmi/research/results/"
  senior_management_activities:
    - "Influence the organization to adopt CMMI"
    - "Choose the best people to manage the process improvement effort"
    - "Monitor the process improvement effort personally"
    - "Be a visible advocate and spokesperson for the process improvement effort"
    - "Ensure that adequate resources are available to enable the process improvement effort to be successful"
  process_group: "Once sufficient senior management sponsorship is obtained, the next step is establishing a strong, technically competent process group that represents relevant stakeholders to guide process improvement efforts."
  ideal_model: "IDEAL (Initiating, Diagnosing, Establishing, Acting, and Learning) model. See SEI website: http://www.sei.cmu.edu/library/abstracts/reports/96hb001.cfm"

selections_for_program:
  source_page: 56
  three_selections:
    - id: "1"
      title: "Select a part of the organization"
      description: "Selecting the projects to be involved in your process improvement program is critical. The selection should consider organizational, product, and work homogeneity (i.e., whether the group's members all are experts in the same discipline, whether they all work on the same product or business line, and so on)."
    - id: "2"
      title: "Select a model"
      description: "The CMMI-DEV model focuses on activities for developing quality products and services. The CMMI-ACQ model focuses on activities for initiating and managing the acquisition of products and services. The CMMI-SVC model focuses on activities for providing quality services to the customer and end users."
      models:
        - CMMI-DEV: "for developing quality products and services"
        - CMMI-ACQ: "for initiating and managing acquisition of products and services"
        - CMMI-SVC: "for providing quality services to customer and end users"
    - id: "3"
      title: "Select a representation"
      description: "Select the representation (capability or maturity levels) that fits your concept of process improvement. Regardless of which you choose, you can select nearly any process area or group of process areas to guide improvement, although dependencies among process areas should be considered when making such a selection."

agile_interpretation:
  source_page_range: "58"
  introductory_text: |
    CMMI practices are designed to provide value across a range of different
    situations and thus are stated in general terms. Because CMMI does not
    endorse any particular approach to development, little information that
    is approach-specific is provided. Therefore, those who don't have prior
    experience implementing CMMI in situations similar to the one they are
    now in may find interpretation non-intuitive.
  pas_with_agile_notes:
    [CM, PI, PMC, PP, PPQA, RD, REQM, RSKM, TS, VER]
  description: "All Agile notes begin with the words 'In Agile environments' and are in example boxes."
  agile_definition: |
    Multiple Agile approaches exist. The phrases 'Agile environment' and
    'Agile method' are shorthand for any development or management approach
    that adheres to the Manifesto for Agile Development [Beck 2001].

    Such approaches are characterized by the following:
      - Direct involvement of the customer in product development
      - Use of multiple development iterations to learn about and evolve the product
      - Customer willingness to share in the responsibility for decisions and risk
  caveat: |
    Be cautious when using these notes. Your ultimate interpretation of the
    process area should fit the specifics of your situation, including your
    organization's business, project, work group, or team objectives, while
    fully meeting a CMMI process area's goals and practices. The notes
    should be taken as examples and are neither necessary nor sufficient to
    implementing the process area.
  references:
    - "SEI technical note: CMMI or Agile: Why Not Embrace Both! [Glazer 2008]"

appraisals:
  source_page_range: "59-60"
  purpose:
    - "Measure progress by conducting an appraisal and earning a maturity level rating or a capability level achievement profile"
    - "Determine how well the organization's processes compare to CMMI best practices and identify areas where improvement can be made"
    - "Inform external customers and suppliers about how well the organization's processes compare to CMMI best practices"
    - "Meet the contractual requirements of one or more customers"

  arc:
    name: "Appraisal Requirements for CMMI"
    abbreviation: ARC
    reference: "[SEI 2011b]"
    description: "Describes the requirements for several types of appraisals. A full benchmarking appraisal is defined as a Class A appraisal method. Less formal methods are defined as Class B or Class C methods."
    classes:
      A: "Full benchmarking — most rigorous; only method that can result in benchmark quality ratings"
      B: "Less formal than Class A — provides improvement information"
      C: "Less formal than Class A — provides improvement information"
    url: "http://www.sei.cmu.edu/cmmi/tools/appraisals/"

  scampi:
    name: "Standard CMMI Appraisal Method for Process Improvement"
    abbreviation: SCAMPI
    description: "SCAMPI A appraisal method is the generally accepted method used for conducting ARC Class A appraisals using CMMI models. The SCAMPI Method Definition Document (MDD) defines rules for ensuring the consistency of SCAMPI A appraisal ratings."
    reference: "[SEI 2011a]"
    classes:
      A: "Officially recognized and most rigorous method. Only method that can result in benchmark quality ratings."
      B: "Less formal than A — helps the organization identify improvement opportunities"
      C: "Less formal than A — helps the organization identify improvement opportunities"
    url: "http://www.sei.cmu.edu/cmmi/tools/appraisals/"

  appraisal_considerations:
    source_page: 60
    choices_affecting:
      - "CMMI model"
      - "Appraisal scope, including the organizational unit to be appraised, the CMMI process areas to be investigated, and the maturity level or capability levels to be appraised"
      - "Appraisal method"
      - "Appraisal team leader and team members"
      - "Appraisal participants selected from the appraisal entities to be interviewed"
      - "Appraisal outputs (e.g., ratings, instantiation-specific findings)"
      - "Appraisal constraints (e.g., time spent on site)"

  appraisal_principles:
    source_page: 61
    principles:
      - "Senior management sponsorship"
      - "A focus on the organization's business objectives"
      - "Confidentiality for interviewees"
      - "Use of a documented appraisal method"
      - "Use of a process reference model (e.g., a CMMI model)"
      - "A collaborative team approach"
      - "A focus on actions for process improvement"
    note: "Experience has shown that the most critical factor influencing successful process improvement and appraisals is senior management sponsorship."

training:
  source_page: 61
  description: "Whether your organization is new to process improvement or is already familiar with process improvement models, training is a key element in the ability of organizations to adopt CMMI. An initial set of courses is provided by the SEI and its Partner Network."
  introductory_course: "Introduction to CMMI for Development"
  advanced_training: "for those who plan to become more deeply involved in CMMI adoption or appraisal — for example, those who will guide improvement as part of a process group, those who will lead SCAMPI appraisals, and those who will teach the Introduction to CMMI for Development course"
  url: "http://www.sei.cmu.edu/training/"
