    category_name: "프로젝트 관리 요구사항"
    name: "누출금지 대상정보 및 보안 위규 처리"
    clause: "III.4.PMR"
    text: |
      누출금지 대상정보 및 보안 위규 처리에 대한 보안관리 ○ 아래 명시된 아래의‵누출금지 대상정보′에 대한 보안관리 계획을 사업제안서에
      기재하여야 하며, 해당 정보 누출 시 발주기관은 계약관련 규정에 따라 부정당업체로
      등록하여 입찰 참가자격을 제한할 수 있음
      〈 누출금지 대상정보 〉 ① 기관 소유 정보시스템의 내ㆍ외부 IP주소 현황 ② 세부 정보시스템 구성현황 및 정보통신망 구성도 ③ 사용자계정 및 패스워드 등 시스템 접근권한 정보 ④ 정보시스템 취약점분석 결과물 ⑤ 용역사업 결과물 및 프로그램 소스코드 ⑥ 국가용 보안시스템 및 정보보호시스템 도입현황 ⑦ 방화벽ㆍIPS 등 정보보호제품 및 라우터ㆍ스위치 등 네트워크 장비 설정 정보 ⑧ “공공기관의 정보공개에 관한 법률” 제9조1항에 따라 비공개 대상 정보로    분류된 기관의 내부문서 ⑨ 개인정보보호법 제2조1호의 개인정보 ⑩ 보안업무규정 제4조의 비밀, 同 시행규칙 제16조3항의 대외비 ⑪ 기타 발주기관에서 공개가 불가하다고 판단한 자료
      〈 누출금지 대상정보 〉
      ① 기관 소유 정보시스템의 내ㆍ외부 IP주소 현황
      ② 세부 정보시스템 구성현황 및 정보통신망 구성도
      ③ 사용자계정 및 패스워드 등 시스템 접근권한 정보
      ④ 정보시스템 취약점분석 결과물
      ⑤ 용역사업 결과물 및 프로그램 소스코드
      ⑥ 국가용 보안시스템 및 정보보호시스템 도입현황
      ⑦ 방화벽ㆍIPS 등 정보보호제품 및 라우터ㆍ스위치 등 네트워크 장비 설정 정보
      ⑧ “공공기관의 정보공개에 관한 법률” 제9조1항에 따라 비공개 대상 정보로
      분류된 기관의 내부문서
      ⑨ 개인정보보호법 제2조1호의 개인정보
      ⑩ 보안업무규정 제4조의 비밀, 同 시행규칙 제16조3항의 대외비
      ⑪ 기타 발주기관에서 공개가 불가하다고 판단한 자료
      ○ 제안사는 사업자 보안위규 처리기준을 숙지하며, 보안정책을 위반하거나 내부 자료를
      무단으로 유출하는 등 위규 사항이 발생하는 경우 아래와 같이 책임을 이행해야 함
      - “사업자 보안위규 처리기준”에 따라 당사자 및 관리자를 행정조치
      - “보안 위약금 부과기준”에 따라 위약금을 부과
      - “누출금지 대상정보”를 유출한 경우 부정당업자로 제재
      - 이외 민ㆍ형사상 모든 책임을 져야 함
      ○ 발주기관은 정보보안에 관한 책임사항, 책임범위, 보안대책 위반 시 손해배상 책임,
      누출금지 대상정보 등을 계약서에 기록할 수 있으며, 보안 위반이나 침해사고 발생 시
      경위 확인 후 재발방지 대책을 요구할 수 있음
      ○ 또한, 발주기관에서 실시한 기관 자체 보안점검에 따른 보안위규(경미한 사항 포함)
