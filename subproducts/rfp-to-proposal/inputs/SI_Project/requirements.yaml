  - id: "ECR-003"
    category_code: ECR
    category_name: "시스템 장비 구성 요구사항"
    name: "기초데이터관리시스템(RDMS) 구축"
    clause: "III.4.ECR"
    text: |
      기초데이터관리시스템(RDMS) 구축 정의 ○ 도입 품목 : 기초데이터관리시스템(RDMS) 구축
      ○ 도입 수량 : 1식
      ○ 주요 기능 및 규격
      1) 데이터 보관 장소 관리 기능
      - 데이터를 보관할 프로젝트를 분류에 따라 생성하고, 그 데이터를 보는 방법을
      뷰를 통해 정의하는 기능
      2) 데이터 수집 기능
      - 사용자 컴퓨터에 수집기를 설치하고 데이터의 형태를 정의하여,
      원하는 데이터를 자동으로 수집 기능
      - 프린트 데이터 수집 시 PDF 드라이버 제공
      3) 데이터 검색 기능
      - 수집된 데이터는 프로젝트별, 소유자별, 컴퓨터별로 조회할 수 있으며,
      데이터 태그에 대해 복합적인 검색 수행 기능 제공
      4) 데이터 상세조회 및 수정 기능
      - 데이터의 모든 태그와 데이터 파일을 상세하게 조회할 수 있으며,
      소유자는 태그를 수정하거나 소유자를 변경할 수 있어야 함
      5) 복수 시료 지원
      - 여러 시료의 데이터가 병합된 기초데이터에서 각각 개별 시료에 대한
      결과 추출 기능 제공
      6) 시험장비 환경 변화에 소스코드 수정 없이 사용자가 편리하게 템플릿 설정 변경
      기능(RawData의 양식변경, 시험장비 추가, 시험장비 소프트웨어 변경 등)
      7) LIMS에서 실험결과에 연동 버튼 및 바로보기 기능
    obligation: shall
    type: normative
    classification: system_equipment_requirement
    target_asset_candidates:
      - PRO
      - WI
      - REF
    evidence_candidates:
      - "설치확인서"
