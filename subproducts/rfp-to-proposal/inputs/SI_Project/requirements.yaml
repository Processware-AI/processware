    name: "하자보수 및 유지보수 일반"
    clause: "III.4.PSR"
    text: |
      하자보수 및 유지보수 일반 개념 정의 ○ 본 사업의 하자담보 및 유지보수 책임 기간은 (계약예규) 용역계약일반조건
      제58조제1항에 따라 검사에 의하여 사업의 완성을 확인한 후 1년간으로 함
      ○ 하자담보범위는 (계약예규) 용역계약일반조건 제49조에 따라 하자담보책임 기간 중에
      발생한 소프트웨어 또는 정보시스템 등의 결함 등을 수정하는 것을 말함
      ○ 유지보수의 범위는 시스템을 운영∙유지 하는데 필요한 지원 및 점검 등을 포함한다
      ○ 발주기간이 하자담보 책임기간 내에 하자가 발생하여 하자보수를 요청한 경우
      요청을 받은 즉시 그 하자를 보수하여야 하며 해당 하자의 발생원인 및 기타
      조치사항을 명시하여 사업담당자에게 제출하여야 함
      ○ 제안사는 하자담보책임 범위와 향후 수행할 유지관리 범위 및 방법, 인원에 대해
