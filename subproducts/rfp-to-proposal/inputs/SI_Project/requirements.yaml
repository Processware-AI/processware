  - id: "COR-004"
    category_code: COR
    category_name: "제약사항"
    name: "작업장소 상호협의 결정 및 원격지 개발 활성화"
    clause: "III.4.COR"
    text: |
      작업장소 상호협의 결정 및 원격지 개발 활성화의 정의 <작업장소 상호협의>
      ○ 계약당사자는 정보화 사업 수행을 위해 필요한 작업장소 등(장소, 설비, 기타 작업환경)을
      상호 협의하여 결정하며, 핵심 개발인력이 아닌 지원인력의 근무장소는 보안 등
      특별한 사유가 있는 경우를 제외하고는 제안사가 달리 정할 수 있음
      ○ 정보화 사업 수행을 위해 필요한 작업장소 등은 사업예산 내 계상되어 있으므로
      관련 비용을 포함하여 제안가격을 산출하되, 작업장소 등은 상호 협의하여 결정함
      ○ 정보화 사업 수행을 위하여 필요한 작업장소는 발주기관에서 제공하며, 설비 및
      기타 작업환경은 계약상대자가 구비하여야 함
      (단, 이 경우에도 제안사는 개발장소에 관하여 제시할 수 있음)
      <원격지 작업 장소 제시·검토 절차>
      ○ 제안사가 작업장소를 제시하는 경우 원격 개발에 따른 보안사고 등 위험 요인을
      식별하여 위험 요인별 대응 방안을 제시하여야 한다.
      ○ 제안사가 제시하는 작업 장소는 제안요청서 내 명시된 보안요구사항 및 프로젝트
      관리 요구사항을 준수하여 원격개발에 따른 구체적인 원격작업 보안관리 대책을
      관리적·물리적·기술적 보안을 구분하여 제시하여야 하며, 발주기관에서는 제시된
      작업 장소에 관하여 우선 검토한다. 다만, 발주기관에서는 제안사가 제시한 작업
      장소가 보안요구사항을 준수하지 못하는 경우 거부할 수 있다.
      - (관리적 보안) 보안정책, 보안자료 등급관리, 보안자료 접근관리, 백업대책 등
      - (물리적 보안) 출입보안, 원격개발 자소 및 장비 운용, 침해시 보안자료 백업 장소 운용 등
      - (기술적 보안) 침입방지, 자료보안기술, 노트북·USB 등 휴대용 저장매체, 네트워크 등
    obligation: shall
    type: normative
    classification: constraint
    target_asset_candidates:
      - POL
      - REF
    evidence_candidates:
      - "용역사업장 보안점검 결과서"
    tags: []
    status: active
    notes: ""
  - id: "COR-005"
    category_code: COR
    category_name: "제약사항"
    name: "SW 산출물 활용 촉진"
    clause: "III.4.COR"
    text: |
      SW 산출물 활용 촉진 <지적재산권 공동귀속>
      ○ 본 사업과 관련하여 구현된 산출물에 대한 지적재산권은 발주기관과 제안사가
      공동 소유함을 원칙으로 하되, 세부 사항은 협의하여 결정
      ○ 계약목적물의 지식재산권은 발주기관과 제안사가 공동으로 소유하지만, 개발의
      기여도 및 계약목적물의 특수성(국가안전보장, 외교관계, 보안 및 정보 보호 등)을
      고려하여 발주기관, 제안사 및 전문기관 간의 협의를 통해 저작권의 귀속 주체 등에
      대해 공동소유와 달리 정할 수 있음
      <SW 산출물 반출 절차>
      ○ 제안사는 지식재산권의 활용을 위하여 SW 산출물의 반출을 요청할 수 있으며,
      발주기관 보안업무규정 및 제안요청서에 명시된 누출금지 정보에 해당하지 않는
      경우 SW 산출물을 제공함. 단 공급자는 아래 내용을 준수하여야 함
      - 공급자(제안사)는 공급받은 SW 산출물에 대하여 제안요청서, 계약서 등에
      누출금지 정보로 명시한 정보를 삭제하고 활용하여야 하며, 이를 확인하는
      공급자 대표명의의 확약서를 발주기관에 제출하여야 함
      - 공급자(제안사)가 반출된 SW 산출물을 제3자에게 제공하려는 경우 반드시
      발주기관으로부터 사전 승인을 받아야 함
      - 발주기관은 공급자(제안사)가 제공받은 SW 산출물을 무단으로 유출하거나
      누출되는 경우 및 누출금지정보를 삭제하지 않고 활용하는 경우에는 계약관련
      규정에 따라 「국가계약법 시행령」제76조제2항제3호 등에 따라 입찰참가자격을 제한함
      <SW산출물 임치>
      ○ 제안사는 사업수행에 따른 산출물 중 기술자료를 제3의 기관에 임치할 수 있으며,
      기술자료란 아래의 것을 의미함
      1. 소스코드 및 오브젝트 코드의 복제물
