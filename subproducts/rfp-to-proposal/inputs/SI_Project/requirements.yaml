  - id: "SER-001"
    category_code: SER
    category_name: "보안 요구사항"
    name: "개발 시 보안 준수사항"
    clause: "III.4.SER"
    text: |
      발주기관 정보화 용역사업 보안관리 지침 준수 ○ 정보시스템 유지관리 및 신규 또는 고도화 개발 시 다음과 같은 보안대책을
      마련해야 함
      - 로그인 시 로그인 실패 횟수 5회 이상 접속 시 제한, 동일 사용자 계정으로
      동시 로그인 차단, 로그인 우회 접근 차단 등
      - ID/PW 입력방식 구현, ID(최소12자리이상) 및 비밀번호 규칙(대.소문자.숫자.특수
      문자혼용)에 정보보호 대책에 따라 2차 인증방식 추가구현(문자그림, 휴대폰인증 등)
      - 중요정보 및 개인정보가 전송되는 구간에 암호화 통신 적용
      - 사용자 인증정보, 개인정보 등 보안이 요구되는 정보는 소스코드 내 하드코딩 금지
      - 개인정보 및 중요정보는 각 기준에 맞는 암호화 알고리즘을 적용하여 DB에 저장
      - 관리자페이지 등 권한이 설정된 페이지가 비인가자에게 노출되지 않도록 해야 하며,
      권한별 접근 페이지 구분
      - 개발 및 테스트 서버가 외부에 노출되지 않도록 기술적·물리적 보안대책 마련
      - 그 외 보안이 요구되는 사항에 대해서는 사업 행정기관 및 공공기관 정보시스템
    obligation: shall
    type: normative
    classification: security_requirement
    target_asset_candidates:
      - POL
      - PRO
      - WI
    evidence_candidates:
      - "사용 설명서, 소스코드 보안약점 진단 결과서"
    tags: []
    status: active
    notes: ""
  - id: "SER-002"
    category_code: SER
    category_name: "보안 요구사항"
    name: "정보시스템 이용 시 보안 준수사항"
    clause: "III.4.SER"
    text: |
      정보시스템 이용 시 보안 준수사항 ○ 정보시스템 이용 시 다음과 같은 보안 사항을 준수해야 함
      - 정보시스템 관리자 페이지에 대한 접근제어가 사용자 권한에 따라 적용되는지 확인
      - 정보시스템 비밀번호 작성규칙(영문자, 특수문자, 숫자 등을 포함하여 9자리 이상)
      적용 및 비밀번호 실패 횟수 제한 등
      - 정보시스템 기본계정 및 불필요한 계정 삭제
      - 참여인력 대상 별도의 계정 생성(최고 관리자 권한 부여 차단)
      - 사용이 만료된 계정의 경우, 즉시 삭제 조치
      - 정보시스템 기본 포트 변경 및 불필요한 포트 제거
      - 정보시스템 원격 접근을 원천적으로 차단하지만, 부득이하게 허용하는 경우
      아래 보안 조치 수행
      · 작업용 단말 백신 설치·최신 업데이트, 악성코드 감염 여부 검사
      · 원격 접속 단말의 보안 조치 결과를 포함한 원격 접속 허용 신청서 제출 및 발주기관 승인
      · 암호화된 원격 관리 서비스(SSH 등) 사용 및 작업 내역 기록
      · 원격 작업일을 최소한 설정 및 접근 차단 정책 적용
      · 작업 종료시 작업 단말에 업무 관련 자료 삭제, 외부 반입 단말은 발주기관 정보
      보안담당관 확인 후 반출
      - 장애 시 서비스 가용성을 유지할 수 있도록 주기적인 백업 및 백업자료에 대한
      안전한 보안관리
      - 외부 일반 USB 사용금지, 불가피할 경우 보안기능이 포함된 전용 USB 사용 및
      사용내역 기록 등 철저하게 보안관리
      - 그 외 보안이 요구되는 사항에 대해서는 발주기관 정보보안 업무 규정 등을
      준용하여 대책 마련
      ○ 정보시스템 접근권한에 대한 승인 절차 준수
      - 정보시스템 이용 및 행정정보 열람에 대한 접근권한은 수행사의 용역책임자
      사전검토 후 발주기관의 승인을 받아야 함
    obligation: shall
    type: normative
    classification: security_requirement
    target_asset_candidates:
      - POL
      - PRO
      - WI
    evidence_candidates:
      - "보안점검 결과서, 보안조치 결과서"
    tags: []
    status: active
    notes: ""
