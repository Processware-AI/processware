    clause: "III.4.TER"
    text: |
      사용자 테스트 개념 정의 ○ 사용자 승인을 위한 검사 및 테스트 수행방법, 절차, 참여 조직 및 역할,
      점검사항, 최종 검수 기준, 점검 후 조치 방안 등을 세부적으로 기술하여 계획을
      수립하여야 함
      ○ 요구사항별 적합/부적합 판정을 할 수 있도록 요구사항별 테스트를 수행할 수
      있어야 하며, 이에 따른 테스트 데이터를 준비해야 함
      ○ 발주자와 협의하여 승인 검사/테스트를 계획하고, 발주자가 승인 검사/테스트를
      이행하기 위하여 필요한 모든 조력을 제공하여야 함
      ○ 개발 완료 후 최종 산출물 및 테스트 결과물을 첨부하여 발주자에게 승인 검사 및
      테스트를 요청하여야 하며, 승인 검사 및 테스트 과정에서 발견된 하자 사항은
      만족한 결과를 얻을 때까지 보완·테스트를 반복적으로 실시해야 함
    obligation: shall
    type: normative
    classification: test_requirement
    target_asset_candidates:
      - PRO
      - WI
      - TMP
      - REC
    evidence_candidates:
      - "테스트 시나리오 및 결과서"
