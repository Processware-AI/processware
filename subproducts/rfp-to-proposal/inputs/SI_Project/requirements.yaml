  - id: "PMR-010"
    category_code: PMR
    category_name: "프로젝트 관리 요구사항"
    name: "사무실 보안관리"
    clause: "III.4.PMR"
    text: |
      사무실에 대한 보안관리 요구사항 ○ 제안사는 사무실 또는 용역 업무를 수행하는 장소는 매체 및 장비 보안을 위하여
      잠금장치와 통제가 가능하도록 물리적 보안대책을 마련해야 함
      - CCTV, 시건장치 등 비인가자 출입통제 대책이 마련된 공간을 확보하여 업무를
      수행해야 하며, 사업 공간 사용 등은 사업 담당공무원과 협의하여 진행
      ○ 전산실 등 외부인의 출입이 통제되는 구역에는 2차 출입통제를 적용해야 하며,
      출입에 대한 출입자, 출입시간, 출입 사유, 서명 등을 포함한 출입관리대장 기재
      ○ 제안사는 사무실 또는 용역업무를 수행하는 공간에 대한 보안점검을 월 1회 이상
    obligation: shall
