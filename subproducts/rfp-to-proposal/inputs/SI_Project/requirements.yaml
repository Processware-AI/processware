  - id: "SER-004"
    category_code: SER
    category_name: "보안 요구사항"
    name: "보안 취약점 점검"
    clause: "III.4.SER"
    text: |
      취약점 점검 및 후속 조치 ○ 변경된 시스템 및 개발된 소스코드 전체에 대한 보안 취약점 점검(소스코드
      보안약점 진단, 모의해킹 등)을 1회 이상 자체적으로 실시해야 함
      - 신규 개발의 경우 : 소스코드 전체
      - 장비 신규·변경이 포함된 개발의 경우 : 소스코드 전체, 정보시스템 설정 정보
      - 유지보수의 경우 : 유지보수로 인해 변경된 정보시스템 설정정보 및 소스코드 전체
      ○ 보안취약점진단시스템 등 발주기관과 협의된 방법으로 보안 취약점 진단 후
      점검 결과에 따른 후속 보완 조치를 수행하여 서비스 개통 및 시스템 운영을
      전환해야 한다.
      - 시스템 : OS, 네트워크 장비, 보안장비, 제어시스템, 데이터베이스
      - 소스코드 보안약점 진단항목 : 소프트웨어 개발 보안 가이드 참조
      - 모의해킹 점검항목 : OWASP 10대 취약점, 국정원 홈페이지 8대 취약점, 웹
