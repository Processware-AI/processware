    text: |
      리포팅 도구 SW 도입 개념 정의 ○ 도입 품목 : 리포팅 도구
      ○ 도입 수량 : 1식
      ○ SW 기능 및 특징
      - 다양한 OS기능 지원 및 java Platform, .net Platform을 모두 지원
      - 자체Chart, 바코드, Cross Tab, Drilling 등의 기능 제공
      (저작권법에 따라 등록된 자체 개발차트 컴포넌트 보유 증빙)
      - 워드수준의 테이블컨트롤 제공(멀티테이블, 단일테이블)
      - 리포트 개발시 리포트 데이터와 폼파일이 하나의 파일로 작성이 가능
