  - id: "PMR-011"
    category_code: PMR
    category_name: "프로젝트 관리 요구사항"
    name: "장비 및 매체 보안관리"
    clause: "III.4.PMR"
    text: |
      장비 및 매체에 대한 보안관리 요구사항 ○ 제안사는 PC, 노트북, 및 USB 등 관련 장비를 사업 공간에 반출‧입할 수 없음.
      단, 그 필요성을 인정한 경우, 사업 담당공무원 승인에 따라 다음과 같은 사전 조치를
      실시해야 함
      - 백신 등 PC 보안프로그램 설치 여부 확인
      - 악성코드 감염 여부 및 자료 무단반출 여부 확인
      - 최신 업데이트가 가능하도록 정품 소프트웨어 설치
      - 반입한 장비는 장비 식별번호, 장비 반출·입 일자, 사용자명, 보안조치 점검유무,
      사업 담당공무원 승인 등의 내용을 포함한 ‘장비 반출입대장’을 작성한 후 라벨을
      부착하여 관리
      - USB 등의 휴대용 저장매체는 불가피한 경우에만 사용하며, 반출‧입 및 사용 시에는
      라벨 부착 및 관리대장에 등재하여 사용
      - 반출 시 사업 담당공무원 통제하에 저장자료 완전 삭제 및 담당자 승인 후 반출
      - 그 외 발주기관의 반출입 절차 준수
      ○ 업무수행 시 중요정보 유출 방지를 위해 반입한 장비를 대상으로 매체제어 환경을
      구축·운영해야 하며 매체제어 프로그램이 설치되지 않는 경우, 매체 연결 포트를
      물리적으로 봉인(포트락 사용 등)해야 하며, 사용 중인 키보드, 마우스, 랜포트는
      보안 스티커를 부착해야 함
      ○ 참여인력이 사용하는 장비에 대해 다음과 같은 보안활동을 실시해야 함
      - PC 및 노트북에 CMOS, 윈도우 로그인, 화면보호기 패스워드를 설정(영문자, 숫자,
      특수문자가 조합된 9글자 이상)
    obligation: shall
    type: normative
    classification: project_management_requirement
    target_asset_candidates:
      - POL
      - PRO
      - WI
      - TMP
      - REC
    evidence_candidates:
      - "장비 반출입 대장, 정보시스템 관리대장, 휴대용 저장매체 관리대장 등"
    tags: []
    status: active
    notes: ""
  - id: "PMR-012"
    category_code: PMR
    category_name: "프로젝트 관리 요구사항"
    name: "네트워크 보안관리"
    clause: "III.4.PMR"
    text: |
      네트워크에 대한 보안관리 요구사항 ○ 업무수행 시 참여인력이 사용하는 PC(또는 노트북) 대상으로 인터넷 연결을 원칙적으로
      금지하며, 부득이하게 사용하는 경우 사업 담당공무원의 승인 하에 제한적으로 허용함
      - 인터넷 PC는 유해사이트 접속을 차단하고, 업무에 필요한 사이트에만 접속토록
      침입차단시스템 등을 통해 통제하고 P2P, 웹하드, 메신저 등 자료공유 사이트 활용 원천 차단
      - 산출물 및 소스코드를 보관하는 PC는 외부로 자료가 유출되지 않도록 인터넷 연결을
      차단해야 하며 그 외 기술적·관리적 보안대책 마련
      ○ 참여인력의 무선 인터넷 활용을 통제하기 위한 대책을 강구해야 함. 단, 부득이하게
      사용해야 하는 경우 사업 담당공무원 및 정보보안담당관 승인하에 사용해야 함
      - 스마트폰ㆍ휴대폰을 무선 모뎀으로 활용 금지
      - 휴대형 무선모뎀(Wibro, HSDPA, Wi-Fi 등) 무단 활용 여부 수시 점검, 노트북PC
    obligation: shall
