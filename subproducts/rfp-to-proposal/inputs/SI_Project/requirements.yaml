  - id: "PMR-009"
    category_code: PMR
    category_name: "프로젝트 관리 요구사항"
    name: "문서 및 자료 보안관리"
    clause: "III.4.PMR"
    text: |
      문서 및 자료에 대한 보안관리 요구사항 ○ 제안사는 발주기관으로부터 제공받은 제반 자료는 본 사업 이외의 목적에 사용할 수 없음
      ○ 보안책임자는 인계자‧인수자 서명을 포함한 “자료 인수인계 대장”(또는 “자료관리대장”)을
      작성하여 발주기관으로부터 제공받은 비공개 자료들을 관리해야 함
      - ‘자료 인수인계 대장’은 자료명칭, 자료형태, 인계‧인수 일시, 인계자 성명 및 서명,
      인수자 성명 및 서명을 포함하여 작성
      - 비공개자료 출력물은 지정된 별도의 장소(시건장치가 부착되어 있는 보관함)에 보관․
      관리하고, 복사 및 외부반출을 금지
      ○ 사업수행 관련 자료 및 사업 수행 시 생산되는 모든 산출물은 사업 담당공무원이
      지정한 위치(파일서버 등)에 저장 및 관리해야 하며 개인 PC 등에 이를 보관할 수 없음
      - 비공개자료 생성 시에는 지정장소 내 비공개자료 폴더에 저장하고, 업무별로 지정된
      사용자만이 접속이 가능하도록 통제
      - 용역사업 관련 자료는 인터넷 웹하드, P2P 등 인터넷 자료 공유사이트 및 개인 메일함에
      저장 금지
      - 사업 수행으로 생산되는 산출물 및 기록은 목적 외 비인가자에게 제공․대여․열람을
      일체 금지
      ○ 제안사가 업무상 필요에 의해 부득이하게 외부 전자우편 등을 이용할 경우, 자료
      송수신 시 암호화 등의 보안대책을 마련해야 함. 단, 발주기관 정보보안 업무규정에
      의한 비공개(비밀, 대외비 등)은 전자우편으로 수발신을 금함
      - 자료 암호화 시 비밀번호는 숫자, 문자, 특수문자 등을 혼합한 9자리 이상을 권고하며
      유추하기 쉬운 문자열 등이 포함되지 않도록 설정
      ○ 사업종료 후 사업과 관련된 모든 자료를 반환, PC·메일함의 보관 자료 완전 삭제 등
      자료가 외부에 유출되지 않도록 필요한 보안 조치를 이행해야 함
      - 참여 인력이 사용한 장비는 완전 삭제를 반드시 진행해야 하며 사업 담당공무원
    obligation: shall
    type: normative
    classification: project_management_requirement
    target_asset_candidates:
      - POL
      - PRO
      - WI
      - TMP
      - REC
    evidence_candidates:
      - "자료 인수인계 대장(또는 자료관리대장), 완전삭제 확인서(사진 등)"
