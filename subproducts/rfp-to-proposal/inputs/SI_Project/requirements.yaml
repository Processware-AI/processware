      최신성을 유지해야 한다.
      ○ 데이터 구조 산출물
      - (정의서) 데이터베이스, 테이블, 컬럼, 엔티티, 속성
      - (다이어그램)물리데이터모델, 논리데이터모델
      ○ 데이터 모델 검증
      - 설계된 데이터 모델은 설계자 · 개발자 · 발주기관 · 전문가 등이 참여하여
      검증하여야 함
      - 각 단계별 데이터 모델 검증 시 기준을 정의하고 실시하여야 함
      예) 논리데이터 모델 검증 기준
