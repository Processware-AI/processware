      : 정규화 충족 여부
      예) 물리데이터 모델 검증 기준
      : 중복 테이블 여부, 중복 컬럼 여부, 반정규화된 중복 데이터 정합성 유지 방안 여부
      ○ 데이터 구조 관리 방안
      - 데이터 구조를 설계부터 구축, 운영 단계까지 지속적으로 관리 할 수 있는 방안을
