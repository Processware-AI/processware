  - id: "SER-005"
    category_code: SER
    category_name: "보안 요구사항"
    name: "클라우드 컴퓨팅 보안 준수 사항"
    clause: "III.4.SER"
    text: |
      클라우드 서비스 제공자 등에 대한 보안 요구사항 ○ 국가정보원의 국가클라우드컴퓨팅 보안가이드라인을 우선 준용하고 사업 기간 중
      개정이 발생하는 경우 변경 사항을 반영해야 함
      ○ 클라우드 기반 보안 기본원칙
      - 업무포털, 그룹웨어 등 비공개 업무 용도로 쓰이는 영역과 인터넷 서비스를
      제공하는 영역을 분리하여 운영하여야 함
      - 중요 업무자료가 해킹 및 비인가자에 의해 열람·실행이 불가토록 데이터를
      암호화하여야 함
      - 가상사설망(VPN), 호스트 자료유출 방지 제품 등 정보보호 제품을 도입하여
      저장 및 송수신되는 중요 업무자료를 암호화하는 경우 검증필 암호모듈 탑재
      제품을 이용해야 함
      - 클라우드 내에 존재하는 자원을 안전하게 운영·관리하기 위해 전용선 또는
      가상사설망(VPN)을 사용하여 국가보안관제체계와 연계 운영하여야 함(국가
      클라우드컴퓨팅 보안 가이드라인 제4장제1절, 51쪽)
      - 클라우드컴퓨팅서비스 도입 시 보안 검증 기준 관련 법률 및 지침, 보안 체계,
      보안 사항 등을 고려하여 SLA를 체결하여야 함
      - 클라우드컴퓨팅 도입·운용에 있어서 사용자와 해당 시스템 관리자를 지정
      운용하여야 함
      - 업무 또는 데이터와 연관된 법령, 수행 요구사항, 정책, 규정, 표준, 가이드라인 등을
      참고하여 보안 위협 대상을 식별하여 주기적으로 관리하여야 함
      - 정보보안 감사에 필요한 관련 자료에 대한 종류를 정의하고, 필요시 발주기관
      보안담당자에게 해당 감사 로그를 제공하여야 함
      - 감사 로그는 시스템 접근에 대한 상세 정보를 포함하여야 하고, 서비스 내 분산된
      감사 기록을 종합·분석하여 비정상 활동을 식별할 수 있어야 하며, 감사 대상을
      식별할 수 있는 형태로 1년 이상 기록 및 보호될 수 있도록 하여야 함
      - 클라우드 관련 보안 교육을 주기적으로 실시하여야 하며, 시행 결과를 발주기관에
      통보하여야 함
      ○ 클라우드 기반 인프라 보안
      - 전자정보 저장매체 불용처리 관련 규정은 CSP(Cloud Service Provider, 클라우드
      컴퓨팅서비스 제공자)의 내부 지침을 따르되, 발주기관의 필요에 따라 관련
      보안 요구사항을 수용하여야 함
      - 네트워크 장비 보안 관련 규정은 CSP의 내부 지침을 따르되, 발주기관의 필요에 따라
      관련 보안 요구사항을 수용하여야 함
      - 유지보수 보안 관련 규정은 CSP의 내부 지침을 따르되, 발주기관의 필요에 따라
      관련 보안 요구사항을 수용하여야 함
      - 기존 정보시스템 환경에서 클라우드 가상환경으로 전환하는 경우 안전한 이전 수단을
      이용하여야 함
      ○ 클라우드 가상환경 보안
      - 가상서버 내 저장자료에 대해 업무별·자료별 중요도에 따라 사용자의 접근권한을
      차등 부여하여 접근통제를 하여야 함
      - 가상서버의 운용에 필요한 서비스 포트 외에 불필요한 서비스 포트를 제거하고 관리용
      서비스와 사용자용 서비스를 분리하여 운영하여야 함
      - 가상서버의 관리용 서비스 접속 시 특정 IP와 MAC 주소가 부여된 관리용 단말을
      지정하여 운용하여야 함
      - 가상서버 데이터베이스에 대하여 사용자의 직접적인 접속을 차단하고 개인정보와
      같은 중요정보를 암호화하는 등 데이터베이스(DB)별 보안 조치하여야 함
      - 비인가자의 가상서버 내 비공개 정보에 대한 무단 접근을 방지하기 위하여 접근
      사용자를 제한하고 불필요한 계정을 주기적으로 관리하여야 함
      - 가상서버의 서비스에 필요한 프로그램을 개발하고 시험하기 위하여 사용된 도구
      (컴파일러 등)를 개발 완료 후 삭제하여야 함
      - 가상환경 내 백신을 최신 상태로 유지하고 주기적인 점검실시
      - 가상서버 내 사용금지 대상 응용프로그램에 대한 보안 통제 방안을 마련하여
      관리하여야 함
      - 가상서버에 악성코드가 설치되거나 발견 시 악성코드 감염원인 규명 등을 위한
      격리 조치를 수행하여야 함
      - 이동식 저장매체 사용 통제, 다중 인증 등을 포함한 접근 제한 방안을 마련하여
      수행하여야 함
      - 사용자별 또는 그룹별로 접근권한 부여하여 비인가자 도용 및 불법 접속에 대한
      보안관리를 수행하여야 함
      - 비밀번호 관리 방안을 마련하여 수행하여야 함
      - 웹 방화벽, 서버 보안, 백신, DB 보안, 시스템접근제어, 개인정보보호 및 국정원
      CC인증(보안기능 확인서) 제품 활용 등 보안 서비스 제공하여야 함
      - 하이퍼바이저 및 운영환경에 대한 업데이트 및 보안 패치는 최신으로 유지하고,
      주기적(1개월)으로 확인할 수 있도록 자동화하여야 함
      - 공공 업무망 영역과 공공 인터넷망 연계 시 보안대책을 수립하고 적용하여야 함
      ○ 클라우드 기반 인증 및 권한
      - 접근 주체(사용자, 시스템 관리자 등)별로 접근할 수 있는 접근 대상을 정의하고
      이에 대한 인증 방안을 마련하고 이력관리를 하여야 함
      - 사용자 인증, 로그인 횟수 제한, 불법 로그인 시도 경고 등 안전한 사용자 인증
      절차에 의해 사용자 인증을 수행하여야 함
      - 중요정보 관리 및 특수 목적을 위해 부여한 계정 및 권한을 식별하고 별도로
      통제하여야 함
      ○ 클라우드 공급망 보안
      - 발주기관에 대한 공급망 관리 대상을 정의하고, 위험 식별, 변경관리, 모니터링 등을
      수행하는 등 보안대책을 수립해야 함
      - 공급망 관리 대상의 변조 여부를 주기적으로 점검하고, 소스코드의 출처가 명확하거나
      검증된 오픈소스 소프트웨어를 활용해야 함
      ○ 보안 취약점 점검 등
      - 발주기관의 홈페이지 등을 전환할 경우 웹 취약점 점검 및 클라우드 전환에 따른
      인프라 취약점 점검을 실시하여 대상기관에 해당 결과를 안내하여야 함
      ○ 클라우드 기반 사고 및 장애 대응
      - 사고, 장애 발생 시 대응 절차와 관련된 담당자의 역할을 정의하고 발주기관의
      장애·사고 절차에 따라 협조체계를 구성·대응하여야 하며, 피해확산, 재발방지,
      복구 등에 필요한 조치를 위해 국가정보원 및 발주기관의 보안관제 및 사고조사 등
      예방보안 활동에 적극 협조하여야 함
      - 침해사고 발생 시 침해사고 대응절차에 따라 법적 통지 및 신고 의무를 준수하여
      발주기관에게 발생내용, 원인, 조치사항 등을 신속히 알려야 하며, 신고의무 미이행 시
      과징금 부과 등 발주기관이 정하는 제재조치에 따라야 함
      - 서비스수준협약(SLA)에 명시된 시간 내에 해당 서비스의 장애를 처리 및 복구 조치
      - 장애 관련 정보를 활용하여 유사 장애가 반복되지 않도록 재발 방지대책 마련
      ○ 클라우드 시스템 운영환경의 구성 요소별 보안대책 마련
      - (가용성) 화재‧지진 등 재난·재해에 대비한 재해복구체계 구축
      - (백업) 데이터 유실에 대비한 백업정책 수립 및 관리 등 체계 구축
      - (기밀성) 중요 데이터는 전송‧저장 시 암호화 등 기밀성 유지
      - (무결성) 무결성 검사를 주기적 실시 및 데이터의 위‧변조 여부 확인
      - (인증) 유효 사용자를 식별하여 불법적인 사용자 접근을 차단하기 위해 인증서
      기반 인증을 통해 클라우드 서비스 이용
      - (권한) 일반사용자, 클라우드 관리자, 가상서버 관리자 등에 따른 접근 권한 및 접근 영역을
      명확히 분리하도록 접근통제체계 구축
      - (감사) 사용자 기록 등 로그 관리를 통한 감사 기록을 유지하여 사고 발생 시 원인
      규명 및 감시체계 확립
      - (악성코드 감염 방지) 바이러스, 웜, 트로이목마 등의 악성코드에 의한 위협 제거를
      위해 악성코드 방지대책 마련 및 주기적 점검실시
      ○ 컨테이너 플랫폼 보안지침(해당하는 경우)
      - 독립된 K8s 구성으로 안전한 분리 준수
      - 국가클라우드컴퓨팅 보안 가이드라인에 따른 컨테이너 보안 지침 준수
    obligation: shall
    type: normative
    classification: security_requirement
    target_asset_candidates:
      - POL
      - PRO
      - WI
    evidence_candidates:
      - "취약점 점검 계획서, 취약점 결과 보고서"
